<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cropwood</title>
    <style>
        /* ==========================================================================
           viewOS System Typography & Layout Constants
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400&display=swap');

        :root {
            --bg-color: #0b0d09; /* Dark organic moss black */
            --text-color: #ffffff;
            --secondary-text: #a0b0a5; /* Slate-green gray */
            
            /* Sizing adjusted to fit a 4x3 grid beautifully on standard displays */
            --card-width: 270px;
            --card-height: calc(var(--card-width) * 0.625); /* 16:10 aspect ratio */
            --border-radius: 12px;
        }

        * {
            font-family: 'Inter Tight', -apple-system, sans-serif;
            font-weight: 300 !important;
            letter-spacing: -0.03em !important;
            line-height: 1.25;
            box-sizing: border-box;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            /* viewOS maps gamepad/keyboard navigation, so the default cursor is hidden */
            cursor: none !important;
            margin: 0; 
            padding: 0;
        }

        html, body {
            width: 100vw; 
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        #app-root {
            position: relative;
            width: 100%; 
            height: 100%;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
            padding: 40px 4vw 40px 4vw;
        }

        #app-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        #app-header h1 { 
            font-size: 3.6rem; 
            font-weight: 400 !important; 
            margin-bottom: 8px; 
            color: #d1ffc4;
            text-shadow: 0 0 20px rgba(115, 255, 131, 0.15);
        }
        #app-header p { 
            font-size: 1.2rem; 
            color: var(--secondary-text); 
            max-width: 800px; 
            margin: 0 auto 15px auto; 
        }

        /* High-fidelity Glass-morphic HUD */
        .hud-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 12px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 0 auto;
        }
        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
        }
        .hud-label {
            font-size: 0.8rem;
            color: var(--secondary-text);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .hud-val {
            font-size: 1.3rem;
            font-weight: 400 !important;
            color: #ffffff;
        }

        #content-grid {
            display: grid;
            grid-template-columns: repeat(4, var(--card-width));
            gap: 25px;
            justify-content: center;
            perspective: 1200px;
        }

        .grid-item {
            display: flex; 
            flex-direction: column; 
            align-items: center;
            width: 100%; 
            transform-style: preserve-3d; 
            will-change: transform;
        }

        .card-visual {
            width: var(--card-width); 
            height: var(--card-height);
            background-color: #1c1c1e; 
            border-radius: var(--border-radius);
            position: relative; 
            z-index: 1; 
            transform-style: preserve-3d;
            background-size: cover; 
            background-position: center;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            transition: border-color 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .grid-item.is-focused .card-visual {
            border-color: rgba(115, 255, 131, 0.4);
            box-shadow: 0 0 35px rgba(115, 255, 131, 0.15);
        }

        .card-title {
            font-size: 1.3rem;
            color: var(--secondary-text); 
            margin-top: 14px;
            text-align: center; 
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%;
            transition: color 0.2s ease;
        }

        /* 3D Dynamic Reflection Layers */
        .card-shine {
            position: absolute; 
            inset: 0; 
            border-radius: inherit; 
            pointer-events: none; 
            z-index: 11;
            mix-blend-mode: screen; 
            opacity: 0; 
            will-change: opacity; 
            overflow: hidden;
            transform: translate3d(0, 0, 0.5px);
        }
        
        .card-glass-border {
            position: absolute; 
            inset: 0; 
            border-radius: inherit; 
            pointer-events: none; 
            z-index: 12;
            border: 1.5px solid rgba(255, 255, 255, 0.3); 
            opacity: 0; 
            will-change: opacity;
            transform: translate3d(0, 0, 1px);
        }

        /* Detail/Sub-navigation View Overlay */
        #detail-view {
            position: fixed; 
            inset: 0; 
            background: rgba(11, 13, 9, 0.95);
            backdrop-filter: blur(15px);
            display: flex; 
            opacity: 0; 
            pointer-events: none;
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            transition: opacity 0.3s ease; 
            z-index: 1000; 
            padding: 40px;
        }
        #detail-view.visible { 
            opacity: 1; 
            pointer-events: all;
        }
        #detail-view h2 { 
            font-size: 3.5rem; 
            margin-bottom: 24px; 
            color: #d1ffc4;
            text-shadow: 0 0 20px rgba(115, 255, 131, 0.1);
        }

        /* Cozy Action Buttons inside Overlay */
        .detail-action-btn {
            font-size: 1.5rem;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            padding: 14px 40px;
            margin: 6px 0;
            border-radius: var(--border-radius);
            width: 450px;
            text-align: center;
            transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d;
        }
        .detail-action-btn.is-focused {
            color: #000000 !important;
            background-color: #ffffff !important;
            border-color: #ffffff !important;
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15);
        }
        .detail-action-btn.disabled {
            opacity: 0.3;
        }

        /* Overnight / Sleep Skipping Overlay */
        #night-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #night-overlay.visible {
            display: flex;
            opacity: 1;
        }
        #night-text {
            font-size: 5rem;
            color: #d1b3ff;
            margin-bottom: 20px;
            text-shadow: 0 0 25px rgba(162, 115, 255, 0.4);
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.06); opacity: 1; }
        }
        #night-summary {
            font-size: 1.8rem;
            color: var(--secondary-text);
            text-align: center;
            max-width: 600px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Custom Specificity overrides to avoid CSS clashing when focused */
        .grid-item.is-focused .card-title { color: #ffffff !important; }
        .tilted-focus { transition: none !important; }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-4px); }
        }
        @keyframes blink {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="app-root">
        <header id="app-header">
            <h1>Cropwood</h1>
            <p>Cozy modular 2D farming estate. Navigate using Arrow Keys/D-pad, Select with Enter/A.</p>
            
            <div class="hud-container">
                <div class="hud-item"><span class="hud-label">DAY</span><span id="hud-day" class="hud-val">1</span></div>
                <div class="hud-item" style="border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); padding: 0 25px;"><span class="hud-label">GOLD</span><span id="hud-gold" class="hud-val" style="color:#ffd700;">100g</span></div>
                <div class="hud-item" style="border-right: 1px solid rgba(255,255,255,0.1); padding-right: 25px;"><span class="hud-label">ENERGY</span><span id="hud-energy" class="hud-val" style="color:#00ffcc;">100/100</span></div>
                <div class="hud-item"><span class="hud-label">SEEDS</span><span id="hud-seeds" class="hud-val">🌾0 🥕0 🍓0 🌟0</span></div>
                <div class="hud-item" style="border-left: 1px solid rgba(255,255,255,0.1); padding-left: 25px;"><span class="hud-label">CROPS</span><span id="hud-crops" class="hud-val">🌾0 🥕0 🍓0 🌟0</span></div>
                <div class="hud-item" style="border-left: 1px solid rgba(255,255,255,0.1); padding-left: 25px;"><span class="hud-label">OTHER</span><span id="hud-other" class="hud-val">🥚0 🍞0 🥧0 🍹0</span></div>
            </div>
        </header>

        <!-- Dynamic Content Grid -->
        <main id="content-grid"></main>
    </div>

    <!-- Interactive Sub-navigation Overlay -->
    <div id="detail-view">
        <h2 id="detail-title">Facility Details</h2>
        <div id="detail-actions"></div>
    </div>

    <!-- Night Summary Modal -->
    <div id="night-overlay">
        <div id="night-text">Zzz...</div>
        <div id="night-summary"></div>
        <div id="night-continue-btn" class="detail-action-btn">Wake Up</div>
    </div>

    <script>
        // ==========================================================================
        // Developer Configuration & Farming Core State
        // ==========================================================================
        const appItems = [
            // Row 1 & 2: Land Plots (Indices 0 - 7)
            { id: "plot-0", title: "Plot 1", type: "plot", plotIndex: 0 },
            { id: "plot-1", title: "Plot 2", type: "plot", plotIndex: 1 },
            { id: "plot-2", title: "Plot 3", type: "plot", plotIndex: 2 },
            { id: "plot-3", title: "Plot 4", type: "plot", plotIndex: 3 },
            { id: "plot-4", title: "Plot 5", type: "plot", plotIndex: 4 },
            { id: "plot-5", title: "Plot 6", type: "plot", plotIndex: 5 },
            { id: "plot-6", title: "Plot 7", type: "plot", plotIndex: 6 },
            { id: "plot-7", title: "Plot 8", type: "plot", plotIndex: 7 },
            // Row 3: Farm Hub Facilities (Indices 8 - 11)
            { id: "shop", title: "Seed Shop", type: "facility" },
            { id: "coop", title: "Coop & Animals", type: "facility" },
            { id: "kitchen", title: "Cooking & Kitchen", type: "facility" },
            { id: "farmhouse", title: "Cozy Farmhouse", type: "facility" }
        ];

        const STATE = {
            currentScreen: 'grid', // 'grid' | 'detail' | 'night'
            focusedIndex: 0,
            detailFocusedIndex: 0,
            columns: 4,
            joyX: 0, joyY: 0,
            
            // Gameplay Variables
            gold: 100,
            day: 1,
            energy: 100,
            maxEnergy: 100,
            
            seeds: { wheat: 3, carrot: 0, strawberry: 0, starfruit: 0 },
            crops: { wheat: 0, carrot: 0, strawberry: 0, starfruit: 0 },
            other: { egg: 0, bread: 0, pie: 0, juice: 0 },
            
            // Land plots: Statuses: 'wild', 'soil', 'watered'
            plots: [
                { status: 'wild', crop: null },
                { status: 'wild', crop: null },
                { status: 'wild', crop: null },
                { status: 'wild', crop: null },
                { status: 'soil', crop: null },
                { status: 'soil', crop: null },
                { status: 'soil', crop: null },
                { status: 'soil', crop: null }
            ],
            
            // Coop Variables
            chickens: 0,
            chickensFed: false,
            eggsInCoop: 0,
            
            // Facility Tool Levels
            waterCanLevel: 1, // 1: Standard (5 Energy), 2: Copper (3 Energy), 3: Golden (1 Energy)
            hoeLevel: 1,      // 1: Standard (15 Energy), 2: Steel (8 Energy), 3: Iridium (2 Energy)
            
            // Farm Milestones (Achievements)
            viewingMilestones: false,
            milestones: {
                firstHarvest: false,
                tycoon: false,
                coop: false,
                masterChef: false,
                starPlanter: false
            }
        };

        const DOM_CACHE = {
            grid: document.getElementById('content-grid'),
            detail: document.getElementById('detail-view'),
            detailTitle: document.getElementById('detail-title'),
            detailActions: document.getElementById('detail-actions')
        };

        let cachedElements = [];
        let springElements = [];

        // Tool Energy Helper Calculation Functions
        function getTillingCost() { return [15, 8, 2][STATE.hoeLevel - 1]; }
        function getWateringCost() { return [5, 3, 1][STATE.waterCanLevel - 1]; }
        function getCompletedMilestones() { return Object.values(STATE.milestones).filter(Boolean).length; }

        // ==========================================================================
        // Physics Engine Implementation
        // ==========================================================================
        function Spring(val, stiffness = 0.12, damping = 0.78) {
            this.val = val; 
            this.target = val; 
            this.vel = 0;
            this.stiffness = stiffness; 
            this.damping = damping;
        }
        Spring.prototype.update = function() {
            if (Math.abs(this.target - this.val) < 0.001 && Math.abs(this.vel) < 0.001) {
                this.val = this.target; 
                this.vel = 0; 
                return false;
            }
            const force = (this.target - this.val) * this.stiffness;
            this.vel = (this.vel + force) * this.damping; 
            this.val += this.vel;
            return true;
        };

        function setupSpringPhysics(el) {
            if (el.springs) return;
            el.springs = { 
                scale: new Spring(1.0, 0.15, 0.70), 
                posX: new Spring(0, 0.08, 0.70), 
                posY: new Spring(0, 0.08, 0.70), 
                focusState: new Spring(0, 0.12, 0.80) 
            };
            
            let shine = document.createElement('div'); shine.className = 'card-shine'; 
            let glassBorder = document.createElement('div'); glassBorder.className = 'card-glass-border'; 
            el.shine = shine; el.glassBorder = glassBorder;
            el.appendChild(shine); el.appendChild(glassBorder);
            springElements.push(el);
        }

        // ==========================================================================
        // Application Lifecycle Initializer
        // ==========================================================================
        function initApp() {
            DOM_CACHE.grid.innerHTML = '';
            cachedElements = [];
            springElements = [];
            
            appItems.forEach((item, index) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'grid-item';
                itemEl.id = `item-${index}`;
                
                itemEl.innerHTML = `
                    <div class="card-visual"></div>
                    <div class="card-title"></div>
                `;
                
                DOM_CACHE.grid.appendChild(itemEl);
                const visual = itemEl.querySelector('.card-visual');
                setupSpringPhysics(visual);
                
                cachedElements.push({ container: itemEl, icon: visual, data: item });
                renderCardContent(index);
            });

            document.addEventListener('keydown', handleKeydown);
            
            requestAnimationFrame(pollGamepads);
            requestAnimationFrame(tickMicroanimations);
            
            updateHUD();
            updateFocus(true);
        }

        function getActiveTarget() {
            if (STATE.currentScreen === 'grid') return cachedElements[STATE.focusedIndex] || null;
            if (STATE.currentScreen === 'detail') {
                const activeBtn = document.getElementById(`action-btn-${STATE.detailFocusedIndex}`);
                if (activeBtn) return { container: activeBtn, icon: activeBtn };
            }
            if (STATE.currentScreen === 'night') {
                const continueBtn = document.getElementById('night-continue-btn');
                return { container: continueBtn, icon: continueBtn };
            }
            return null;
        }

        let lastActiveTarget = null;
        function updateFocus(isInitialLoad = false, dx = 0, dy = 0) {
            document.querySelectorAll('.is-focused').forEach(el => el.classList.remove('is-focused'));
            const target = getActiveTarget();

            if (lastActiveTarget && lastActiveTarget.icon && lastActiveTarget.icon.springs && lastActiveTarget !== target) {
                const s = lastActiveTarget.icon.springs; 
                s.scale.target = 1.0; 
                s.focusState.target = 0; 
                s.posX.target = 0; 
                s.posY.target = 0;
                if (dx) s.posX.vel = dx * 22; 
                if (dy) s.posY.vel = dy * 22; 
                lastActiveTarget.icon.style.zIndex = '1';
            }

            if (target && target.icon && target.icon.springs) {
                const s = target.icon.springs; 
                s.scale.target = 1.12; 
                s.focusState.target = 1.0;
                if (dx) s.posX.vel = dx * 28; 
                if (dy) s.posY.vel = dy * 28; 
                target.icon.style.zIndex = '50';
            }

            lastActiveTarget = target;
            if (target && target.container && target.icon) {
                target.container.classList.add('is-focused');
                if (target.icon !== target.container) target.icon.classList.add('is-focused');
            }
        }

        // ==========================================================================
        // Visual Dynamic Renderer
        // ==========================================================================
        function renderCardContent(index) {
            const item = appItems[index];
            const el = document.getElementById(`item-${index}`);
            if (!el) return;
            const visual = el.querySelector('.card-visual');
            const titleEl = el.querySelector('.card-title');
            
            let badges = '';
            
            if (item.type === 'plot') {
                const plot = STATE.plots[item.plotIndex];
                let bg = '';
                let label = '';
                let graphic = '';
                
                if (plot.status === 'wild') {
                    bg = 'linear-gradient(135deg, #1e281a, #0d140b)';
                    label = `Plot ${item.plotIndex + 1}: Overgrown`;
                    graphic = `<div style="font-size: 3rem; margin-top: 15px;">🌿</div>`;
                } else if (plot.status === 'soil') {
                    bg = 'linear-gradient(135deg, #3d2816, #25180c)';
                    label = `Plot ${item.plotIndex + 1}: Dry Soil`;
                    graphic = `<div style="font-size: 3rem; margin-top: 15px; opacity:0.6;">🟫</div>`;
                } else if (plot.status === 'watered') {
                    bg = 'linear-gradient(135deg, #1b2636, #0c121b)';
                    label = `Plot ${item.plotIndex + 1}: Wet Soil`;
                    graphic = `<div style="font-size: 3rem; margin-top: 15px;">🟫</div>`;
                    badges += `<span style="position:absolute; top:10px; right:10px; font-size:0.9rem; background:rgba(0,150,255,0.4); border:1px solid rgba(0,200,255,0.6); padding:2px 8px; border-radius:12px; backdrop-filter:blur(4px); line-height:1; z-index:10; font-weight:400 !important;">💧 Wet</span>`;
                }
                
                if (plot.crop) {
                    const c = plot.crop;
                    const isReady = c.age >= c.maxAge;
                    label = `Plot ${item.plotIndex + 1}: ${c.name} (${isReady ? 'READY' : 'Day ' + c.age + '/' + c.maxAge})`;
                    
                    let cropEmoji = '🌱';
                    if (isReady) {
                        if (c.id === 'wheat') cropEmoji = '🌾';
                        if (c.id === 'carrot') cropEmoji = '🥕';
                        if (c.id === 'strawberry') cropEmoji = '🍓';
                        if (c.id === 'starfruit') cropEmoji = '🌟';
                    } else if (c.age > c.maxAge / 2) {
                        cropEmoji = '🌿';
                    }
                    
                    let ripeGlow = '';
                    if (isReady) {
                        let glowColor = { wheat: 'rgba(255, 234, 121, 0.25)', carrot: 'rgba(255, 159, 67, 0.25)', strawberry: 'rgba(255, 82, 82, 0.25)', starfruit: 'rgba(241, 196, 15, 0.25)' }[c.id];
                        ripeGlow = `box-shadow: inset 0 0 30px ${glowColor};`;
                        badges += `<span style="position:absolute; bottom:10px; right:10px; font-size:0.8rem; font-weight:bold; background:rgba(255,200,0,0.4); border:1px solid rgba(255,230,0,0.6); padding:3px 8px; border-radius:12px; backdrop-filter:blur(4px); color:#fff; line-height:1; z-index:10; animation: bounce 1s infinite alternate; font-weight:400 !important;">✨ HARVEST</span>`;
                    }
                    
                    graphic = `<div style="font-size: 3.5rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); ${ripeGlow}">${cropEmoji}</div>`;
                }
                
                visual.style.background = bg;
                visual.innerHTML = `
                    <div class="card-inner-art" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; width:100%; position:relative; z-index:2;">
                        ${graphic}
                        ${badges}
                    </div>`;
                titleEl.textContent = label;
                
            } else {
                let bg = '';
                let graphic = '';
                if (item.id === 'shop') {
                    bg = 'linear-gradient(135deg, #1b2636, #0c121b)';
                    graphic = '🛒';
                } else if (item.id === 'coop') {
                    bg = 'linear-gradient(135deg, #381a1a, #1a0c0c)';
                    graphic = '🐔';
                    badges += `<span style="position:absolute; top:10px; right:10px; font-size:0.9rem; background:rgba(255,100,100,0.25); border:1px solid rgba(255,100,100,0.4); padding:2px 8px; border-radius:12px; backdrop-filter:blur(4px); line-height:1; z-index:10; font-weight:400 !important;">🐔 ${STATE.chickens}/4</span>`;
                } else if (item.id === 'kitchen') {
                    bg = 'linear-gradient(135deg, #132b24, #081410)';
                    graphic = '🍳';
                } else if (item.id === 'farmhouse') {
                    bg = 'linear-gradient(135deg, #2a1b3d, #120b1c)';
                    graphic = '🏡';
                    if (STATE.energy < STATE.maxEnergy * 0.3) {
                        badges += `<span style="position:absolute; top:10px; right:10px; font-size:0.9rem; background:rgba(255,150,0,0.3); border:1px solid rgba(255,150,0,0.5); padding:2px 8px; border-radius:12px; backdrop-filter:blur(4px); line-height:1; z-index:10; animation: blink 1s infinite alternate; font-weight:400 !important;">⚠️ Exhausted</span>`;
                    }
                }
                
                visual.style.background = bg;
                visual.innerHTML = `
                    <div class="card-inner-art" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; width:100%; position:relative; z-index:2;">
                        <div style="font-size: 3.5rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));">${graphic}</div>
                        ${badges}
                    </div>`;
                titleEl.textContent = item.title;
            }
        }

        function updateHUD() {
            document.getElementById('hud-day').innerText = STATE.day;
            document.getElementById('hud-gold').innerText = STATE.gold + 'g';
            document.getElementById('hud-energy').innerText = STATE.energy + '/' + STATE.maxEnergy;
            
            document.getElementById('hud-seeds').innerText = 
                `🌾${STATE.seeds.wheat} 🥕${STATE.seeds.carrot} 🍓${STATE.seeds.strawberry} 🌟${STATE.seeds.starfruit}`;
            
            document.getElementById('hud-crops').innerText = 
                `🌾${STATE.crops.wheat} 🥕${STATE.crops.carrot} 🍓${STATE.crops.strawberry} 🌟${STATE.crops.starfruit}`;
            
            document.getElementById('hud-other').innerText = 
                `🥚${STATE.other.egg} 🍞${STATE.other.bread} 🥧${STATE.other.pie} 🍹${STATE.other.juice}`;
        }

        // ==========================================================================
        // Sub-navigation & Game Action Lists
        // ==========================================================================
        function getActionsForModule(item) {
            const actions = [];
            
            if (item.type === 'plot') {
                const plot = STATE.plots[item.plotIndex];
                if (plot.status === 'wild') {
                    actions.push({
                        text: `Clear Overgrowth (${getTillingCost()} Energy)`,
                        disabled: STATE.energy < getTillingCost(),
                        handler: () => {
                            STATE.energy -= getTillingCost();
                            plot.status = 'soil';
                            notifySuccess();
                        }
                    });
                } else {
                    if (plot.crop === null) {
                        actions.push({
                            text: `Plant Wheat Seed (Have ${STATE.seeds.wheat})`,
                            disabled: STATE.seeds.wheat <= 0,
                            handler: () => {
                                STATE.seeds.wheat--;
                                plot.crop = { id: 'wheat', name: 'Wheat', age: 0, maxAge: 2 };
                                notifySuccess();
                            }
                        });
                        actions.push({
                            text: `Plant Carrot Seed (Have ${STATE.seeds.carrot})`,
                            disabled: STATE.seeds.carrot <= 0,
                            handler: () => {
                                STATE.seeds.carrot--;
                                plot.crop = { id: 'carrot', name: 'Carrot', age: 0, maxAge: 3 };
                                notifySuccess();
                            }
                        });
                        actions.push({
                            text: `Plant Strawberry Seed (Have ${STATE.seeds.strawberry})`,
                            disabled: STATE.seeds.strawberry <= 0,
                            handler: () => {
                                STATE.seeds.strawberry--;
                                plot.crop = { id: 'strawberry', name: 'Strawberry', age: 0, maxAge: 4 };
                                notifySuccess();
                            }
                        });
                        actions.push({
                            text: `Plant Starfruit Seed (Have ${STATE.seeds.starfruit})`,
                            disabled: STATE.seeds.starfruit <= 0,
                            handler: () => {
                                STATE.seeds.starfruit--;
                                plot.crop = { id: 'starfruit', name: 'Starfruit', age: 0, maxAge: 5 };
                                notifySuccess();
                            }
                        });
                    } else {
                        const isReady = plot.crop.age >= plot.crop.maxAge;
                        if (isReady) {
                            actions.push({
                                text: `Harvest ${plot.crop.name} (5 Energy)`,
                                disabled: STATE.energy < 5,
                                handler: () => {
                                    STATE.energy -= 5;
                                    STATE.crops[plot.crop.id]++;
                                    STATE.milestones.firstHarvest = true;
                                    if (plot.crop.id === 'starfruit') STATE.milestones.starPlanter = true;
                                    
                                    if (plot.crop.id === 'strawberry') {
                                        // Strawberry regrows! Sets growth level back to mid-stage
                                        plot.crop.age = 2;
                                    } else {
                                        plot.crop = null;
                                    }
                                    notifySuccess();
                                }
                            });
                        } else {
                            actions.push({
                                text: `Crop growing: ${plot.crop.name} (${plot.crop.maxAge - plot.crop.age} days left)`,
                                disabled: true,
                                handler: () => {}
                            });
                        }
                    }
                    
                    if (plot.status === 'soil') {
                        actions.push({
                            text: `Water Plot (${getWateringCost()} Energy)`,
                            disabled: STATE.energy < getWateringCost(),
                            handler: () => {
                                STATE.energy -= getWateringCost();
                                plot.status = 'watered';
                                notifySuccess();
                            }
                        });
                    }
                }
            } else if (item.id === 'shop') {
                actions.push({ text: "Buy Wheat Seed (10g)", disabled: STATE.gold < 10, handler: () => buySeed('wheat', 10) });
                actions.push({ text: "Buy Carrot Seed (20g)", disabled: STATE.gold < 20, handler: () => buySeed('carrot', 20) });
                actions.push({ text: "Buy Strawberry Seed (40g)", disabled: STATE.gold < 40, handler: () => buySeed('strawberry', 40) });
                actions.push({ text: "Buy Starfruit Seed (80g)", disabled: STATE.gold < 80, handler: () => buySeed('starfruit', 80) });
                
                actions.push({ 
                    text: `Sell Wheat (Have ${STATE.crops.wheat} | +${STATE.crops.wheat * 25}g)`, 
                    disabled: STATE.crops.wheat <= 0, 
                    handler: () => sellItem('crops', 'wheat', 25) 
                });
                actions.push({ 
                    text: `Sell Carrots (Have ${STATE.crops.carrot} | +${STATE.crops.carrot * 50}g)`, 
                    disabled: STATE.crops.carrot <= 0, 
                    handler: () => sellItem('crops', 'carrot', 50) 
                });
                actions.push({ 
                    text: `Sell Strawberries (Have ${STATE.crops.strawberry} | +${STATE.crops.strawberry * 110}g)`, 
                    disabled: STATE.crops.strawberry <= 0, 
                    handler: () => sellItem('crops', 'strawberry', 110) 
                });
                actions.push({ 
                    text: `Sell Starfruit (Have ${STATE.crops.starfruit} | +${STATE.crops.starfruit * 240}g)`, 
                    disabled: STATE.crops.starfruit <= 0, 
                    handler: () => sellItem('crops', 'starfruit', 240) 
                });
                actions.push({ 
                    text: `Sell Eggs (Have ${STATE.other.egg} | +${STATE.other.egg * 40}g)`, 
                    disabled: STATE.other.egg <= 0, 
                    handler: () => sellItem('other', 'egg', 40) 
                });
                actions.push({ 
                    text: `Sell Bread (Have ${STATE.other.bread} | +${STATE.other.bread * 65}g)`, 
                    disabled: STATE.other.bread <= 0, 
                    handler: () => sellItem('other', 'bread', 65) 
                });
                actions.push({ 
                    text: `Sell Pies (Have ${STATE.other.pie} | +${STATE.other.pie * 320}g)`, 
                    disabled: STATE.other.pie <= 0, 
                    handler: () => sellItem('other', 'pie', 320) 
                });
                actions.push({ 
                    text: `Sell Juice (Have ${STATE.other.juice} | +${STATE.other.juice * 300}g)`, 
                    disabled: STATE.other.juice <= 0, 
                    handler: () => sellItem('other', 'juice', 300) 
                });
                
                if (STATE.waterCanLevel === 1) {
                    actions.push({ text: "Upgrade to Copper Watering Can (150g)", disabled: STATE.gold < 150, handler: () => { STATE.gold -= 150; STATE.waterCanLevel = 2; notifySuccess(); } });
                } else if (STATE.waterCanLevel === 2) {
                    actions.push({ text: "Upgrade to Golden Watering Can (400g)", disabled: STATE.gold < 400, handler: () => { STATE.gold -= 400; STATE.waterCanLevel = 3; notifySuccess(); } });
                }
                
                if (STATE.hoeLevel === 1) {
                    actions.push({ text: "Upgrade to Steel Hoe (150g)", disabled: STATE.gold < 150, handler: () => { STATE.gold -= 150; STATE.hoeLevel = 2; notifySuccess(); } });
                } else if (STATE.hoeLevel === 2) {
                    actions.push({ text: "Upgrade to Iridium Hoe (400g)", disabled: STATE.gold < 400, handler: () => { STATE.gold -= 400; STATE.hoeLevel = 3; notifySuccess(); } });
                }
            } else if (item.id === 'coop') {
                actions.push({
                    text: `Buy Chicken (120g | Space ${STATE.chickens}/4)`,
                    disabled: STATE.gold < 120 || STATE.chickens >= 4,
                    handler: () => {
                        STATE.gold -= 120;
                        STATE.chickens++;
                        if (STATE.chickens === 4) STATE.milestones.coop = true;
                        notifySuccess();
                    }
                });
                actions.push({
                    text: `Feed Chickens (5g per bird | Costs ${STATE.chickens * 5}g)`,
                    disabled: STATE.gold < (STATE.chickens * 5) || STATE.chickens <= 0 || STATE.chickensFed,
                    handler: () => {
                        STATE.gold -= (STATE.chickens * 5);
                        STATE.chickensFed = true;
                        notifySuccess();
                    }
                });
                actions.push({
                    text: `Collect Eggs (Gather ${STATE.eggsInCoop} eggs)`,
                    disabled: STATE.eggsInCoop <= 0,
                    handler: () => {
                        STATE.other.egg += STATE.eggsInCoop;
                        STATE.eggsInCoop = 0;
                        notifySuccess();
                    }
                });
            } else if (item.id === 'kitchen') {
                actions.push({
                    text: "Bake Crusty Bread (Uses 2 Wheat)",
                    disabled: STATE.crops.wheat < 2,
                    handler: () => {
                        STATE.crops.wheat -= 2;
                        STATE.other.bread++;
                        notifySuccess();
                    }
                });
                actions.push({
                    text: "Bake Strawberry Pie (Uses 2 Strawberry, 1 Egg)",
                    disabled: STATE.crops.strawberry < 2 || STATE.other.egg < 1,
                    handler: () => {
                        STATE.crops.strawberry -= 2;
                        STATE.other.egg -= 1;
                        STATE.other.pie++;
                        STATE.milestones.masterChef = true;
                        notifySuccess();
                    }
                });
                actions.push({
                    text: "Press Starfruit Juice (Uses 1 Starfruit)",
                    disabled: STATE.crops.starfruit < 1,
                    handler: () => {
                        STATE.crops.starfruit -= 1;
                        STATE.other.juice++;
                        notifySuccess();
                    }
                });
            } else if (item.id === 'farmhouse') {
                if (STATE.viewingMilestones) {
                    actions.push({ text: `🌾 First Harvest: ${STATE.milestones.firstHarvest ? 'COMPLETED' : 'LOCKED'}`, disabled: true });
                    actions.push({ text: `💰 Tycoon (1000g Cash): ${STATE.milestones.tycoon ? 'COMPLETED' : 'LOCKED'}`, disabled: true });
                    actions.push({ text: `🐔 Coop Owner (4 birds): ${STATE.milestones.coop ? 'COMPLETED' : 'LOCKED'}`, disabled: true });
                    actions.push({ text: `🥧 Master Chef (Bake Pie): ${STATE.milestones.masterChef ? 'COMPLETED' : 'LOCKED'}`, disabled: true });
                    actions.push({ text: `✨ Star Planter: ${STATE.milestones.starPlanter ? 'COMPLETED' : 'LOCKED'}`, disabled: true });
                    actions.push({
                        text: "Back to House Options",
                        disabled: false,
                        handler: () => {
                            STATE.viewingMilestones = false;
                            renderDetailMenu();
                        }
                    });
                } else {
                    actions.push({
                        text: "Sleep & Save (Start Next Day)",
                        disabled: false,
                        handler: () => startNextDay()
                    });
                    actions.push({
                        text: `Check Milestones (${getCompletedMilestones()}/5 Completed)`,
                        disabled: false,
                        handler: () => {
                            STATE.viewingMilestones = true;
                            renderDetailMenu();
                        }
                    });
                }
            }
            
            // Standard back navigation is appended automatically
            if (!STATE.viewingMilestones) {
                actions.push({
                    text: "Return to Farm Grid",
                    disabled: false,
                    handler: () => closeDetailView()
                });
            }
            
            return actions;
        }

        function buySeed(type, cost) {
            STATE.gold -= cost;
            STATE.seeds[type]++;
            notifySuccess();
        }

        function sellItem(category, type, price) {
            const amount = category === 'crops' ? STATE.crops[type] : STATE.other[type];
            STATE.gold += amount * price;
            if (category === 'crops') STATE.crops[type] = 0;
            else STATE.other[type] = 0;
            notifySuccess();
        }

        function notifySuccess() {
            if (STATE.gold >= 1000) STATE.milestones.tycoon = true;
            updateHUD();
            renderCardContent(STATE.focusedIndex);
            renderDetailMenu();
        }

        // ==========================================================================
        // Sub-navigation Framework
        // ==========================================================================
        function renderDetailMenu() {
            const item = appItems[STATE.focusedIndex];
            DOM_CACHE.detailTitle.innerText = item.title;
            DOM_CACHE.detailActions.innerHTML = '';
            
            const actions = getActionsForModule(item);
            actions.forEach((act, idx) => {
                const btn = document.createElement('div');
                btn.className = 'detail-action-btn';
                btn.id = `action-btn-${idx}`;
                btn.innerText = act.text;
                if (act.disabled) {
                    btn.classList.add('disabled');
                }
                DOM_CACHE.detailActions.appendChild(btn);
            });
            
            STATE.detailFocusedIndex = 0;
            updateDetailFocus();
        }

        function updateDetailFocus() {
            document.querySelectorAll('.detail-action-btn').forEach(btn => btn.classList.remove('is-focused'));
            const activeBtn = document.getElementById(`action-btn-${STATE.detailFocusedIndex}`);
            if (activeBtn) activeBtn.classList.add('is-focused');
        }

        function navigateDetail(dir) {
            const actions = getActionsForModule(appItems[STATE.focusedIndex]);
            const total = actions.length;
            let nextIndex = STATE.detailFocusedIndex;
            
            for (let i = 0; i < total; i++) {
                nextIndex = (nextIndex + dir + total) % total;
                if (!actions[nextIndex].disabled) {
                    STATE.detailFocusedIndex = nextIndex;
                    updateDetailFocus();
                    break;
                }
            }
        }

        function executeDetailAction() {
            const actions = getActionsForModule(appItems[STATE.focusedIndex]);
            const act = actions[STATE.detailFocusedIndex];
            if (act && !act.disabled) {
                act.handler();
            }
        }

        function closeDetailView() {
            STATE.viewingMilestones = false;
            STATE.currentScreen = 'grid';
            DOM_CACHE.detail.classList.remove('visible');
            updateFocus(false);
        }

        // ==========================================================================
        // Day Progression System (Sleep skips)
        // ==========================================================================
        function startNextDay() {
            STATE.day++;
            STATE.energy = STATE.maxEnergy;
            
            // Progression updates
            let cropsGrown = 0;
            STATE.plots.forEach((plot, index) => {
                if (plot.crop) {
                    if (plot.status === 'watered') {
                        plot.crop.age++;
                        cropsGrown++;
                    }
                }
                // Reset watering stage overnight
                if (plot.status === 'watered') {
                    plot.status = 'soil';
                }
            });
            
            let eggsLaid = 0;
            if (STATE.chickens > 0) {
                if (STATE.chickensFed) {
                    eggsLaid = STATE.chickens;
                    STATE.eggsInCoop += eggsLaid;
                    STATE.chickensFed = false;
                }
            }
            
            updateHUD();
            for (let i = 0; i < 12; i++) {
                renderCardContent(i);
            }
            
            // Show skip animations summary
            STATE.currentScreen = 'night';
            const nightSummary = document.getElementById('night-summary');
            let log = `Day ${STATE.day - 1} ended safely.<br><br>`;
            if (cropsGrown > 0) log += `🌱 ${cropsGrown} plots grew closer to harvest.<br>`;
            if (eggsLaid > 0) log += `🥚 Your hens laid ${eggsLaid} egg(s).<br>`;
            if (STATE.chickens > 0 && !STATE.chickensFed) log += `🐔 Your chickens went hungry! (Remember to buy feed)<br>`;
            log += `<br>Energy fully restored.`;
            
            nightSummary.innerHTML = log;
            document.getElementById('night-overlay').classList.add('visible');
            
            setTimeout(() => {
                document.getElementById('night-continue-btn').classList.add('is-focused');
            }, 60);
        }

        function wakeUp() {
            document.getElementById('night-overlay').classList.remove('visible');
            STATE.currentScreen = 'grid';
            closeDetailView();
        }

        // ==========================================================================
        // Input Routing System (Keys & Controllers)
        // ==========================================================================
        function executeAction() {
            if (STATE.currentScreen === 'grid') {
                STATE.currentScreen = 'detail';
                DOM_CACHE.detail.classList.add('visible');
                renderDetailMenu();
                updateFocus(false);
            } else if (STATE.currentScreen === 'detail') {
                executeDetailAction();
            } else if (STATE.currentScreen === 'night') {
                wakeUp();
            }
        }

        function handleSystemBack() {
            if (STATE.currentScreen === 'detail') {
                closeDetailView();
            } else if (STATE.currentScreen === 'night') {
                wakeUp();
            } else {
                window.parent.postMessage({ type: 'exitApp' }, '*');
            }
        }

        function handleKeydown(e) {
            if (e && typeof e.preventDefault === 'function') e.preventDefault();
            
            let dx = 0, dy = 0;
            const c = STATE.columns, t = appItems.length;

            if (e.key === 'Escape' || e.key === 'Backspace') { handleSystemBack(); return; }
            if (e.key === 'Enter' || e.key === ' ') { executeAction(); return; }

            if (STATE.currentScreen === 'grid') {
                if (e.key === 'ArrowRight' && (STATE.focusedIndex + 1) % c !== 0 && STATE.focusedIndex + 1 < t) { STATE.focusedIndex++; dx = 1; }
                else if (e.key === 'ArrowLeft' && STATE.focusedIndex % c !== 0) { STATE.focusedIndex--; dx = -1; }
                else if (e.key === 'ArrowDown' && STATE.focusedIndex + c < t) { STATE.focusedIndex += c; dy = 1; }
                else if (e.key === 'ArrowUp' && STATE.focusedIndex - c >= 0) { STATE.focusedIndex -= c; dy = -1; }
                
                if (dx !== 0 || dy !== 0) updateFocus(false, dx, dy);
            } else if (STATE.currentScreen === 'detail') {
                if (e.key === 'ArrowDown') navigateDetail(1);
                else if (e.key === 'ArrowUp') navigateDetail(-1);
            }
        }

        // ==========================================================================
        // Gamepad Loop & Input Polling
        // ==========================================================================
        let lastGamepadState = { up: false, down: false, left: false, right: false, enter: false, back: false };
        let gpActiveDir = null;
        let holdTime = 0, lastRepeatTime = 0;

        function pollGamepads() {
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            for (let i = 0; i < gamepads.length; i++) {
                const gp = gamepads[i]; if (!gp) continue;

                const up = gp.buttons[12]?.pressed || gp.axes[1] < -0.5;
                const down = gp.buttons[13]?.pressed || gp.axes[1] > 0.5;
                const left = gp.buttons[14]?.pressed || gp.axes[0] < -0.5;
                const right = gp.buttons[15]?.pressed || gp.axes[0] > 0.5;
                const enter = gp.buttons[0]?.pressed; // A Button
                const back = gp.buttons[1]?.pressed;   // B Button

                STATE.joyX = Math.abs(gp.axes[0]) > 0.12 ? gp.axes[0] : 0;
                STATE.joyY = Math.abs(gp.axes[1]) > 0.12 ? gp.axes[1] : 0;

                let dir = up ? 'up' : down ? 'down' : left ? 'left' : right ? 'right' : null;
                if (dir) {
                    if (gpActiveDir !== dir) {
                        gpActiveDir = dir; holdTime = Date.now(); lastRepeatTime = Date.now();
                        handleKeydown({ key: { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' }[dir] });
                    } else if (Date.now() - holdTime > 350 && Date.now() - lastRepeatTime > 80) {
                        handleKeydown({ key: { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' }[dir] });
                        lastRepeatTime = Date.now();
                    }
                } else gpActiveDir = null;

                if (enter && !lastGamepadState.enter) executeAction();
                if (back && !lastGamepadState.back) handleSystemBack();

                lastGamepadState = { up, down, left, right, enter, back };
                break;
            }
            requestAnimationFrame(pollGamepads);
        }

        // ==========================================================================
        // Render & Physics Loop
        // ==========================================================================
        let lastTargetElement = null;
        let focusScale = 1.0;

        function tickMicroanimations() {
            const activeTarget = getActiveTarget();
            const currentElement = activeTarget ? activeTarget.icon : null;
            const currentContainer = activeTarget ? activeTarget.container : null;

            const tiltedElements = document.querySelectorAll('.tilted-focus');
            tiltedElements.forEach(el => {
                if (el !== currentElement && el !== currentContainer) {
                    if (!el.springs) { 
                        el.style.transform = ''; 
                        el.classList.remove('tilted-focus'); 
                    }
                }
            });

            springElements.forEach(el => {
                if (!el.isConnected) return;
                const s = el.springs; 
                let changed = false;
                
                if (s.scale.update()) changed = true; 
                if (s.posX.update()) changed = true; 
                if (s.posY.update()) changed = true; 
                if (s.focusState.update()) changed = true;
                
                const isFocused = s.focusState.val > 0.01;
                const isCurrent = (el === currentElement);

                if (changed || isFocused || isCurrent) {
                    const cardMoveScale = 0.48;
                    const springX = s.posX.val * cardMoveScale;
                    const springY = s.posY.val * cardMoveScale;
                    const jX = isCurrent ? STATE.joyX : 0;
                    const jY = isCurrent ? STATE.joyY : 0;
                    
                    const maxIconRotate = 8, maxIconTranslate = 6;
                    const iconRotateY = jX * maxIconRotate;
                    const iconRotateX = -jY * maxIconRotate;
                    const iconTranslateX = jX * maxIconTranslate;
                    const iconTranslateY = jY * maxIconTranslate;
                    const totalTranslateX = springX + iconTranslateX;
                    const totalTranslateY = springY + iconTranslateY;

                    el.style.transform = `scale(${s.scale.val.toFixed(3)}) translate3d(${totalTranslateX.toFixed(2)}px, ${totalTranslateY.toFixed(2)}px, 0) rotateX(${iconRotateX.toFixed(2)}deg) rotateY(${iconRotateY.toFixed(2)}deg)`;
                    el.classList.add('tilted-focus');

                    const f = Math.max(0, s.focusState.val);
                    if (el.glassBorder) el.glassBorder.style.opacity = (0.2 + 0.8 * f).toFixed(3);
                    if (el.shine) {
                        el.shine.style.opacity = f.toFixed(3);
                        if (isFocused) {
                            const shineX = 30 + (s.posX.val * 2.2) + Math.sin(Date.now() * 0.001) * 3;
                            const shineY = 30 + (s.posY.val * 2.2) + Math.cos(Date.now() * 0.001) * 3;
                            el.shine.style.background = `radial-gradient(circle at ${shineX.toFixed(1)}% ${shineY.toFixed(1)}%, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 60%, rgba(255,255,255,0) 100%)`;
                        }
                    }
                }
            });

            // Action overlay button tilts
            if (activeTarget && activeTarget.icon && activeTarget.container && !activeTarget.icon.springs) {
                const container = activeTarget.container;
                const icon = activeTarget.icon;
                if (icon !== lastTargetElement) { focusScale = 1.0; lastTargetElement = icon; }
                focusScale += (1.06 - focusScale) * 0.12;

                container.classList.add('tilted-focus');
                icon.classList.add('tilted-focus');
                
                const maxIconRotate = 8, maxIconTranslate = 6;
                const iconRotateY = STATE.joyX * maxIconRotate;
                const iconRotateX = -STATE.joyY * maxIconRotate;
                const iconTranslateX = STATE.joyX * maxIconTranslate;
                const iconTranslateY = STATE.joyY * maxIconTranslate;

                if (container === icon) {
                    icon.style.transform = `scale(${focusScale}) translate3d(${iconTranslateX}px, ${iconTranslateY}px, 0) rotateX(${iconRotateX}deg) rotateY(${iconRotateY}deg)`;
                }
            }

            requestAnimationFrame(tickMicroanimations);
        }

        window.onload = initApp;
    </script>
</body>
</html>
