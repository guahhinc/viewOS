<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cropwood</title>
    <style>
        /* ==========================================================================
           viewOS System Typography & Layout Constants
           ========================================================================== */
        :root {
            --bg-color: #0b0d09; /* Dark organic moss black */
            --text-color: #ffffff;
            --secondary-text: #a0b0a5; /* Slate-green gray */
            
            /* Symmetrical compact squares - Scaled up for readability */
            --card-width: 185px;
            --card-height: 185px; 
            --border-radius: 14px;
        }

        * {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-weight: 350 !important;
            letter-spacing: -0.015em !important;
            line-height: 1.35;
            box-sizing: border-box;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            /* viewOS maps gamepad/keyboard navigation, so the default cursor is hidden */
            cursor: none !important;
            margin: 0; 
            padding: 0;
        }

        html, body {
            width: 100vw; 
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            overflow-y: auto; /* Enable unrestricted vertical page scrolling */
        }

        #app-root {
            position: relative;
            width: 100%; 
            min-height: 100vh; /* Replaced fixed height to support scrolling */
            padding: 40px 4vw;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Responsive Dual-Column Layout */
        #app-layout {
            display: flex;
            flex-direction: row;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            max-width: 1500px;
            margin-top: 10px;
        }

        #main-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        #app-header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        #app-header h1 { 
            font-size: 3.8rem; 
            font-weight: 500 !important; 
            margin-bottom: 10px; 
            color: #d1ffc4;
        }
        
        #app-header p { 
            font-size: 1.35rem; 
            color: var(--secondary-text); 
            margin-bottom: 20px; 
            transition: color 0.25s ease, font-weight 0.2s ease;
        }

        /* Flat, non-glowing HUD Header block */
        .hud-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px 36px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin: 0 auto;
        }
        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
        }
        .hud-label {
            font-size: 0.95rem;
            color: var(--secondary-text);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 4px;
        }
        .hud-val {
            font-size: 1.65rem;
            font-weight: 500 !important;
            color: #ffffff;
        }

        #content-grid {
            display: grid;
            grid-template-columns: repeat(4, var(--card-width));
            gap: 24px;
            justify-content: center;
            perspective: 1200px;
        }

        .grid-item {
            display: flex; 
            flex-direction: column; 
            align-items: center;
            width: 100%; 
            transform-style: preserve-3d; 
            will-change: transform;
        }

        .card-visual {
            width: var(--card-width); 
            height: var(--card-height);
            background-color: #1c1c1e; 
            border-radius: var(--border-radius);
            position: relative; 
            z-index: 1; 
            transform-style: preserve-3d;
            background-size: cover; 
            background-position: center;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            transition: border-color 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .grid-item.is-focused .card-visual {
            border-color: rgba(115, 255, 131, 0.4);
            box-shadow: 0 0 25px rgba(115, 255, 131, 0.1);
        }

        .card-title {
            font-size: 1.2rem;
            color: var(--secondary-text); 
            margin-top: 12px;
            text-align: center; 
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%;
            transition: color 0.2s ease;
        }

        /* Persistent Inventory & Backpack Sidebar */
        #inventory-sidebar {
            width: 380px;
            background: rgba(255, 255, 255, 0.02);
            border: 1.5px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--border-radius);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-self: flex-start;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .sidebar-title {
            font-size: 1.8rem;
            font-weight: 500 !important;
            color: #d1ffc4;
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 10px;
            margin-bottom: 4px;
        }
        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .section-title {
            font-size: 1.05rem;
            text-transform: uppercase;
            color: var(--secondary-text);
            letter-spacing: 0.06em;
            margin-bottom: 2px;
        }
        .tools-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .tool-slot {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 10px 14px;
        }
        .tool-icon {
            font-size: 1.4rem;
        }
        .tool-text {
            font-size: 1.1rem;
            color: #ffffff;
        }
        .inv-items-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .inv-slot {
            position: relative;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .inv-slot.empty {
            opacity: 0.2;
        }
        .inv-emoji {
            font-size: 1.7rem;
        }
        .inv-badge {
            position: absolute;
            bottom: 4px;
            right: 6px;
            font-size: 0.95rem;
            background: rgba(0, 0, 0, 0.85);
            padding: 1px 6px;
            border-radius: 6px;
            color: #ffffff;
        }

        /* 3D Dynamic Reflection Layers */
        .card-shine {
            position: absolute; 
            inset: 0; 
            border-radius: inherit; 
            pointer-events: none; 
            z-index: 11;
            mix-blend-mode: screen; 
            opacity: 0; 
            will-change: opacity; 
            overflow: hidden;
            transform: translate3d(0, 0, 0.5px);
        }
        
        .card-glass-border {
            position: absolute; 
            inset: 0; 
            border-radius: inherit; 
            pointer-events: none; 
            z-index: 12;
            border: 1.5px solid rgba(255, 255, 255, 0.3); 
            opacity: 0; 
            will-change: opacity;
            transform: translate3d(0, 0, 1px);
        }

        /* Detail Action Overlay */
        #detail-view {
            position: fixed; 
            inset: 0; 
            background: rgba(11, 13, 9, 0.96);
            backdrop-filter: blur(15px);
            display: flex; 
            opacity: 0; 
            pointer-events: none;
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            transition: opacity 0.3s ease; 
            z-index: 1000; 
            padding: 40px;
        }
        #detail-view.visible { 
            opacity: 1; 
            pointer-events: all;
        }
        #detail-view h2 { 
            font-size: 3.6rem; 
            margin-bottom: 24px; 
            color: #d1ffc4;
            font-weight: 400 !important;
        }

        /* Scrollable Action List container */
        #detail-actions {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            margin-bottom: 20px;
            max-height: 420px; /* Reduced to guarantee full visual accessibility and scroll */
            overflow-y: auto;
            padding-right: 12px;
            width: 100%;
        }

        /* Button styling: Smaller layout/padding, but larger text */
        .detail-action-btn {
            font-size: 1.65rem;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            padding: 10px 30px; /* Reduced padding height to fit screen */
            margin: 4px 0; /* Compact spacing */
            border-radius: var(--border-radius);
            width: 520px; /* Slimmed width */
            text-align: center;
            transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d;
            flex-shrink: 0;
        }
        .detail-action-btn.is-focused {
            color: #000000 !important;
            background-color: #ffffff !important;
            border-color: #ffffff !important;
            transform: scale(1.04);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15);
        }
        .detail-action-btn.disabled {
            opacity: 0.3;
        }

        .grid-item.is-focused .card-title { color: #ffffff !important; }
        .tilted-focus { transition: none !important; }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-4px); }
        }
        @keyframes blink {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="app-root">
        <div id="app-layout">
            
            <!-- Left Column Grid Area -->
            <div id="main-column">
                <header id="app-header">
                    <h1>Cropwood</h1>
                    <p>Cozy modular 2D farming estate. Navigate using Arrow Keys/D-pad, Select with Enter/A.</p>
                    
                    <div class="hud-container">
                        <div class="hud-item"><span class="hud-label">DAY</span><span id="hud-day" class="hud-val">1</span></div>
                        <div class="hud-item" style="border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); padding: 0 25px;"><span class="hud-label">GOLD</span><span id="hud-gold" class="hud-val" style="color:#ffd700;">150g</span></div>
                        <div class="hud-item" style="border-right: 1px solid rgba(255,255,255,0.1); padding-right: 25px;"><span class="hud-label">ENERGY</span><span id="hud-energy" class="hud-val" style="color:#00ffcc;">100/100</span></div>
                        <div class="hud-item"><span class="hud-label">TIME LEFT</span><span id="hud-timer" class="hud-val" style="color:#ffcc00;">50s</span></div>
                    </div>

                    <!-- Day progression track bar -->
                    <div id="day-progress-container" style="width: 100%; max-width: 620px; height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; margin: 20px auto 0 auto; overflow: hidden; border: 1.5px solid rgba(255,255,255,0.04);">
                        <div id="day-progress-bar" style="width: 100%; height: 100%; background: linear-gradient(90deg, #ffd700, #ff8c00); transition: width 1s linear; border-radius: 4px;"></div>
                    </div>
                </header>

                <main id="content-grid"></main>
            </div>

            <!-- Right Column Sidebar Portfolio -->
            <aside id="inventory-sidebar">
                <h3 class="sidebar-title">Backpack & Tools</h3>
                
                <div class="sidebar-section">
                    <h4 class="section-title">Active Tools</h4>
                    <div class="tools-grid">
                        <div class="tool-slot"><span class="tool-icon">🚿</span><span id="inv-watercan" class="tool-text">Can: Lvl 1</span></div>
                        <div class="tool-slot"><span class="tool-icon">⛏️</span><span id="inv-hoe" class="tool-text">Hoe: Lvl 1</span></div>
                    </div>
                </div>
                
                <div class="sidebar-section">
                    <h4 class="section-title">Seeds Portfolio</h4>
                    <div class="inv-items-grid" id="inv-seeds-grid"></div>
                </div>

                <div class="sidebar-section">
                    <h4 class="section-title">Harvested Crops</h4>
                    <div class="inv-items-grid" id="inv-crops-grid"></div>
                </div>

                <div class="sidebar-section">
                    <h4 class="section-title">Artisan & Animal Products</h4>
                    <div class="inv-items-grid" id="inv-other-grid"></div>
                </div>
            </aside>

        </div>
    </div>

    <!-- Sub-navigation Overlay -->
    <div id="detail-view">
        <h2 id="detail-title">Facility Details</h2>
        <div id="detail-actions"></div>
    </div>

    <script>
        // ==========================================================================
        // Game State Config & Crop Database
        // ==========================================================================
        const CROPS_DB = {
            wheat: { name: 'Wheat', seedCost: 10, cropSell: 25, maxAge: 2, emoji: '🌾', regrows: false },
            potato: { name: 'Potato', seedCost: 15, cropSell: 35, maxAge: 2, emoji: '🥔', regrows: false },
            carrot: { name: 'Carrot', seedCost: 20, cropSell: 50, maxAge: 3, emoji: '🥕', regrows: false },
            corn: { name: 'Corn', seedCost: 30, cropSell: 40, maxAge: 3, emoji: '🌽', regrows: true, regrowAge: 1 },
            strawberry: { name: 'Strawberry', seedCost: 45, cropSell: 70, maxAge: 4, emoji: '🍓', regrows: true, regrowAge: 2 },
            blueberry: { name: 'Blueberry', seedCost: 50, cropSell: 45, maxAge: 4, emoji: '🫐', regrows: true, regrowAge: 2, multiplier: 2 },

            starfruit: { name: 'Starfruit', seedCost: 90, cropSell: 250, maxAge: 6, emoji: '🌟', regrows: false }
        };

        const seedsConfig = [
            { id: 'wheat', label: 'Wheat', emoji: '🌾' },
            { id: 'potato', label: 'Potato', emoji: '🥔' },
            { id: 'carrot', label: 'Carrot', emoji: '🥕' },
            { id: 'corn', label: 'Corn', emoji: '🌽' },
            { id: 'strawberry', label: 'Strawb.', emoji: '🍓' },
            { id: 'blueberry', label: 'Blueb.', emoji: '🫐' },
            { id: 'pumpkin', label: 'Pump.', emoji: '🎃' },
            { id: 'starfruit', label: 'Starf.', emoji: '🌟' }
        ];

        const otherConfig = [
            { id: 'egg', label: 'Egg', emoji: '🥚' },
            { id: 'milk', label: 'Milk', emoji: '🥛' },
            { id: 'bread', label: 'Bread', emoji: '🍞' },
            { id: 'cheese', label: 'Cheese', emoji: '🧀' },
            { id: 'pie', label: 'Pie', emoji: '🥧' },
            { id: 'cornbread', label: 'Cornb.', emoji: '🌽' },
            { id: 'jam', label: 'Jam', emoji: '🍯' },
            { id: 'soup', label: 'Soup', emoji: '🥣' },
            { id: 'juice', label: 'Juice', emoji: '🍹' }
        ];

        const appItems = [
            // Row 1, 2, & 3: Land Plots (12 total squares)
            { id: "plot-0", title: "Plot 1", type: "plot", plotIndex: 0 },
            { id: "plot-1", title: "Plot 2", type: "plot", plotIndex: 1 },
            { id: "plot-2", title: "Plot 3", type: "plot", plotIndex: 2 },
            { id: "plot-3", title: "Plot 4", type: "plot", plotIndex: 3 },
            { id: "plot-4", title: "Plot 5", type: "plot", plotIndex: 4 },
            { id: "plot-5", title: "Plot 6", type: "plot", plotIndex: 5 },
            { id: "plot-6", title: "Plot 7", type: "plot", plotIndex: 6 },
            { id: "plot-7", title: "Plot 8", type: "plot", plotIndex: 7 },
            { id: "plot-8", title: "Plot 9", type: "plot", plotIndex: 8 },
            { id: "plot-9", title: "Plot 10", type: "plot", plotIndex: 9 },
            { id: "plot-10", title: "Plot 11", type: "plot", plotIndex: 10 },
            { id: "plot-11", title: "Plot 12", type: "plot", plotIndex: 11 },
            // Row 4: Farm Hub Facilities
            { id: "shop", title: "Seed Shop", type: "facility" },
            { id: "coop", title: "Barn & Coop", type: "facility" },
            { id: "shipping", title: "Shipping Bin", type: "facility" }, // Replaced cooking and kitchen
            { id: "farmhouse", title: "Cozy Farmhouse", type: "facility" }
        ];

        const STATE = {
            currentScreen: 'grid', // 'grid' | 'detail'
            focusedIndex: 0,
            detailFocusedIndex: 0,
            columns: 4,
            joyX: 0, joyY: 0,
            
            // Economy & Resources
            gold: 150, 
            day: 1,
            energy: 100,
            maxEnergy: 100,

            // Real-Time Day Configuration - Locked at exactly 50 seconds
            dayDuration: 50, 
            dayTimer: 50,    
            
            seeds: { wheat: 2, potato: 2, carrot: 0, corn: 0, strawberry: 0, blueberry: 0, pumpkin: 0, starfruit: 0 },
            crops: { wheat: 0, potato: 0, carrot: 0, corn: 0, strawberry: 0, blueberry: 0, pumpkin: 0, starfruit: 0 },
            other: { egg: 0, milk: 0, bread: 0, cheese: 0, pie: 0, cornbread: 0, jam: 0, soup: 0, juice: 0 },
            
            plots: [
                { status: 'wild', crop: null },
                { status: 'wild', crop: null },
                { status: 'wild', crop: null },
                { status: 'wild', crop: null },
                { status: 'soil', crop: null },
                { status: 'soil', crop: null },
                { status: 'soil', crop: null },
                { status: 'soil', crop: null },
                { status: 'soil', crop: null },
                { status: 'soil', crop: null },
                { status: 'soil', crop: null },
                { status: 'soil', crop: null }
            ],
            
            // Livestock
            chickens: 0,
            cows: 0,
            animalsFed: false,
            eggsInCoop: 0,
            milkInBarn: 0,
            
            // Tool Upgrades
            waterCanLevel: 1, 
            hoeLevel: 1,      
            
            viewingMilestones: false,
            milestones: {
                firstHarvest: false,
                tycoon: false,
                animalLover: false,
                masterShipper: false, // Updated cooking milestone to shipping
                starPlanter: false
            }
        };

        const DOM_CACHE = {
            grid: document.getElementById('content-grid'),
            detail: document.getElementById('detail-view'),
            detailTitle: document.getElementById('detail-title'),
            detailActions: document.getElementById('detail-actions')
        };

        let cachedElements = [];
        let springElements = [];

        // Helper calculations
        function getTillingCost() { return [15, 8, 2][STATE.hoeLevel - 1]; }
        function getWateringCost() { return [5, 3, 1][STATE.waterCanLevel - 1]; }
        function getCompletedMilestones() { return Object.values(STATE.milestones).filter(Boolean).length; }

        // ==========================================================================
        // Persistence Engine (Browser Storage)
        // ==========================================================================
        function saveGameState() {
            localStorage.setItem('cropwood_save_v2', JSON.stringify({
                gold: STATE.gold,
                day: STATE.day,
                energy: STATE.energy,
                maxEnergy: STATE.maxEnergy,
                seeds: STATE.seeds,
                crops: STATE.crops,
                other: STATE.other,
                plots: STATE.plots,
                chickens: STATE.chickens,
                cows: STATE.cows,
                animalsFed: STATE.animalsFed,
                eggsInCoop: STATE.eggsInCoop,
                milkInBarn: STATE.milkInBarn,
                waterCanLevel: STATE.waterCanLevel,
                hoeLevel: STATE.hoeLevel,
                milestones: STATE.milestones
            }));
        }

        function loadGameState() {
            const saved = localStorage.getItem('cropwood_save_v2');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    for (const key in data) {
                        if (key !== 'plots') {
                            STATE[key] = data[key];
                        }
                    }
                    // Safely reconstruct plot data sizes to prevent mismatch error crashes
                    if (data.plots && Array.isArray(data.plots)) {
                        for (let i = 0; i < STATE.plots.length; i++) {
                            if (data.plots[i]) {
                                STATE.plots[i] = data.plots[i];
                            }
                        }
                    }
                } catch (e) {
                    console.error("Failed to parse local storage profile state", e);
                }
            }
        }

        // ==========================================================================
        // Physics Engine Implementation
        // ==========================================================================
        function Spring(val, stiffness = 0.12, damping = 0.78) {
            this.val = val; 
            this.target = val; 
            this.vel = 0;
            this.stiffness = stiffness; 
            this.damping = damping;
        }
        Spring.prototype.update = function() {
            if (Math.abs(this.target - this.val) < 0.001 && Math.abs(this.vel) < 0.001) {
                this.val = this.target; 
                this.vel = 0; 
                return false;
            }
            const force = (this.target - this.val) * this.stiffness;
            this.vel = (this.vel + force) * this.damping; 
            this.val += this.vel;
            return true;
        };

        function setupSpringPhysics(el) {
            if (el.springs) return;
            el.springs = { 
                scale: new Spring(1.0, 0.15, 0.70), 
                posX: new Spring(0, 0.08, 0.70), 
                posY: new Spring(0, 0.08, 0.70), 
                focusState: new Spring(0, 0.12, 0.80) 
            };
            
            let shine = document.createElement('div'); shine.className = 'card-shine'; 
            let glassBorder = document.createElement('div'); glassBorder.className = 'card-glass-border'; 
            el.shine = shine; el.glassBorder = glassBorder;
            el.appendChild(shine); el.appendChild(glassBorder);
            springElements.push(el);
        }

        // ==========================================================================
        // Application Lifecycle Initializer
        // ==========================================================================
        function initApp() {
            loadGameState(); // Load state before constructing DOM elements

            DOM_CACHE.grid.innerHTML = '';
            cachedElements = [];
            springElements = [];
            
            appItems.forEach((item, index) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'grid-item';
                itemEl.id = `item-${index}`;
                
                itemEl.innerHTML = `
                    <div class="card-visual"></div>
                    <div class="card-title"></div>
                `;
                
                DOM_CACHE.grid.appendChild(itemEl);
                const visual = itemEl.querySelector('.card-visual');
                setupSpringPhysics(visual);
                
                cachedElements.push({ container: itemEl, icon: visual, data: item });
                renderCardContent(index);
            });

            document.addEventListener('keydown', handleKeydown);
            
            requestAnimationFrame(pollGamepads);
            requestAnimationFrame(tickMicroanimations);
            
            updateHUD();
            updateInventorySidebar();
            updateFocus(true);
        }

        function getActiveTarget() {
            if (STATE.currentScreen === 'grid') return cachedElements[STATE.focusedIndex] || null;
            if (STATE.currentScreen === 'detail') {
                const activeBtn = document.getElementById(`action-btn-${STATE.detailFocusedIndex}`);
                if (activeBtn) return { container: activeBtn, icon: activeBtn };
            }
            return null;
        }

        let lastActiveTarget = null;
        function updateFocus(isInitialLoad = false, dx = 0, dy = 0) {
            document.querySelectorAll('.is-focused').forEach(el => el.classList.remove('is-focused'));
            const target = getActiveTarget();

            if (lastActiveTarget && lastActiveTarget.icon && lastActiveTarget.icon.springs && lastActiveTarget !== target) {
                const s = lastActiveTarget.icon.springs; 
                s.scale.target = 1.0; 
                s.focusState.target = 0; 
                s.posX.target = 0; 
                s.posY.target = 0;
                if (dx) s.posX.vel = dx * 22; 
                if (dy) s.posY.vel = dy * 22; 
                lastActiveTarget.icon.style.zIndex = '1';
            }

            if (target && target.icon && target.icon.springs) {
                const s = target.icon.springs; 
                s.scale.target = 1.12; 
                s.focusState.target = 1.0;
                if (dx) s.posX.vel = dx * 28; 
                if (dy) s.posY.vel = dy * 28; 
                target.icon.style.zIndex = '50';
            }

            lastActiveTarget = target;
            if (target && target.container && target.icon) {
                target.container.classList.add('is-focused');
                if (target.icon !== target.container) target.icon.classList.add('is-focused');
                
                // Automatically scroll layout window for visual tracking of grid rows
                target.container.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        }

        // ==========================================================================
        // Quick Contextual Interactions for Grid Clicks
        // ==========================================================================
        function handlePlotGridInteraction(plotIndex) {
            const plot = STATE.plots[plotIndex];
            
            // 1. Instantly clear overgrown trees/brush
            if (plot.status === 'wild') {
                const cost = getTillingCost();
                if (STATE.energy >= cost) {
                    STATE.energy -= cost;
                    plot.status = 'soil';
                    notifySuccess();
                } else {
                    showActionDeniedFeedback("Need more energy to till!");
                }
                return true; 
            }
            
            // 2. Instantly gather mature crops on grid clicks
            if (plot.crop && plot.crop.age >= plot.crop.maxAge) {
                if (STATE.energy >= 5) {
                    STATE.energy -= 5;
                    const multiplier = CROPS_DB[plot.crop.id].multiplier || 1;
                    STATE.crops[plot.crop.id] += multiplier;
                    STATE.milestones.firstHarvest = true;
                    if (plot.crop.id === 'starfruit') STATE.milestones.starPlanter = true;
                    
                    if (CROPS_DB[plot.crop.id].regrows) {
                        plot.crop.age = CROPS_DB[plot.crop.id].regrowAge;
                    } else {
                        plot.crop = null;
                    }
                    notifySuccess();
                } else {
                    showActionDeniedFeedback("Need more energy to harvest!");
                }
                return true; 
            }
            
            // 3. Instantly water dry crops growing on tilled land
            if (plot.crop && plot.status === 'soil') {
                const cost = getWateringCost();
                if (STATE.energy >= cost) {
                    STATE.energy -= cost;
                    plot.status = 'watered';
                    notifySuccess();
                } else {
                    showActionDeniedFeedback("Need more energy to water!");
                }
                return true; 
            }
            
            // 4. Return false to invoke the dynamic Seed selector if empty
            if (plot.crop === null && (plot.status === 'soil' || plot.status === 'watered')) {
                return false; 
            }
            
            return true; 
        }

        // ==========================================================================
        // Sub-navigation & Game Action Lists
        // ==========================================================================
        function getActionsForModule(item) {
            const actions = [];
            
            if (item.type === 'plot') {
                const plot = STATE.plots[item.plotIndex];
                if (plot.crop === null && (plot.status === 'soil' || plot.status === 'watered')) {
                    // Quick seed planter listings
                    seedsConfig.forEach(cfg => {
                        actions.push({
                            text: `Plant ${cfg.label} Seed (Have ${STATE.seeds[cfg.id]})`,
                            disabled: STATE.seeds[cfg.id] <= 0,
                            handler: () => {
                                STATE.seeds[cfg.id]--;
                                plot.crop = { 
                                    id: cfg.id, 
                                    name: cfg.label, 
                                    age: 0, 
                                    maxAge: CROPS_DB[cfg.id].maxAge 
                                };
                                notifySuccess();
                                closeDetailView();
                            }
                        });
                    });
                }
            } else if (item.id === 'shop') {
                // Pure seed purchasing hub
                seedsConfig.forEach(cfg => {
                    const price = CROPS_DB[cfg.id].seedCost;
                    actions.push({
                        text: `Buy ${cfg.label} Seed (${price}g)`,
                        disabled: STATE.gold < price,
                        handler: () => buySeed(cfg.id, price)
                    });
                });
                
                if (STATE.waterCanLevel === 1) {
                    actions.push({ text: "Upgrade to Copper Watering Can (150g)", disabled: STATE.gold < 150, handler: () => { STATE.gold -= 150; STATE.waterCanLevel = 2; notifySuccess(); } });
                } else if (STATE.waterCanLevel === 2) {
                    actions.push({ text: "Upgrade to Golden Watering Can (400g)", disabled: STATE.gold < 400, handler: () => { STATE.gold -= 400; STATE.waterCanLevel = 3; notifySuccess(); } });
                }
                
                if (STATE.hoeLevel === 1) {
                    actions.push({ text: "Upgrade to Steel Hoe (150g)", disabled: STATE.gold < 150, handler: () => { STATE.gold -= 150; STATE.hoeLevel = 2; notifySuccess(); } });
                } else if (STATE.hoeLevel === 2) {
                    actions.push({ text: "Upgrade to Iridium Hoe (400g)", disabled: STATE.gold < 400, handler: () => { STATE.gold -= 400; STATE.hoeLevel = 3; notifySuccess(); } });
                }
            } else if (item.id === 'shipping') {
                // Central crop and yield sales market
                seedsConfig.forEach(cfg => {
                    const price = CROPS_DB[cfg.id].cropSell;
                    const amount = STATE.crops[cfg.id];
                    actions.push({
                        text: `Sell All ${cfg.label} (Have ${amount} | +${amount * price}g)`,
                        disabled: amount <= 0,
                        handler: () => sellItem('crops', cfg.id, price)
                    });
                });

                const productConfigs = [
                    { id: 'egg', label: 'Egg', price: 40 },
                    { id: 'milk', label: 'Milk', price: 90 }
                ];

                productConfigs.forEach(cfg => {
                    const amount = STATE.other[cfg.id] || 0;
                    actions.push({
                        text: `Sell All ${cfg.label}s (Have ${amount} | +${amount * cfg.price}g)`,
                        disabled: amount <= 0,
                        handler: () => sellItem('other', cfg.id, cfg.price)
                    });
                });
            } else if (item.id === 'coop') {
                actions.push({
                    text: `Buy Chicken (120g | Have ${STATE.chickens}/4)`,
                    disabled: STATE.gold < 120 || STATE.chickens >= 4,
                    handler: () => {
                        STATE.gold -= 120;
                        STATE.chickens++;
                        if (STATE.chickens + STATE.cows >= 4) STATE.milestones.animalLover = true;
                        notifySuccess();
                    }
                });
                actions.push({
                    text: `Buy Cow (250g | Have ${STATE.cows}/2)`,
                    disabled: STATE.gold < 250 || STATE.cows >= 2,
                    handler: () => {
                        STATE.gold -= 250;
                        STATE.cows++;
                        if (STATE.chickens + STATE.cows >= 4) STATE.milestones.animalLover = true;
                        notifySuccess();
                    }
                });
                
                const feedCost = (STATE.chickens * 5) + (STATE.cows * 10);
                actions.push({
                    text: `Feed Barn & Coop (Costs ${feedCost}g)`,
                    disabled: STATE.gold < feedCost || (STATE.chickens + STATE.cows <= 0) || STATE.animalsFed,
                    handler: () => {
                        STATE.gold -= feedCost;
                        STATE.animalsFed = true;
                        notifySuccess();
                    }
                });
                
                const eggs = STATE.eggsInCoop;
                const milk = STATE.milkInBarn;
                actions.push({
                    text: `Collect Products (Gather ${eggs} Eggs, ${milk} Milk)`,
                    disabled: eggs + milk <= 0,
                    handler: () => {
                        STATE.other.egg += eggs;
                        STATE.other.milk += milk;
                        STATE.eggsInCoop = 0;
                        STATE.milkInBarn = 0;
                        notifySuccess();
                    }
                });
            } else if (item.id === 'farmhouse') {
                if (STATE.viewingMilestones) {
                    actions.push({ text: `🌾 First Harvest: ${STATE.milestones.firstHarvest ? 'COMPLETED' : 'LOCKED'}`, disabled: true });
                    actions.push({ text: `💰 Tycoon (1k gold balance): ${STATE.milestones.tycoon ? 'COMPLETED' : 'LOCKED'}`, disabled: true });
                    actions.push({ text: `🐮 Animal Lover (4 livestock): ${STATE.milestones.animalLover ? 'COMPLETED' : 'LOCKED'}`, disabled: true });
                    actions.push({ text: `📦 Master Shipper (Use Shipping Bin): ${STATE.milestones.masterShipper ? 'COMPLETED' : 'LOCKED'}`, disabled: true });
                    actions.push({ text: `✨ Star Planter (Starfruit): ${STATE.milestones.starPlanter ? 'COMPLETED' : 'LOCKED'}`, disabled: true });
                    actions.push({
                        text: "Back",
                        disabled: false,
                        handler: () => {
                            STATE.viewingMilestones = false;
                            renderDetailMenu();
                        }
                    });
                } else {
                    actions.push({
                        text: `Check Milestones (${getCompletedMilestones()}/5 Completed)`,
                        disabled: false,
                        handler: () => {
                            STATE.viewingMilestones = true;
                            renderDetailMenu();
                        }
                    });
                    actions.push({
                        text: "Reset Game Data (Wipes Save)",
                        disabled: false,
                        handler: () => {
                            if (confirm("Are you sure you want to delete all saved data? This will reload the page.")) {
                                localStorage.removeItem('cropwood_save_v2');
                                window.location.reload();
                            }
                        }
                    });
                }
            }
            
            if (!STATE.viewingMilestones) {
                actions.push({
                    text: "Back",
                    disabled: false,
                    handler: () => closeDetailView()
                });
            }
            
            return actions;
        }

        function buySeed(type, cost) {
            STATE.gold -= cost;
            STATE.seeds[type]++;
            notifySuccess();
        }

        function sellItem(category, type, price) {
            const amount = category === 'crops' ? STATE.crops[type] : STATE.other[type];
            STATE.gold += amount * price;
            if (category === 'crops') STATE.crops[type] = 0;
            else STATE.other[type] = 0;
            STATE.milestones.masterShipper = true; // Complete Milestone using Bin
            notifySuccess();
        }

        function notifySuccess() {
            if (STATE.gold >= 1000) STATE.milestones.tycoon = true;
            updateHUD();
            updateInventorySidebar();
            renderCardContent(STATE.focusedIndex);
            saveGameState(); // Auto-save all state changes to local storage
            if (STATE.currentScreen === 'detail') {
                renderDetailMenu();
            }
        }

        // ==========================================================================
        // Sub-navigation Framework & Dynamic Scrolling
        // ==========================================================================
        function renderDetailMenu() {
            const item = appItems[STATE.focusedIndex];
            DOM_CACHE.detailTitle.innerText = item.title;
            DOM_CACHE.detailActions.innerHTML = '';
            
            const actions = getActionsForModule(item);
            actions.forEach((act, idx) => {
                const btn = document.createElement('div');
                btn.className = 'detail-action-btn';
                btn.id = `action-btn-${idx}`;
                btn.innerText = act.text;
                if (act.disabled) {
                    btn.classList.add('disabled');
                }
                DOM_CACHE.detailActions.appendChild(btn);
            });
            
            STATE.detailFocusedIndex = 0;
            updateDetailFocus();
        }

        function updateDetailFocus() {
            document.querySelectorAll('.detail-action-btn').forEach(btn => btn.classList.remove('is-focused'));
            const activeBtn = document.getElementById(`action-btn-${STATE.detailFocusedIndex}`);
            if (activeBtn) {
                activeBtn.classList.add('is-focused');
                // Ensure dynamic vertical scrolling for keyboard/gamepad navigation inside details overlay
                activeBtn.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        }

        function navigateDetail(dir) {
            const actions = getActionsForModule(appItems[STATE.focusedIndex]);
            const total = actions.length;
            let nextIndex = STATE.detailFocusedIndex;
            
            for (let i = 0; i < total; i++) {
                nextIndex = (nextIndex + dir + total) % total;
                if (!actions[nextIndex].disabled) {
                    STATE.detailFocusedIndex = nextIndex;
                    updateDetailFocus();
                    break;
                }
            }
        }

        function executeDetailAction() {
            const actions = getActionsForModule(appItems[STATE.focusedIndex]);
            const act = actions[STATE.detailFocusedIndex];
            if (act && !act.disabled) {
                act.handler();
            }
        }

        function closeDetailView() {
            STATE.viewingMilestones = false;
            STATE.currentScreen = 'grid';
            DOM_CACHE.detail.classList.remove('visible');
            updateFocus(false);
        }

        // ==========================================================================
        // Seamless Automated Overnight Calculations (No Popups)
        // ==========================================================================
        function startNextDay() {
            STATE.day++;
            STATE.energy = STATE.maxEnergy;
            STATE.dayTimer = STATE.dayDuration; // Reset to exactly 50 seconds

            // Auto close sub menus
            if (STATE.currentScreen === 'detail') {
                closeDetailView();
            }

            // Advance Crops growth
            let cropsGrown = 0;
            STATE.plots.forEach((plot, index) => {
                if (plot.crop) {
                    if (plot.status === 'watered') {
                        plot.crop.age++;
                        cropsGrown++;
                    }
                }
                if (plot.status === 'watered') {
                    plot.status = 'soil';
                }
            });
            
            // Animal production yields
            let eggsLaid = 0;
            let milkProduced = 0;
            if (STATE.chickens > 0 || STATE.cows > 0) {
                if (STATE.animalsFed) {
                    eggsLaid = STATE.chickens;
                    STATE.eggsInCoop += eggsLaid;
                    
                    milkProduced = STATE.cows;
                    STATE.milkInBarn += milkProduced;
                    
                    STATE.animalsFed = false;
                }
            }
            
            updateHUD();
            updateInventorySidebar();
            for (let i = 0; i < 16; i++) {
                renderCardContent(i);
            }
            
            saveGameState(); // Auto-save on day transition
            
            // Non-intrusive status report banner in the header description
            let summaryMsg = `☀️ Day ${STATE.day} started! `;
            const eventsText = [];
            if (cropsGrown > 0) eventsText.push(`🌱 ${cropsGrown} plots grew`);
            if (eggsLaid > 0) eventsText.push(`🥚 ${eggsLaid} eggs laid`);
            if (milkProduced > 0) eventsText.push(`🥛 ${milkProduced} milk produced`);
            if ((STATE.chickens + STATE.cows > 0) && !STATE.animalsFed) eventsText.push(`🐔 Animals hungry`);
            
            if (eventsText.length > 0) {
                summaryMsg += eventsText.join(" | ");
            } else {
                summaryMsg += "Energy fully restored!";
            }

            showDayNotificationBanner(summaryMsg);
        }

        // ==========================================================================
        // Input Routing
        // ==========================================================================
        function executeAction() {
            if (STATE.currentScreen === 'grid') {
                const item = appItems[STATE.focusedIndex];
                
                // Direct context click validation checks
                if (item.type === 'plot') {
                    const resolvedInstantly = handlePlotGridInteraction(item.plotIndex);
                    if (resolvedInstantly) return; // Action solved instantly without sub-menus
                }
                
                STATE.currentScreen = 'detail';
                DOM_CACHE.detail.classList.add('visible');
                renderDetailMenu();
                updateFocus(false);
            } else if (STATE.currentScreen === 'detail') {
                executeDetailAction();
            }
        }

        function handleSystemBack() {
            if (STATE.currentScreen === 'detail') {
                closeDetailView();
            } else {
                window.parent.postMessage({ type: 'exitApp' }, '*');
            }
        }

        function handleKeydown(e) {
            if (e && typeof e.preventDefault === 'function') e.preventDefault();
            
            let dx = 0, dy = 0;
            const c = STATE.columns, t = appItems.length;

            if (e.key === 'Escape' || e.key === 'Backspace') { handleSystemBack(); return; }
            if (e.key === 'Enter' || e.key === ' ') { executeAction(); return; }

            if (STATE.currentScreen === 'grid') {
                if (e.key === 'ArrowRight' && (STATE.focusedIndex + 1) % c !== 0 && STATE.focusedIndex + 1 < t) { STATE.focusedIndex++; dx = 1; }
                else if (e.key === 'ArrowLeft' && STATE.focusedIndex % c !== 0) { STATE.focusedIndex--; dx = -1; }
                else if (e.key === 'ArrowDown' && STATE.focusedIndex + c < t) { STATE.focusedIndex += c; dy = 1; }
                else if (e.key === 'ArrowUp' && STATE.focusedIndex - c >= 0) { STATE.focusedIndex -= c; dy = -1; }
                
                if (dx !== 0 || dy !== 0) updateFocus(false, dx, dy);
            } else if (STATE.currentScreen === 'detail') {
                if (e.key === 'ArrowDown') navigateDetail(1);
                else if (e.key === 'ArrowUp') navigateDetail(-1);
            }
        }

        // ==========================================================================
        // Gamepad Loop & Input Polling
        // ==========================================================================
        let lastGamepadState = { up: false, down: false, left: false, right: false, enter: false, back: false };
        let gpActiveDir = null;
        let holdTime = 0, lastRepeatTime = 0;

        function pollGamepads() {
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            for (let i = 0; i < gamepads.length; i++) {
                const gp = gamepads[i]; if (!gp) continue;

                const up = gp.buttons[12]?.pressed || gp.axes[1] < -0.5;
                const down = gp.buttons[13]?.pressed || gp.axes[1] > 0.5;
                const left = gp.buttons[14]?.pressed || gp.axes[0] < -0.5;
                const right = gp.buttons[15]?.pressed || gp.axes[0] > 0.5;
                const enter = gp.buttons[0]?.pressed; 
                const back = gp.buttons[1]?.pressed;   

                STATE.joyX = Math.abs(gp.axes[0]) > 0.12 ? gp.axes[0] : 0;
                STATE.joyY = Math.abs(gp.axes[1]) > 0.12 ? gp.axes[1] : 0;

                let dir = up ? 'up' : down ? 'down' : left ? 'left' : right ? 'right' : null;
                if (dir) {
                    if (gpActiveDir !== dir) {
                        gpActiveDir = dir; holdTime = Date.now(); lastRepeatTime = Date.now();
                        handleKeydown({ key: { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' }[dir] });
                    } else if (Date.now() - holdTime > 350 && Date.now() - lastRepeatTime > 80) {
                        handleKeydown({ key: { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' }[dir] });
                        lastRepeatTime = Date.now();
                    }
                } else gpActiveDir = null;

                if (enter && !lastGamepadState.enter) executeAction();
                if (back && !lastGamepadState.back) handleSystemBack();

                lastGamepadState = { up, down, left, right, enter, back };
                break;
            }
            requestAnimationFrame(pollGamepads);
        }

        // ==========================================================================
        // Render & Physics Loop
        // ==========================================================================
        let lastTargetElement = null;
        let focusScale = 1.0;

        function tickMicroanimations() {
            const activeTarget = getActiveTarget();
            const currentElement = activeTarget ? activeTarget.icon : null;
            const currentContainer = activeTarget ? activeTarget.container : null;

            const tiltedElements = document.querySelectorAll('.tilted-focus');
            tiltedElements.forEach(el => {
                if (el !== currentElement && el !== currentContainer) {
                    if (!el.springs) { 
                        el.style.transform = ''; 
                        el.classList.remove('tilted-focus'); 
                    }
                }
            });

            springElements.forEach(el => {
                if (!el.isConnected) return;
                const s = el.springs; 
                let changed = false;
                
                if (s.scale.update()) changed = true; 
                if (s.posX.update()) changed = true; 
                if (s.posY.update()) changed = true; 
                if (s.focusState.update()) changed = true;
                
                const isFocused = s.focusState.val > 0.01;
                const isCurrent = (el === currentElement);

                if (changed || isFocused || isCurrent) {
                    const cardMoveScale = 0.48;
                    const springX = s.posX.val * cardMoveScale;
                    const springY = s.posY.val * cardMoveScale;
                    const jX = isCurrent ? STATE.joyX : 0;
                    const jY = isCurrent ? STATE.joyY : 0;
                    
                    const maxIconRotate = 8, maxIconTranslate = 6;
                    const iconRotateY = jX * maxIconRotate;
                    const iconRotateX = -jY * maxIconRotate;
                    const iconTranslateX = jX * maxIconTranslate;
                    const iconTranslateY = jY * maxIconTranslate;
                    const totalTranslateX = springX + iconTranslateX;
                    const totalTranslateY = springY + iconTranslateY;

                    el.style.transform = `scale(${s.scale.val.toFixed(3)}) translate3d(${totalTranslateX.toFixed(2)}px, ${totalTranslateY.toFixed(2)}px, 0) rotateX(${iconRotateX.toFixed(2)}deg) rotateY(${iconRotateY.toFixed(2)}deg)`;
                    el.classList.add('tilted-focus');

                    const f = Math.max(0, s.focusState.val);
                    if (el.glassBorder) el.glassBorder.style.opacity = (0.2 + 0.8 * f).toFixed(3);
                    if (el.shine) {
                        el.shine.style.opacity = f.toFixed(3);
                        if (isFocused) {
                            const shineX = 30 + (s.posX.val * 2.2) + Math.sin(Date.now() * 0.001) * 3;
                            const shineY = 30 + (s.posY.val * 2.2) + Math.cos(Date.now() * 0.001) * 3;
                            el.shine.style.background = `radial-gradient(circle at ${shineX.toFixed(1)}% ${shineY.toFixed(1)}%, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 60%, rgba(255,255,255,0) 100%)`;
                        }
                    }
                }
            });

            // Handle non-spring elements inside sub-menus
            if (activeTarget && activeTarget.icon && activeTarget.container && !activeTarget.icon.springs) {
                const container = activeTarget.container;
                const icon = activeTarget.icon;
                if (icon !== lastTargetElement) { focusScale = 1.0; lastTargetElement = icon; }
                focusScale += (1.05 - focusScale) * 0.12;

                container.classList.add('tilted-focus');
                icon.classList.add('tilted-focus');
                
                const maxIconRotate = 8, maxIconTranslate = 6;
                const iconRotateY = STATE.joyX * maxIconRotate;
                const iconRotateX = -STATE.joyY * maxIconRotate;
                const iconTranslateX = STATE.joyX * maxIconTranslate;
                const iconTranslateY = STATE.joyY * maxIconTranslate;

                if (container === icon) {
                    icon.style.transform = `scale(${focusScale}) translate3d(${iconTranslateX}px, ${iconTranslateY}px, 0) rotateX(${iconRotateX}deg) rotateY(${iconRotateY}deg)`;
                }
            }

            requestAnimationFrame(tickMicroanimations);
        }

        // ==========================================================================
        // Automated Day Progression Interval Loop (Locked at exactly 50s)
        // ==========================================================================
        setInterval(() => {
            STATE.dayTimer--;
            if (STATE.dayTimer <= 0) {
                STATE.dayTimer = STATE.dayDuration;
                startNextDay();
            }
            updateHUD();
        }, 1000);

        window.onload = initApp;
    </script>
</body>
</html>
