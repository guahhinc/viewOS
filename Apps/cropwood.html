<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIFT - viewOS</title>
    <style>
        /* ==========================================================================
           viewOS System Typography & Layout Constants
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;700&display=swap');

        :root {
            --bg-color: #0c0c0e;
            --text-color: #ffffff;
            --secondary-text: #8e8e93;
            --card-width: 320px;
            --card-height: calc(var(--card-width) * 0.625); /* 16:10 aspect ratio */
            --border-radius: 8px;
        }

        * {
            font-family: 'Inter Tight', -apple-system, sans-serif;
            font-weight: 300 !important;
            letter-spacing: -0.02em !important;
            line-height: 1.25;
            box-sizing: border-box;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            cursor: none !important; /* Managed by gamepad/system interface */
            margin: 0; 
            padding: 0;
        }

        html, body {
            width: 100vw; 
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        #app-root {
            position: relative;
            width: 100%; 
            height: 100%;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
            padding: 100px 4vw 140px 4vw;
        }

        #app-header {
            text-align: center;
            margin-bottom: 80px;
        }
        
        #app-header h1 { 
            font-size: 3.6rem; 
            font-weight: 700 !important; 
            margin-bottom: 16px; 
            text-transform: uppercase;
            letter-spacing: 0.1em !important;
        }
        #app-header p { font-size: 1.5rem; color: var(--secondary-text); max-width: 800px; margin: 0 auto; }

        #content-grid {
            display: grid;
            grid-template-columns: repeat(3, var(--card-width));
            gap: 45px;
            justify-content: center;
            perspective: 1200px;
        }

        .grid-item {
            display: flex; 
            flex-direction: column; 
            align-items: center;
            width: 100%; 
            transform-style: preserve-3d; 
            will-change: transform;
        }

        .card-visual {
            width: var(--card-width); 
            height: var(--card-height);
            border-radius: var(--border-radius);
            position: relative; 
            z-index: 1; 
            transform-style: preserve-3d;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            transition: border-color 0.2s;
            overflow: hidden;
        }

        .grid-item.is-focused .card-visual {
            border-color: rgba(255, 255, 255, 0.35);
        }

        .card-title {
            font-size: 1.5rem;
            color: var(--secondary-text); 
            margin-top: 24px;
            text-align: center; 
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%;
            transition: color 0.2s ease;
        }

        /* 3D Dynamic Reflection Layers */
        .card-shine {
            position: absolute; 
            inset: 0; 
            border-radius: inherit; 
            pointer-events: none; 
            z-index: 11;
            mix-blend-mode: screen; 
            opacity: 0; 
            will-change: opacity; 
            overflow: hidden;
            transform: translate3d(0, 0, 0.5px);
        }
        
        .card-glass-border {
            position: absolute; 
            inset: 0; 
            border-radius: inherit; 
            pointer-events: none; 
            z-index: 12;
            border: 1.5px solid rgba(255, 255, 255, 0.2); 
            opacity: 0; 
            will-change: opacity;
            transform: translate3d(0, 0, 1px);
        }

        /* Fullscreen Game Overlay Stage */
        #detail-view {
            position: fixed; 
            inset: 0; 
            background: #000000;
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            opacity: 0; 
            transition: opacity 0.3s ease; 
            z-index: 1000; 
            padding: 0;
            overflow: hidden;
        }
        #detail-view.visible { display: flex; opacity: 1; }

        .grid-item.is-focused .card-title { color: #ffffff !important; }
        .tilted-focus { transition: none !important; }

        /* ==========================================================================
           Minimalist HUD & Game State Overlays (Standard Theme)
           ========================================================================== */
        .hud-panel {
            background: rgba(18, 18, 20, 0.9) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            padding: 16px 24px !important;
            border-radius: var(--border-radius) !important;
            min-width: 240px !important;
            backdrop-filter: blur(12px) !important;
        }
        .hud-label {
            font-size: 0.8rem !important;
            color: #8e8e93 !important;
            text-transform: uppercase !important;
            letter-spacing: 0.05em !important;
            margin-bottom: 4px !important;
        }
        .hud-value {
            font-size: 1.8rem !important;
            font-weight: 400 !important;
            color: #ffffff !important;
        }
        .hud-small-text {
            font-size: 0.75rem !important;
            color: #8e8e93 !important;
            margin-top: 4px;
        }
        .overlay-btn {
            font-size: 1.5rem !important; 
            color: #ffffff; 
            background: rgba(255, 255, 255, 0.08);
            padding: 16px 40px !important; 
            border-radius: var(--border-radius);
            transform-style: preserve-3d; 
            transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }
        .overlay-btn.is-focused {
            color: #000000 !important;
            background-color: #ffffff !important;
            transform: scale(1.05);
        }
    </style>
    <!-- Import Three.js Library for True 3D Rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- Main Navigation / Launcher Root -->
    <div id="app-root">
        <header id="app-header">
            <h1>Drift</h1>
            <p>A minimalist 3D driving simulator. Push the joystick forward to accelerate, steer into curves, and beat your best record on each circuit.</p>
        </header>

        <!-- Dynamic Level Selection Grid -->
        <main id="content-grid"></main>
    </div>

    <!-- Active Simulator Container -->
    <div id="detail-view">
        <canvas id="game-canvas" style="position:absolute; inset:0; width:100%; height:100%; z-index:1000;"></canvas>
        
        <!-- Standard HUD Overlay -->
        <div id="game-hud" style="display:none; position:absolute; top:40px; left:40px; right:40px; pointer-events:none; display:flex; justify-content:space-between; align-items:center; z-index:1100;">
            <div class="hud-panel">
                <div class="hud-label">Circuit</div>
                <div id="hud-track-name" class="hud-value">URBAN CIRCUIT</div>
            </div>
            <div class="hud-panel" style="text-align:center;">
                <div class="hud-label">Velocity</div>
                <div id="hud-speed" class="hud-value" style="font-family: monospace !important;">0 KM/H</div>
                <div class="hud-small-text">PUSH STICK UP TO ACCELERATE</div>
            </div>
            <div class="hud-panel" style="text-align:right;">
                <div class="hud-label">Record</div>
                <div id="hud-record" class="hud-value" style="color: #a0a0a5; font-family: monospace !important;">000,000</div>
                <div class="hud-small-text">SCORE: <span id="hud-score" style="color:#ffffff;">0</span></div>
            </div>
        </div>

        <!-- Terminal Pause / End Overlays -->
        <div id="game-overlay" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,0.85); z-index:1200; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
            <h2 id="overlay-title" style="font-size:3.5rem; text-transform:uppercase; margin-bottom:16px; font-weight:700 !important;">SIMULATION PAUSED</h2>
            <p id="overlay-subtitle" style="font-size:1.4rem; color:var(--secondary-text); margin-bottom:48px; max-width:600px;">SYSTEM HALTED.</p>
            <div id="overlay-buttons" style="display:flex; gap:24px;">
                <div id="game-retry-btn" class="overlay-btn is-focused">Resume Drive</div>
                <div id="game-exit-btn" class="overlay-btn">Return to Menu</div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================================================
        // Track Lists & State Variables
        // ==========================================================================
        const appItems = [
            { id: 0, title: "Urban Circuit", color: "#1c2541", length: 120, curveScale: 0.8, obstacleDensity: 0.12, difficulty: "Easy" },
            { id: 1, title: "Desert Highway", color: "#328cc1", length: 180, curveScale: 1.5, obstacleDensity: 0.16, difficulty: "Medium" },
            { id: 2, title: "Alpine Drift", color: "#1f1a3a", length: 240, curveScale: 2.2, obstacleDensity: 0.20, difficulty: "Hard" }
        ];

        const STATE = {
            currentScreen: 'grid', // 'grid' | 'game'
            focusedIndex: 0,
            overlayFocusedIndex: 0,
            columns: 3,
            joyX: 0, joyY: 0,
            highScores: { 0: 0, 1: 0, 2: 0 }
        };

        const DOM_CACHE = {
            grid: document.getElementById('content-grid'),
            detail: document.getElementById('detail-view'),
        };

        let cachedElements = [];
        let springElements = [];

        // ==========================================================================
        // Physics Engine Implementation (Selection System)
        // ==========================================================================
        function Spring(val, stiffness = 0.12, damping = 0.78) {
            this.val = val; 
            this.target = val; 
            this.vel = 0;
            this.stiffness = stiffness; 
            this.damping = damping;
        }
        Spring.prototype.update = function() {
            if (Math.abs(this.target - this.val) < 0.001 && Math.abs(this.vel) < 0.001) {
                this.val = this.target; 
                this.vel = 0; 
                return false;
            }
            const force = (this.target - this.val) * this.stiffness;
            this.vel = (this.vel + force) * this.damping; 
            this.val += this.vel;
            return true;
        };

        function setupSpringPhysics(el) {
            if (el.springs) return;
            el.springs = { 
                scale: new Spring(1.0, 0.15, 0.70), 
                posX: new Spring(0, 0.08, 0.70), 
                posY: new Spring(0, 0.08, 0.70), 
                focusState: new Spring(0, 0.12, 0.80) 
            };
            
            let shine = document.createElement('div'); shine.className = 'card-shine'; 
            let glassBorder = document.createElement('div'); glassBorder.className = 'card-glass-border'; 
            el.shine = shine; el.glassBorder = glassBorder;
            el.appendChild(shine); el.appendChild(glassBorder);
            springElements.push(el);
        }

        // ==========================================================================
        // Application Lifecycle Initializer
        // ==========================================================================
        function initApp() {
            buildGridMenu();

            document.addEventListener('keydown', handleKeydown);
            document.addEventListener('keyup', handleKeyup);
            
            requestAnimationFrame(pollGamepads);
            requestAnimationFrame(tickMicroanimations);
        }

        function buildGridMenu() {
            DOM_CACHE.grid.innerHTML = '';
            cachedElements = [];
            
            appItems.forEach((item, index) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'grid-item';
                itemEl.id = `item-${index}`;
                
                let scoreText = '';
                if (STATE.highScores[item.id] > 0) {
                    scoreText = `<div style="position:absolute; top:20px; right:20px; font-size:1rem; color:#ffea00; font-family:monospace; font-weight:700 !important;">RECORD: ${STATE.highScores[item.id].toLocaleString()}</div>`;
                }

                itemEl.innerHTML = `
                    <div class="card-visual" style="background: linear-gradient(135deg, ${item.color}bb, #0c0c0e 85%);">
                        ${scoreText}
                        <div style="position:absolute; bottom:20px; left:20px; font-size:1rem; color: #8e8e93; letter-spacing: 0.05em !important; text-transform: uppercase; font-weight:700 !important;">
                            ${item.difficulty} • ${(item.length * 10 / 1000).toFixed(1)}KM
                        </div>
                    </div>
                    <div class="card-title">${item.title}</div>
                `;
                
                DOM_CACHE.grid.appendChild(itemEl);
                const visual = itemEl.querySelector('.card-visual');
                setupSpringPhysics(visual);
                
                cachedElements.push({ container: itemEl, icon: visual, data: item });
            });
            updateFocus(true);
        }

        function getActiveTarget() {
            if (STATE.currentScreen === 'grid') return cachedElements[STATE.focusedIndex] || null;
            return null;
        }

        let lastActiveTarget = null;
        function updateFocus(isInitialLoad = false, dx = 0, dy = 0) {
            document.querySelectorAll('.is-focused').forEach(el => el.classList.remove('is-focused'));
            const target = getActiveTarget();

            if (lastActiveTarget && lastActiveTarget.icon && lastActiveTarget.icon.springs && lastActiveTarget !== target) {
                const s = lastActiveTarget.icon.springs; 
                s.scale.target = 1.0; 
                s.focusState.target = 0; 
                s.posX.target = 0; 
                s.posY.target = 0;
                if (dx) s.posX.vel = dx * 22; 
                if (dy) s.posY.vel = dy * 22; 
                lastActiveTarget.icon.style.zIndex = '1';
            }

            if (target && target.icon && target.icon.springs) {
                const s = target.icon.springs; 
                s.scale.target = 1.1;
                s.focusState.target = 1.0;
                if (dx) s.posX.vel = dx * 28; 
                if (dy) s.posY.vel = dy * 28; 
                target.icon.style.zIndex = '50';
            }

            lastActiveTarget = target;
            if (target && target.container && target.icon) {
                target.container.classList.add('is-focused');
                if (target.icon !== target.container) target.icon.classList.add('is-focused');
            }
        }

        // ==========================================================================
        // Input Routing
        // ==========================================================================
        function executeAction() {
            if (STATE.currentScreen === 'grid') {
                const item = appItems[STATE.focusedIndex];
                startGame(item);
            }
        }

        function handleSystemBack() {
            if (STATE.currentScreen === 'game') {
                if (game.state === 'running') {
                    pauseGame();
                } else {
                    closeGame();
                }
            } else {
                window.parent.postMessage({ type: 'exitApp' }, '*');
            }
        }

        const keysPressed = {};
        const INPUT_STATE = {
            steer: 0,
            boost: false,
            brake: false,
            enter: false,
            back: false
        };

        function handleKeydown(e) {
            keysPressed[e.key] = true;
            
            if (STATE.currentScreen === 'grid') {
                if (e && typeof e.preventDefault === 'function') e.preventDefault();
                let dx = 0, dy = 0;
                const c = STATE.columns, t = appItems.length;

                if (e.key === 'Escape' || e.key === 'Backspace') { handleSystemBack(); return; }
                if (e.key === 'Enter' || e.key === ' ') { executeAction(); return; }

                if (e.key === 'ArrowRight' && (STATE.focusedIndex + 1) % c !== 0 && STATE.focusedIndex + 1 < t) { STATE.focusedIndex++; dx = 1; }
                else if (e.key === 'ArrowLeft' && STATE.focusedIndex % c !== 0) { STATE.focusedIndex--; dx = -1; }
                else if (e.key === 'ArrowDown' && STATE.focusedIndex + c < t) { STATE.focusedIndex += c; dy = 1; }
                else if (e.key === 'ArrowUp' && STATE.focusedIndex - c >= 0) { STATE.focusedIndex -= c; dy = -1; }
                
                if (dx !== 0 || dy !== 0) updateFocus(false, dx, dy);
            } else if (STATE.currentScreen === 'game') {
                if (game.state === 'running') {
                    if (e.key === 'Escape' || e.key === 'Backspace') {
                        e.preventDefault();
                        pauseGame();
                    }
                } else {
                    if (e && typeof e.preventDefault === 'function') e.preventDefault();
                    if (e.key === 'ArrowLeft') {
                        STATE.overlayFocusedIndex = 0;
                        updateOverlayFocus();
                    } else if (e.key === 'ArrowRight') {
                        STATE.overlayFocusedIndex = 1;
                        updateOverlayFocus();
                    } else if (e.key === 'Enter' || e.key === ' ') {
                        executeOverlayAction();
                    } else if (e.key === 'Escape' || e.key === 'Backspace') {
                        closeGame();
                    }
                }
            }
        }

        function handleKeyup(e) {
            keysPressed[e.key] = false;
        }

        let lastGamepadState = { up: false, down: false, left: false, right: false, enter: false, back: false };
        let gpActiveDir = null;
        let holdTime = 0, lastRepeatTime = 0;

        function pollGamepads() {
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            for (let i = 0; i < gamepads.length; i++) {
                const gp = gamepads[i]; if (!gp) continue;

                const up = gp.buttons[12]?.pressed || gp.axes[1] < -0.5;
                const down = gp.buttons[13]?.pressed || gp.axes[1] > 0.5;
                const left = gp.buttons[14]?.pressed || gp.axes[0] < -0.5;
                const right = gp.buttons[15]?.pressed || gp.axes[0] > 0.5;
                const enter = gp.buttons[0]?.pressed; // A
                const back = gp.buttons[1]?.pressed;   // B

                // Continuous joystick capture
                STATE.joyX = Math.abs(gp.axes[0]) > 0.15 ? gp.axes[0] : 0;
                STATE.joyY = Math.abs(gp.axes[1]) > 0.15 ? gp.axes[1] : 0;

                let dir = up ? 'up' : down ? 'down' : left ? 'left' : right ? 'right' : null;
                if (dir) {
                    if (gpActiveDir !== dir) {
                        gpActiveDir = dir; holdTime = Date.now(); lastRepeatTime = Date.now();
                        handleKeydown({ key: { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' }[dir] });
                    } else if (Date.now() - holdTime > 350 && Date.now() - lastRepeatTime > 80) {
                        handleKeydown({ key: { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' }[dir] });
                        lastRepeatTime = Date.now();
                    }
                } else gpActiveDir = null;

                if (enter && !lastGamepadState.enter) {
                    if (STATE.currentScreen === 'grid') executeAction();
                    else if (STATE.currentScreen === 'game' && game.state !== 'running') executeOverlayAction();
                }
                if (back && !lastGamepadState.back) {
                    handleSystemBack();
                }

                lastGamepadState = { up, down, left, right, enter, back };
                break;
            }
            requestAnimationFrame(pollGamepads);
        }

        // ==========================================================================
        // True WebGL 3D Driving Simulator Implementation (Three.js)
        // ==========================================================================
        let scene, camera, renderer;
        const segmentLength = 10; // units per segment

        const game = {
            track: null,
            road: [],
            position: 0,
            speed: 0,
            maxSpeed: 4.5,
            playerX: 0,
            playerVX: 0,
            score: 0,
            state: 'idle', // 'idle' | 'running' | 'paused' | 'gameover' | 'victory'
            carMesh: null,
            obstacles: [],
            particles: [],
            countdown: 0,
            shakeAmount: 0
        };

        function buildProcedural3DTrack(track) {
            const segments = [];
            let currentX = 0;
            let currentY = 0;
            let curve = 0;
            let hill = 0;

            const roadGroup = new THREE.Group();
            scene.add(roadGroup);

            for (let i = 0; i < track.length; i++) {
                if (i > 15 && i % 25 === 0) {
                    curve = (Math.random() - 0.5) * track.curveScale;
                    hill = (Math.random() - 0.5) * 0.4;
                }
                // Maintain flat landing area near start/finish
                if (i < 10 || i > track.length - 15) {
                    curve = 0;
                    hill = 0;
                }

                currentX += curve;
                currentY += hill;

                // Base Road Plane
                const geom = new THREE.BoxGeometry(11, 0.1, segmentLength);
                const mat = new THREE.MeshLambertMaterial({
                    color: i % 2 === 0 ? 0x1e1e21 : 0x161619
                });
                const mesh = new THREE.Mesh(geom, mat);
                mesh.position.set(currentX, currentY, -i * segmentLength);
                roadGroup.add(mesh);

                // Track Boundary Stripes
                const railGeom = new THREE.BoxGeometry(0.3, 0.4, segmentLength);
                const railMat = new THREE.MeshBasicMaterial({
                    color: i % 2 === 0 ? 0xffffff : 0xaa1111
                });
                const leftRail = new THREE.Mesh(railGeom, railMat);
                leftRail.position.set(-5.5, 0.2, 0);
                mesh.add(leftRail);

                const rightRail = new THREE.Mesh(railGeom, railMat);
                rightRail.position.set(5.5, 0.2, 0);
                mesh.add(rightRail);

                segments.push({
                    index: i,
                    x: currentX,
                    y: currentY,
                    z: -i * segmentLength,
                    mesh: mesh,
                    obstacles: []
                });

                // Generate Simple Cone Obstacles
                if (i > 15 && i < track.length - 15 && Math.random() < track.obstacleDensity) {
                    let sideChoice = Math.floor(Math.random() * 3);
                    let lateralOffset = sideChoice === 0 ? -3.5 : (sideChoice === 1 ? 0 : 3.5);

                    const coneGeom = new THREE.ConeGeometry(0.5, 1.4, 5);
                    const coneMat = new THREE.MeshLambertMaterial({ color: 0xff6600 });
                    const cone = new THREE.Mesh(coneGeom, coneMat);
                    cone.position.set(lateralOffset, 0.7, 0);
                    mesh.add(cone);

                    segments[i].obstacles.push({
                        offset: lateralOffset,
                        mesh: cone
                    });
                }
            }
            return segments;
        }

        function createCarMesh() {
            const carGroup = new THREE.Group();

            // Minimalist Main Chassis
            const bodyGeom = new THREE.BoxGeometry(1.4, 0.5, 2.8);
            const bodyMat = new THREE.MeshLambertMaterial({ color: 0xe5e5ea });
            const body = new THREE.Mesh(bodyGeom, bodyMat);
            body.position.y = 0.35;
            carGroup.add(body);

            // Roof Cabin
            const cabinGeom = new THREE.BoxGeometry(1.0, 0.4, 1.4);
            const cabinMat = new THREE.MeshLambertMaterial({ color: 0x1c1c1e });
            const cabin = new THREE.Mesh(cabinGeom, cabinMat);
            cabin.position.set(0, 0.75, 0.2);
            carGroup.add(cabin);

            // Simple Wheels
            const wheelGeom = new THREE.CylinderGeometry(0.35, 0.35, 0.25, 12);
            const wheelMat = new THREE.MeshBasicMaterial({ color: 0x2c2c2e });
            wheelGeom.rotateZ(Math.PI / 2);

            const fl = new THREE.Mesh(wheelGeom, wheelMat); fl.position.set(-0.8, 0.25, -0.8); carGroup.add(fl);
            const fr = new THREE.Mesh(wheelGeom, wheelMat); fr.position.set(0.8, 0.25, -0.8); carGroup.add(fr);
            const rl = new THREE.Mesh(wheelGeom, wheelMat); rl.position.set(-0.8, 0.25, 0.8); carGroup.add(rl);
            const rr = new THREE.Mesh(wheelGeom, wheelMat); rr.position.set(0.8, 0.25, 0.8); carGroup.add(rr);

            scene.add(carGroup);
            return carGroup;
        }

        function cleanupThreeJS() {
            if (renderer) {
                renderer.dispose();
                while(scene.children.length > 0) { 
                    scene.remove(scene.children[0]); 
                }
            }
            const oldCanvas = document.getElementById('game-canvas');
            if (oldCanvas) oldCanvas.remove();

            const newCanvas = document.createElement('canvas');
            newCanvas.id = 'game-canvas';
            newCanvas.style.position = 'absolute';
            newCanvas.style.inset = '0';
            newCanvas.style.width = '100%';
            newCanvas.style.height = '100%';
            newCanvas.style.zIndex = '1000';
            DOM_CACHE.detail.insertBefore(newCanvas, DOM_CACHE.detail.firstChild);
        }

        // ==========================================================================
        // Gameplay Management & Game Loop
        // ==========================================================================
        function startGame(track) {
            cleanupThreeJS();
            
            canvas = document.getElementById('game-canvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x0a0a0c, 1);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);

            // Add standard structural lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.55);
            scene.add(ambient);
            const directional = new THREE.DirectionalLight(0xffffff, 0.7);
            directional.position.set(10, 20, 15);
            scene.add(directional);

            // Procedural sky starfield
            const starGeom = new THREE.BufferGeometry();
            const starsCount = 600;
            const starPos = new Float32Array(starsCount * 3);
            for(let i=0; i<starsCount*3; i+=3) {
                starPos[i] = (Math.random() - 0.5) * 800;
                starPos[i+1] = Math.random() * 250 + 20;
                starPos[i+2] = (Math.random() - 0.5) * 800;
            }
            starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starsMat = new THREE.PointsMaterial({ color: 0x8e8e93, size: 1.2 });
            const starfield = new THREE.Points(starGeom, starsMat);
            scene.add(starfield);

            // Construct 3D track properties
            game.track = track;
            game.road = buildProcedural3DTrack(track);
            game.carMesh = createCarMesh();

            game.position = 0;
            game.speed = 0;
            game.playerX = 0;
            game.playerVX = 0;
            game.score = 0;
            game.countdown = 90;
            game.shakeAmount = 0;
            game.particles = [];
            game.state = 'running';

            STATE.currentScreen = 'game';
            
            // HUD DOM Setup
            DOM_CACHE.detail.classList.add('visible');
            document.getElementById('game-hud').style.display = 'flex';
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('hud-track-name').innerText = track.title;
            document.getElementById('hud-record').innerText = STATE.highScores[track.id].toLocaleString();

            requestAnimationFrame(gameTick);
        }

        function pauseGame() {
            game.state = 'paused';
            STATE.overlayFocusedIndex = 0;
            document.getElementById('overlay-title').innerText = "Drive Halted";
            document.getElementById('overlay-subtitle').innerText = "Circuit execution paused.";
            document.getElementById('game-retry-btn').innerText = "Resume Simulation";
            document.getElementById('game-overlay').style.display = 'flex';
            updateOverlayFocus();
        }

        function resumeGame() {
            game.state = 'running';
            document.getElementById('game-overlay').style.display = 'none';
        }

        function triggerCrash() {
            game.speed *= 0.15; // Heavy deceleration penalty
            game.shakeAmount = 1.2;

            // Simple collision particle burst
            for(let i=0; i<15; i++) {
                const partGeom = new THREE.BoxGeometry(0.15, 0.15, 0.15);
                const partMat = new THREE.MeshBasicMaterial({ color: 0xff6600 });
                const mesh = new THREE.Mesh(partGeom, partMat);
                mesh.position.set(game.carMesh.position.x + (Math.random() - 0.5) * 2, game.carMesh.position.y + 0.5, game.carMesh.position.z - 1.5);
                scene.add(mesh);

                game.particles.push({
                    mesh: mesh,
                    vX: (Math.random() - 0.5) * 6,
                    vY: Math.random() * 5 + 2,
                    vZ: Math.random() * 6 - 3,
                    life: 1.0
                });
            }
        }

        function victoryGame() {
            game.state = 'victory';
            STATE.overlayFocusedIndex = 0;
            
            document.getElementById('overlay-title').innerText = "Circuit Complete";
            const isRecord = game.score > STATE.highScores[game.track.id];
            
            if (isRecord) {
                STATE.highScores[game.track.id] = game.score;
                document.getElementById('overlay-subtitle').innerText = `New record achieved: ${game.score.toLocaleString()} points.`;
            } else {
                document.getElementById('overlay-subtitle').innerText = `Score: ${game.score.toLocaleString()} points. Best: ${STATE.highScores[game.track.id].toLocaleString()}`;
            }

            document.getElementById('game-retry-btn').innerText = "Drive Again";
            document.getElementById('game-overlay').style.display = 'flex';
            updateOverlayFocus();
        }

        function closeGame() {
            game.state = 'idle';
            STATE.currentScreen = 'grid';
            DOM_CACHE.detail.classList.remove('visible');
            document.getElementById('game-hud').style.display = 'none';
            document.getElementById('game-overlay').style.display = 'none';
            cleanupThreeJS();
            buildGridMenu();
        }

        function gameTick() {
            if (STATE.currentScreen !== 'game') return;
            updateGamePhysics();
            render3DScene();
            requestAnimationFrame(gameTick);
        }

        function updateGamePhysics() {
            if (game.state !== 'running') return;

            // Wait for countdown buffer
            if (game.countdown > 0) {
                game.countdown--;
                return;
            }

            // 1. Steering & Slide/Drift Mechanics
            let steerVal = 0;
            if (keysPressed['ArrowLeft'] || keysPressed['a'] || keysPressed['A']) steerVal = -1.0;
            if (keysPressed['ArrowRight'] || keysPressed['d'] || keysPressed['D']) steerVal = 1.0;
            if (Math.abs(STATE.joyX) > 0.15) steerVal = STATE.joyX;

            // Simple drifty lateral speed calculation
            let steerAgility = 0.22;
            let speedPercentage = game.speed / game.maxSpeed;
            game.playerVX += steerVal * steerAgility * speedPercentage;
            game.playerVX *= 0.85; // Sideways drag friction
            
            game.playerX += game.playerVX;
            game.playerX = Math.max(-5.0, Math.min(5.0, game.playerX));

            // 2. Active Joystick Acceleration Mechanics (Requires active forward tilt/Up)
            let isAccelerating = keysPressed['ArrowUp'] || keysPressed['w'] || keysPressed['W'] || (STATE.joyY < -0.15);
            if (isAccelerating) {
                // Read continuous analog value of joystick, or treat keys as 100% tilt
                let tiltAmount = (STATE.joyY < -0.15) ? Math.max(0, -STATE.joyY) : 1.0;
                game.speed += 0.08 * tiltAmount;
            } else {
                game.speed *= 0.97; // Engine breaking drag
            }
            game.speed = Math.max(0, Math.min(game.maxSpeed, game.speed));

            // Move the vehicle forward along the Z coordinate
            game.position += game.speed;

            // 3. Track segments references
            let startSegIndex = Math.floor(game.position / segmentLength);
            let percent = (game.position % segmentLength) / segmentLength;

            // Boundary check for completion
            if (startSegIndex >= game.road.length - 2) {
                victoryGame();
                return;
            }

            let curSeg = game.road[startSegIndex];
            let nextSeg = game.road[startSegIndex + 1];

            // Project absolute 3D position of the player car on road surface
            let segX = curSeg.x + (nextSeg.x - curSeg.x) * percent;
            let segY = curSeg.y + (nextSeg.y - curSeg.y) * percent;

            game.carMesh.position.set(segX + game.playerX, segY + 0.1, -game.position);

            // Align rotation heading vector to match upcoming segments
            let lookSeg = game.road[Math.min(game.road.length - 1, startSegIndex + 3)];
            let targetHeading = Math.atan2(lookSeg.x - curSeg.x, lookSeg.z - curSeg.z);
            let visualDriftSlideAngle = -game.playerVX * 0.15; // Visual slide swing-out

            game.carMesh.rotation.y = targetHeading + visualDriftSlideAngle;

            // 4. Boundary Wall or obstacle collisions
            if (curSeg.obstacles.length > 0 && Math.floor(game.position) % segmentLength < 8) {
                curSeg.obstacles.forEach(obs => {
                    let distanceDiff = Math.abs(game.playerX - obs.offset);
                    if (distanceDiff < 0.9) {
                        triggerCrash();
                    }
                });
            }

            // Standard score calculation
            if (game.speed > 0.5) {
                game.score += Math.round(game.speed * 1.5);
            }

            // Cleanup/Animate physics particles
            for(let i=game.particles.length-1; i>=0; i--) {
                let p = game.particles[i];
                p.mesh.position.x += p.vX * 0.016;
                p.mesh.position.y += p.vY * 0.016;
                p.mesh.position.z += p.vZ * 0.016;
                p.vY -= 9.8 * 0.016; // gravity
                p.life -= 0.04;
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    game.particles.splice(i, 1);
                }
            }
        }

        function render3DScene() {
            if (!renderer || !scene || !camera) return;

            // 1. Position Camera chasing the car
            let targetCamX = game.carMesh.position.x;
            let targetCamY = game.carMesh.position.y + 3.2;
            let targetCamZ = game.carMesh.position.z + 9.5;

            camera.position.x += (targetCamX - camera.position.x) * 0.12;
            camera.position.y += (targetCamY - camera.position.y) * 0.12;
            camera.position.z += (targetCamZ - camera.position.z) * 0.12;

            // 2. Point camera at upcoming path
            camera.lookAt(game.carMesh.position.x, game.carMesh.position.y + 0.8, game.carMesh.position.z - 12);

            // 3. Screen shake logic
            if (game.shakeAmount > 0) {
                camera.position.x += (Math.random() - 0.5) * game.shakeAmount;
                camera.position.y += (Math.random() - 0.5) * game.shakeAmount;
                game.shakeAmount *= 0.85;
                if (game.shakeAmount < 0.01) game.shakeAmount = 0;
            }

            renderer.render(scene, camera);

            // 4. Update HUD
            document.getElementById('hud-speed').innerText = `${Math.round(game.speed * 45)} KM/H`;
            document.getElementById('hud-score').innerText = game.score.toLocaleString();
        }

        // ==========================================================================
        // UI Menu Selection Springs Tick
        // ==========================================================================
        function tickMicroanimations() {
            const activeTarget = getActiveTarget();
            const currentElement = activeTarget ? activeTarget.icon : null;
            const currentContainer = activeTarget ? activeTarget.container : null;

            const tiltedElements = document.querySelectorAll('.tilted-focus');
            tiltedElements.forEach(el => {
                if (el !== currentElement && el !== currentContainer) {
                    if (!el.springs) { 
                        el.style.transform = ''; 
                        el.classList.remove('tilted-focus'); 
                    }
                }
            });

            springElements.forEach(el => {
                if (!el.isConnected) return;
                const s = el.springs; 
                let changed = false;
                
                if (s.scale.update()) changed = true; 
                if (s.posX.update()) changed = true; 
                if (s.posY.update()) changed = true; 
                if (s.focusState.update()) changed = true;
                
                const isFocused = s.focusState.val > 0.01;
                const isCurrent = (el === currentElement);

                if (changed || isFocused || isCurrent) {
                    const cardMoveScale = 0.48;
                    const springX = s.posX.val * cardMoveScale;
                    const springY = s.posY.val * cardMoveScale;
                    const jX = isCurrent ? STATE.joyX : 0;
                    const jY = isCurrent ? STATE.joyY : 0;
                    
                    const maxIconRotate = 8, maxIconTranslate = 6;
                    const iconRotateY = jX * maxIconRotate;
                    const iconRotateX = -jY * maxIconRotate;
                    const iconTranslateX = jX * maxIconTranslate;
                    const iconTranslateY = jY * maxIconTranslate;
                    const totalTranslateX = springX + iconTranslateX;
                    const totalTranslateY = springY + iconTranslateY;

                    el.style.transform = `scale(${s.scale.val.toFixed(3)}) translate3d(${totalTranslateX.toFixed(2)}px, ${totalTranslateY.toFixed(2)}px, 0) rotateX(${iconRotateX.toFixed(2)}deg) rotateY(${iconRotateY.toFixed(2)}deg)`;
                    el.classList.add('tilted-focus');

                    const f = Math.max(0, s.focusState.val);
                    if (el.glassBorder) el.glassBorder.style.opacity = (0.2 + 0.8 * f).toFixed(3);
                    if (el.shine) {
                        el.shine.style.opacity = f.toFixed(3);
                        if (isFocused) {
                            const shineX = 30 + (s.posX.val * 2.2) + Math.sin(Date.now() * 0.001) * 3;
                            const shineY = 30 + (s.posY.val * 2.2) + Math.cos(Date.now() * 0.001) * 3;
                            el.shine.style.background = `radial-gradient(circle at ${shineX.toFixed(1)}% ${shineY.toFixed(1)}%, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 60%, rgba(255,255,255,0) 100%)`;
                        }
                    }
                }
            });

            requestAnimationFrame(tickMicroanimations);
        }

        window.onload = initApp;
    </script>
</body>
