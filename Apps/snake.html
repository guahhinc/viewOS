<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <style>
        /* ==========================================================================
           viewOS System Typography & Layout Constants
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300&display=swap');

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --secondary-text: #888888;
            --border-radius: 6px;
        }

        * {
            font-family: 'Inter Tight', -apple-system, sans-serif;
            font-weight: 300 !important;
            letter-spacing: -0.02em !important;
            line-height: 1.2;
            box-sizing: border-box;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            cursor: none !important;
            margin: 0; padding: 0;
        }

        html, body {
            width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        #app-root {
            position: relative;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            padding: 80px 4vw 120px 4vw;
        }

        #app-header {
            text-align: center;
            margin-bottom: 50px;
        }
        #app-header h1 { font-size: 3rem; margin-bottom: 12px; }
        #app-header p { font-size: 1.2rem; color: var(--secondary-text); }

        /* Simplistic Text-Only Menu */
        #text-menu {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            justify-content: center;
        }

        .menu-btn {
            font-size: 1.3rem;
            color: var(--secondary-text);
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 28px;
            border-radius: var(--border-radius);
            transition: all 0.2s ease;
            text-align: center;
            width: 280px;
            cursor: pointer;
        }

        .menu-btn.is-focused {
            color: #ffffff !important;
            background-color: rgba(255, 255, 255, 0.1) !important;
            border-color: rgba(255, 255, 255, 0.4) !important;
        }

        /* Detail/Sub-navigation View Overlay */
        #detail-view {
            position: fixed; inset: 0; background: #000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease; z-index: 1000; padding: 40px;
        }
        #detail-view.visible { display: flex; opacity: 1; }

        #detail-close-btn {
            font-size: 1.1rem; color: var(--secondary-text); background: transparent;
            padding: 12px 30px; border-radius: var(--border-radius);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
            text-align: center;
            cursor: pointer;
            width: 100%;
        }
        #detail-close-btn.is-focused {
            color: #000000 !important;
            background-color: #ffffff !important;
            border-color: #ffffff !important;
        }

        /* ==========================================================================
           Snake Gameplay Canvas & HUD Sizing
           ========================================================================== */
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 24px;
            width: 548px;
            position: relative;
        }

        #game-hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 500px;
            padding: 0 4px;
        }

        .hud-item {
            display: flex;
            gap: 10px;
            align-items: baseline;
        }

        .hud-label {
            font-size: 0.85rem;
            color: var(--secondary-text);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        #game-score, #game-highscore {
            font-size: 1.5rem;
            color: #ffffff;
        }

        #game-status-text {
            font-size: 1rem;
            letter-spacing: 0.05em;
            color: #39ff14;
            text-transform: uppercase;
        }

        #canvas-wrapper {
            position: relative;
            width: 500px;
            height: 500px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: #000000;
        }

        #game-canvas {
            display: block;
        }

        #game-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            backdrop-filter: blur(2px);
            z-index: 10;
        }

        #overlay-title {
            font-size: 2rem;
            color: #ef4444;
            letter-spacing: 0.05em;
        }

        #overlay-subtitle {
            font-size: 1rem;
            color: var(--secondary-text);
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="app-root">
        <header id="app-header">
            <h1>Snake</h1>
            <p>Simple terminal simulator</p>
        </header>

        <div id="text-menu"></div>
    </div>

    <div id="detail-view">
        <div id="game-container">
            <div id="game-hud">
                <div class="hud-item">
                    <span class="hud-label">Score</span>
                    <span id="game-score">000</span>
                </div>
                <div id="game-status-text">PLAYING</div>
                <div class="hud-item">
                    <span class="hud-label">High</span>
                    <span id="game-highscore">000</span>
                </div>
            </div>
            <div id="canvas-wrapper">
                <canvas id="game-canvas" width="500" height="500"></canvas>
                <div id="game-overlay">
                    <div id="overlay-title">GAME OVER</div>
                    <div id="overlay-subtitle">Press Enter to retry<br>Press Escape / Back to exit</div>
                </div>
            </div>
            <div id="detail-close-btn">Exit Simulator</div>
        </div>
    </div>

    <script>
        // ==========================================================================
        // Gameplay Profiles & Settings
        // ==========================================================================
        const APP_THEMES = [
            { name: "Classic Mono", bg: "#000000", snake: "#ffffff", food: "#ffffff", gridColor: "rgba(255,255,255,0.03)" },
            { name: "Neon Cyan", bg: "#000000", snake: "#00f0ff", food: "#ff007f", gridColor: "rgba(0,240,255,0.03)" },
            { name: "Retro Green", bg: "#000000", snake: "#39ff14", food: "#39ff14", gridColor: "rgba(57,255,20,0.03)" },
            { name: "Amber CRT", bg: "#000000", snake: "#ffb000", food: "#ffb000", gridColor: "rgba(255,176,0,0.03)" }
        ];

        const APP_SPEEDS = [
            { label: "Slow", ms: 140 },
            { label: "Medium", ms: 95 },
            { label: "Fast", ms: 55 }
        ];

        const appItems = [
            { id: 0, label: "Start Game" },
            { id: 1, label: "Speed: Medium" },
            { id: 2, label: "Theme: Classic Mono" },
            { id: 3, label: "Reset High Score" }
        ];

        const STATE = {
            currentScreen: 'grid', // 'grid' | 'game'
            focusedIndex: 0,

            // System Configurations
            speedIdx: 1, 
            themeIdx: 0,
            highScore: parseInt(localStorage.getItem('viewos_snake_high') || '0', 10),

            // Game Engine Variables
            isPlaying: false,
            isGameOver: false,
            score: 0
        };

        const DOM_CACHE = {
            menu: document.getElementById('text-menu'),
            detail: document.getElementById('detail-view'),
            detailBtn: document.getElementById('detail-close-btn'),
            canvas: document.getElementById('game-canvas'),
            scoreLabel: document.getElementById('game-score'),
            highLabel: document.getElementById('game-highscore'),
            statusLabel: document.getElementById('game-status-text'),
            overlay: document.getElementById('game-overlay')
        };

        let cachedElements = [];

        // Engine State
        let snake = [];
        let dir = { x: 0, y: -1 };
        let nextDir = { x: 0, y: -1 };
        let food = { x: 0, y: 0 };
        let gameInterval = null;

        // ==========================================================================
        // Main Application Controller Setup
        // ==========================================================================
        function initApp() {
            DOM_CACHE.menu.innerHTML = '';
            cachedElements = [];
            
            appItems.forEach((item, index) => {
                const btn = document.createElement('div');
                btn.className = 'menu-btn';
                btn.id = `btn-${index}`;
                btn.innerText = getButtonText(index);
                
                // Mouse compatibility
                btn.addEventListener('click', () => {
                    STATE.focusedIndex = index;
                    updateFocus();
                    executeAction();
                });

                DOM_CACHE.menu.appendChild(btn);
                cachedElements.push(btn);
            });

            document.addEventListener('keydown', handleKeydown);
            DOM_CACHE.detailBtn.addEventListener('click', exitGame);
            
            updateMenuItems();
            requestAnimationFrame(pollGamepads);
            requestAnimationFrame(renderLoop);
            
            updateFocus();
        }

        function getButtonText(index) {
            if (index === 0) return "Start Game";
            if (index === 1) return `Speed: ${APP_SPEEDS[STATE.speedIdx].label}`;
            if (index === 2) return `Theme: ${APP_THEMES[STATE.themeIdx].name}`;
            if (index === 3) return `Reset High Score (${padScore(STATE.highScore)})`;
            return "";
        }

        function updateFocus() {
            document.querySelectorAll('.menu-btn, #detail-close-btn').forEach(el => el.classList.remove('is-focused'));
            
            if (STATE.currentScreen === 'grid') {
                const target = cachedElements[STATE.focusedIndex];
                if (target) target.classList.add('is-focused');
            } else if (STATE.currentScreen === 'game') {
                // Focus element only when game is finished
                if (STATE.isGameOver) {
                    DOM_CACHE.detailBtn.classList.add('is-focused');
                }
            }
        }

        function updateMenuItems() {
            appItems.forEach((item, index) => {
                const el = cachedElements[index];
                if (el) el.innerText = getButtonText(index);
            });
        }

        // ==========================================================================
        // Snake Game Mechanics
        // ==========================================================================
        function startGame() {
            STATE.currentScreen = 'game';
            STATE.isPlaying = true;
            STATE.isGameOver = false;
            STATE.score = 0;

            // Start in horizontal movement path
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            dir = { x: 0, y: -1 };
            nextDir = { x: 0, y: -1 };

            spawnFood();
            
            DOM_CACHE.scoreLabel.innerText = padScore(STATE.score);
            DOM_CACHE.highLabel.innerText = padScore(STATE.highScore);
            DOM_CACHE.overlay.style.display = 'none';
            DOM_CACHE.statusLabel.innerText = 'PLAYING';
            DOM_CACHE.statusLabel.style.color = '#39ff14';

            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameStep, APP_SPEEDS[STATE.speedIdx].ms);
            
            DOM_CACHE.detail.classList.add('visible');
            updateFocus();
        }

        function gameStep() {
            if (!STATE.isPlaying || STATE.isGameOver) return;

            dir = nextDir;
            const head = snake[0];
            const newHead = { x: head.x + dir.x, y: head.y + dir.y };

            // Wall Collision detection
            if (newHead.x < 0 || newHead.x >= 20 || newHead.y < 0 || newHead.y >= 20) {
                triggerGameOver();
                return;
            }

            // Self Collision detection
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === newHead.x && snake[i].y === newHead.y) {
                    triggerGameOver();
                    return;
                }
            }

            snake.unshift(newHead);

            // Food collision detection
            if (newHead.x === food.x && newHead.y === food.y) {
                STATE.score += 10;
                DOM_CACHE.scoreLabel.innerText = padScore(STATE.score);

                if (STATE.score > STATE.highScore) {
                    STATE.highScore = STATE.score;
                    localStorage.setItem('viewos_snake_high', STATE.highScore);
                    DOM_CACHE.highLabel.innerText = padScore(STATE.highScore);
                }

                spawnFood();
            } else {
                snake.pop();
            }
        }

        function spawnFood() {
            let safetyCounter = 0;
            while (safetyCounter < 200) {
                const rx = Math.floor(Math.random() * 20);
                const ry = Math.floor(Math.random() * 20);
                
                let occupied = false;
                for (let i = 0; i < snake.length; i++) {
                    if (snake[i].x === rx && snake[i].y === ry) {
                        occupied = true;
                        break;
                    }
                }
                if (!occupied) {
                    food = { x: rx, y: ry };
                    return;
                }
                safetyCounter++;
            }
            food = { x: 5, y: 5 }; // Fallback
        }

        function triggerGameOver() {
            STATE.isGameOver = true;
            STATE.isPlaying = false;
            if (gameInterval) clearInterval(gameInterval);

            DOM_CACHE.overlay.style.display = 'flex';
            DOM_CACHE.statusLabel.innerText = 'GAME OVER';
            DOM_CACHE.statusLabel.style.color = '#ef4444';
            updateFocus();
        }

        function exitGame() {
            STATE.isPlaying = false;
            STATE.isGameOver = false;
            if (gameInterval) clearInterval(gameInterval);

            STATE.currentScreen = 'grid';
            DOM_CACHE.detail.classList.remove('visible');
            updateFocus();
            updateMenuItems();
        }

        function padScore(val) {
            return String(val).padStart(3, '0');
        }

        // ==========================================================================
        // Simple Interaction Actions
        // ==========================================================================
        function executeAction() {
            if (STATE.currentScreen === 'grid') {
                if (STATE.focusedIndex === 0) {
                    startGame();
                } else if (STATE.focusedIndex === 1) {
                    STATE.speedIdx = (STATE.speedIdx + 1) % APP_SPEEDS.length;
                    updateMenuItems();
                } else if (STATE.focusedIndex === 2) {
                    STATE.themeIdx = (STATE.themeIdx + 1) % APP_THEMES.length;
                    updateMenuItems();
                } else if (STATE.focusedIndex === 3) {
                    STATE.highScore = 0;
                    localStorage.setItem('viewos_snake_high', '0');
                    updateMenuItems();
                }
            } else if (STATE.currentScreen === 'game') {
                if (STATE.isGameOver) {
                    startGame();
                }
            }
        }

        function handleSystemBack() {
            if (STATE.currentScreen === 'game') {
                exitGame();
            } else {
                window.parent.postMessage({ type: 'exitApp' }, '*');
            }
        }

        // ==========================================================================
        // Clean Minimal Rendering Loop
        // ==========================================================================
        function drawGame() {
            const canvas = DOM_CACHE.canvas;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const theme = APP_THEMES[STATE.themeIdx];

            ctx.fillStyle = theme.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const gridCells = 20;
            const cellSize = canvas.width / gridCells;

            // Grid rendering
            ctx.strokeStyle = theme.gridColor;
            ctx.lineWidth = 1;
            for (let i = 1; i < gridCells; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(canvas.width, i * cellSize);
                ctx.stroke();
            }

            // Food rendering (clean square design)
            const fx = food.x * cellSize + 2;
            const fy = food.y * cellSize + 2;
            const itemSize = cellSize - 4;
            const pulse = 1.0 + 0.1 * Math.sin(Date.now() * 0.012);
            
            ctx.fillStyle = theme.food;
            ctx.beginPath();
            const offset = (itemSize - (itemSize * pulse)) / 2;
            ctx.fillRect(fx + offset, fy + offset, itemSize * pulse, itemSize * pulse);

            // Snake body rendering (pixel-perfect block alignment)
            for (let i = 0; i < snake.length; i++) {
                const segment = snake[i];
                const sx = segment.x * cellSize + 1;
                const sy = segment.y * cellSize + 1;
                const size = cellSize - 2;

                if (i === 0) {
                    ctx.fillStyle = theme.snake;
                } else {
                    ctx.fillStyle = hexToRgba(theme.snake, 0.7);
                }
                ctx.fillRect(sx, sy, size, size);
            }
        }

        function hexToRgba(hex, alpha) {
            let c = hex.substring(1);
            if (c.length === 3) c = c[0]+c[0] + c[1]+c[1] + c[2]+c[2];
            const r = parseInt(c.slice(0, 2), 16);
            const g = parseInt(c.slice(2, 4), 16);
            const b = parseInt(c.slice(4, 6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function renderLoop() {
            if (STATE.currentScreen === 'game') {
                drawGame();
            }
            requestAnimationFrame(renderLoop);
        }

        // ==========================================================================
        // Control Interceptors & Gamepad support
        // ==========================================================================
        function handleKeydown(e) {
            if (e && typeof e.preventDefault === 'function') e.preventDefault();
            
            if (e.key === 'Escape' || e.key === 'Backspace') { handleSystemBack(); return; }
            if (e.key === 'Enter' || e.key === ' ') { executeAction(); return; }

            if (STATE.currentScreen === 'grid') {
                if (e.key === 'ArrowDown') { 
                    STATE.focusedIndex = (STATE.focusedIndex + 1) % appItems.length;
                    updateFocus();
                } else if (e.key === 'ArrowUp') { 
                    STATE.focusedIndex = (STATE.focusedIndex - 1 + appItems.length) % appItems.length;
                    updateFocus();
                }
            } else if (STATE.currentScreen === 'game') {
                if (STATE.isGameOver) {
                    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                        updateFocus();
                    }
                } else {
                    const code = e.key.toUpperCase();
                    if ((e.key === 'ArrowUp' || code === 'W') && dir.y === 0) { nextDir = { x: 0, y: -1 }; }
                    else if ((e.key === 'ArrowDown' || code === 'S') && dir.y === 0) { nextDir = { x: 0, y: 1 }; }
                    else if ((e.key === 'ArrowLeft' || code === 'A') && dir.x === 0) { nextDir = { x: -1, y: 0 }; }
                    else if ((e.key === 'ArrowRight' || code === 'D') && dir.x === 0) { nextDir = { x: 1, y: 0 }; }
                }
            }
        }

        let lastGamepadState = { up: false, down: false, left: false, right: false, enter: false, back: false };
        let gpActiveDir = null;
        let holdTime = 0, lastRepeatTime = 0;

        function pollGamepads() {
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            for (let i = 0; i < gamepads.length; i++) {
                const gp = gamepads[i]; if (!gp) continue;

                const up = gp.buttons[12]?.pressed || gp.axes[1] < -0.5;
                const down = gp.buttons[13]?.pressed || gp.axes[1] > 0.5;
                const left = gp.buttons[14]?.pressed || gp.axes[0] < -0.5;
                const right = gp.buttons[15]?.pressed || gp.axes[0] > 0.5;
                const enter = gp.buttons[0]?.pressed;
                const back = gp.buttons[1]?.pressed;

                let dirString = up ? 'up' : down ? 'down' : left ? 'left' : right ? 'right' : null;
                if (dirString) {
                    if (gpActiveDir !== dirString) {
                        gpActiveDir = dirString; holdTime = Date.now(); lastRepeatTime = Date.now();
                        handleKeydown({ key: { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' }[dirString] });
                    } else if (Date.now() - holdTime > 350 && Date.now() - lastRepeatTime > 80) {
                        handleKeydown({ key: { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' }[dirString] });
                        lastRepeatTime = Date.now();
                    }
                } else gpActiveDir = null;

                if (enter && !lastGamepadState.enter) executeAction();
                if (back && !lastGamepadState.back) handleSystemBack();

                lastGamepadState = { up, down, left, right, enter, back };
                break;
            }
            requestAnimationFrame(pollGamepads);
        }

        window.onload = initApp;
    </script>
</body>
</html>
