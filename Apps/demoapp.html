<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>viewOS Application Template</title>
    <style>
        /* ==========================================================================
           viewOS System Typography & Layout Constants
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400&display=swap');

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --secondary-text: #a0a0a5;
            
            /* Enlarged visual grid sizing for better spatial/TV readability */
            --card-width: 320px;
            --card-height: calc(var(--card-width) * 0.625); /* 16:10 aspect ratio */
            --border-radius: 12px;
        }

        * {
            font-family: 'Inter Tight', -apple-system, sans-serif;
            font-weight: 300 !important;
            letter-spacing: -0.03em !important;
            line-height: 1.25;
            box-sizing: border-box;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            /* ViewOS maps gamepad/keyboard navigation, so the default cursor is hidden */
            cursor: none !important;
            margin: 0; 
            padding: 0;
        }

        html, body {
            width: 100vw; 
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        #app-root {
            position: relative;
            width: 100%; 
            height: 100%;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
            padding: 100px 4vw 140px 4vw; /* More breathing room */
        }

        #app-header {
            text-align: center;
            margin-bottom: 80px;
        }
        /* Enlarged typography scales */
        #app-header h1 { font-size: 3.6rem; font-weight: 400 !important; margin-bottom: 16px; }
        #app-header p { font-size: 1.6rem; color: var(--secondary-text); max-width: 800px; margin: 0 auto; }

        #content-grid {
            display: grid;
            grid-template-columns: repeat(4, var(--card-width));
            gap: 45px; /* Spacious gaps */
            justify-content: center;
            perspective: 1200px;
        }

        .grid-item {
            display: flex; 
            flex-direction: column; 
            align-items: center;
            width: 100%; 
            transform-style: preserve-3d; 
            will-change: transform;
        }

        .card-visual {
            width: var(--card-width); 
            height: var(--card-height);
            background-color: #1c1c1e; 
            border-radius: var(--border-radius);
            position: relative; 
            z-index: 1; 
            transform-style: preserve-3d;
            background-size: cover; 
            background-position: center;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            transition: border-color 0.2s;
        }

        .grid-item.is-focused .card-visual {
            border-color: rgba(255, 255, 255, 0.25);
        }

        .card-title {
            font-size: 1.6rem; /* Enlarged title text */
            color: var(--secondary-text); 
            margin-top: 28px;
            text-align: center; 
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%;
            transition: color 0.2s ease;
        }

        /* 3D Dynamic Reflection Layers */
        .card-shine {
            position: absolute; 
            inset: 0; 
            border-radius: inherit; 
            pointer-events: none; 
            z-index: 11;
            mix-blend-mode: screen; 
            opacity: 0; 
            will-change: opacity; 
            overflow: hidden;
            transform: translate3d(0, 0, 0.5px);
        }
        
        .card-glass-border {
            position: absolute; 
            inset: 0; 
            border-radius: inherit; 
            pointer-events: none; 
            z-index: 12;
            border: 1.5px solid rgba(255, 255, 255, 0.3); 
            opacity: 0; 
            will-change: opacity;
            transform: translate3d(0, 0, 1px);
        }

        /* Detail/Sub-navigation View Overlay */
        #detail-view {
            position: fixed; 
            inset: 0; 
            background: #000;
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            opacity: 0; 
            transition: opacity 0.35s cubic-bezier(0.25, 1, 0.5, 1); 
            z-index: 1000; 
            padding: 40px;
        }
        #detail-view.visible { display: flex; opacity: 1; }
        #detail-view h2 { font-size: 4rem; margin-bottom: 24px; }
        #detail-view p { font-size: 1.8rem; color: var(--secondary-text); margin-bottom: 60px; }

        /* Custom Specificity overrides to avoid CSS clashing when focused */
        .grid-item.is-focused .card-title { color: #ffffff !important; }
        
        #detail-close-btn {
            font-size: 1.8rem; 
            color: #ffffff; 
            background: rgba(255, 255, 255, 0.08);
            padding: 20px 50px; 
            border-radius: var(--border-radius);
            transform-style: preserve-3d; 
            transition: background-color 0.25s ease, color 0.25s ease;
        }
        #detail-close-btn.is-focused {
            color: #000000 !important;
            background-color: #ffffff !important;
        }

        .tilted-focus { transition: none !important; }
    </style>
</head>
<body>

    <!-- 
      DEVELOPER NOTE: 
      This is the primary root of your application. You should structure your main vistas, 
      side bars, or canvas instances inside here. The layout below is a baseline demo grid.
    -->
    <div id="app-root">
        <header id="app-header">
            <h1>viewOS App Template</h1>
            <p>Use this structure as a baseline to design your custom application. It comes pre-packaged with gamepad navigation, focus states, and the system exit callback.</p>
        </header>

        <!-- Main interactive content grid -->
        <main id="content-grid"></main>
    </div>

    <!-- 
      DEVELOPER NOTE: 
      This is an overlay detail view. Replace this setup with your own state routing or custom visual layers.
    -->
    <div id="detail-view">
        <h2 id="detail-title">Detail Title</h2>
        <p>This sub-navigation overlay intercepts inputs. Press Back/B/Esc to return to the grid.</p>
        <div id="detail-close-btn">Return to Grid</div>
    </div>

    <script>
        // ==========================================================================
        // Developer Configuration & Mock Data
        // ==========================================================================
        // REPLACE THIS: Add your own data objects, icons, image URLs, or views here.
        const appItems = [
            { id: 0, title: "Media Library", color: "#1c2541" },
            { id: 1, title: "System Settings", color: "#1f1a3a" },
            { id: 2, title: "Cloud Explorer", color: "#0b3c5d" },
            { id: 3, title: "Web Terminal", color: "#328cc1" }
        ];

        // The central layout/state variables of the application
        const STATE = {
            currentScreen: 'grid', // Track currently active screen for input routing: 'grid' | 'detail'
            focusedIndex: 0,
            columns: 4,
            joyX: 0, joyY: 0       // Live joystick values for fine-tuned 3D tilts
        };

        const DOM_CACHE = {
            grid: document.getElementById('content-grid'),
            detail: document.getElementById('detail-view'),
            detailTitle: document.getElementById('detail-title'),
            detailBtn: document.getElementById('detail-close-btn')
        };

        let cachedElements = [];
        let springElements = [];

        // ==========================================================================
        // Physics Engine Implementation
        // ==========================================================================
        // Simple spring math to deliver natural, tactile feedback on selection shifts
        function Spring(val, stiffness = 0.12, damping = 0.78) {
            this.val = val; 
            this.target = val; 
            this.vel = 0;
            this.stiffness = stiffness; 
            this.damping = damping;
        }
        Spring.prototype.update = function() {
            if (Math.abs(this.target - this.val) < 0.001 && Math.abs(this.vel) < 0.001) {
                this.val = this.target; 
                this.vel = 0; 
                return false;
            }
            const force = (this.target - this.val) * this.stiffness;
            this.vel = (this.vel + force) * this.damping; 
            this.val += this.vel;
            return true;
        };

        // Hooks up interactive variables, reflections, and borders to elements
        function setupSpringPhysics(el) {
            if (el.springs) return;
            el.springs = { 
                scale: new Spring(1.0, 0.15, 0.70), 
                posX: new Spring(0, 0.08, 0.70), 
                posY: new Spring(0, 0.08, 0.70), 
                focusState: new Spring(0, 0.12, 0.80) 
            };
            
            let shine = document.createElement('div'); shine.className = 'card-shine'; 
            let glassBorder = document.createElement('div'); glassBorder.className = 'card-glass-border'; 
            el.shine = shine; el.glassBorder = glassBorder;
            el.appendChild(shine); el.appendChild(glassBorder);
            springElements.push(el);
        }

        // ==========================================================================
        // Application Lifecycle Initializer
        // ==========================================================================
        function initApp() {
            DOM_CACHE.grid.innerHTML = '';
            cachedElements = [];
            
            // Build elements dynamic off appItems list
            appItems.forEach((item, index) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'grid-item';
                itemEl.id = `item-${index}`;
                
                itemEl.innerHTML = `
                    <div class="card-visual" style="background-color: ${item.color};"></div>
                    <div class="card-title">${item.title}</div>
                `;
                
                DOM_CACHE.grid.appendChild(itemEl);
                const visual = itemEl.querySelector('.card-visual');
                setupSpringPhysics(visual);
                
                cachedElements.push({ container: itemEl, icon: visual, data: item });
            });

            // Standard event listeners
            document.addEventListener('keydown', handleKeydown);
            
            // Start physical engine tick loops
            requestAnimationFrame(pollGamepads);
            requestAnimationFrame(tickMicroanimations);
            
            updateFocus(true);
        }

        function getActiveTarget() {
            if (STATE.currentScreen === 'grid') return cachedElements[STATE.focusedIndex] || null;
            if (STATE.currentScreen === 'detail') return { container: DOM_CACHE.detailBtn, icon: DOM_CACHE.detailBtn };
            return null;
        }

        let lastActiveTarget = null;
        function updateFocus(isInitialLoad = false, dx = 0, dy = 0) {
            // Remove previous focus classes
            document.querySelectorAll('.is-focused').forEach(el => el.classList.remove('is-focused'));
            const target = getActiveTarget();

            // Settle out-of-focus elements
            if (lastActiveTarget && lastActiveTarget.icon && lastActiveTarget.icon.springs && lastActiveTarget !== target) {
                const s = lastActiveTarget.icon.springs; 
                s.scale.target = 1.0; 
                s.focusState.target = 0; 
                s.posX.target = 0; 
                s.posY.target = 0;
                if (dx) s.posX.vel = dx * 22; 
                if (dy) s.posY.vel = dy * 22; 
                lastActiveTarget.icon.style.zIndex = '1';
            }

            // Set physics targets on incoming focus element
            if (target && target.icon && target.icon.springs) {
                const s = target.icon.springs; 
                s.scale.target = 1.12; // Modest scale up on focus
                s.focusState.target = 1.0;
                if (dx) s.posX.vel = dx * 28; 
                if (dy) s.posY.vel = dy * 28; 
                target.icon.style.zIndex = '50';
            }

            lastActiveTarget = target;
            if (target && target.container && target.icon) {
                target.container.classList.add('is-focused');
                if (target.icon !== target.container) target.icon.classList.add('is-focused');
            }
        }

        // ==========================================================================
        // Navigation Actions & Routing
        // ==========================================================================
        function executeAction() {
            if (STATE.currentScreen === 'grid') {
                const item = appItems[STATE.focusedIndex];
                DOM_CACHE.detailTitle.innerText = item.title;
                STATE.currentScreen = 'detail';
                DOM_CACHE.detail.classList.add('visible');
                updateFocus(false);
            } else if (STATE.currentScreen === 'detail') {
                closeDetailView();
            }
        }

        function closeDetailView() {
            STATE.currentScreen = 'grid';
            DOM_CACHE.detail.classList.remove('visible');
            updateFocus(false);
        }

        // System exit message
        function handleSystemBack() {
            if (STATE.currentScreen === 'detail') {
                closeDetailView();
            } else {
                // Post message telling the host OS we wish to quit back to home/launcher
                window.parent.postMessage({ type: 'exitApp' }, '*');
            }
        }

        // ==========================================================================
        // Keyboard Input Processing
        // ==========================================================================
        function handleKeydown(e) {
            if (e && typeof e.preventDefault === 'function') e.preventDefault();
            
            let dx = 0, dy = 0;
            const c = STATE.columns, t = appItems.length;

            if (e.key === 'Escape' || e.key === 'Backspace') { handleSystemBack(); return; }
            if (e.key === 'Enter' || e.key === ' ') { executeAction(); return; }

            if (STATE.currentScreen === 'grid') {
                if (e.key === 'ArrowRight' && (STATE.focusedIndex + 1) % c !== 0 && STATE.focusedIndex + 1 < t) { STATE.focusedIndex++; dx = 1; }
                else if (e.key === 'ArrowLeft' && STATE.focusedIndex % c !== 0) { STATE.focusedIndex--; dx = -1; }
                else if (e.key === 'ArrowDown' && STATE.focusedIndex + c < t) { STATE.focusedIndex += c; dy = 1; }
                else if (e.key === 'ArrowUp' && STATE.focusedIndex - c >= 0) { STATE.focusedIndex -= c; dy = -1; }
                
                if (dx !== 0 || dy !== 0) updateFocus(false, dx, dy);
            }
        }

        // ==========================================================================
        // Gamepad Loop & Input Polling
        // ==========================================================================
        let lastGamepadState = { up: false, down: false, left: false, right: false, enter: false, back: false };
        let gpActiveDir = null;
        let holdTime = 0, lastRepeatTime = 0;

        function pollGamepads() {
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            for (let i = 0; i < gamepads.length; i++) {
                const gp = gamepads[i]; if (!gp) continue;

                // DPAD mappings & Joystick bounds check
                const up = gp.buttons[12]?.pressed || gp.axes[1] < -0.5;
                const down = gp.buttons[13]?.pressed || gp.axes[1] > 0.5;
                const left = gp.buttons[14]?.pressed || gp.axes[0] < -0.5;
                const right = gp.buttons[15]?.pressed || gp.axes[0] > 0.5;
                const enter = gp.buttons[0]?.pressed; // A
                const back = gp.buttons[1]?.pressed;   // B

                // Deadzone check for fine-grained 3D tilts
                STATE.joyX = Math.abs(gp.axes[0]) > 0.12 ? gp.axes[0] : 0;
                STATE.joyY = Math.abs(gp.axes[1]) > 0.12 ? gp.axes[1] : 0;

                let dir = up ? 'up' : down ? 'down' : left ? 'left' : right ? 'right' : null;
                if (dir) {
                    if (gpActiveDir !== dir) {
                        gpActiveDir = dir; holdTime = Date.now(); lastRepeatTime = Date.now();
                        handleKeydown({ key: { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' }[dir] });
                    } else if (Date.now() - holdTime > 350 && Date.now() - lastRepeatTime > 80) {
                        handleKeydown({ key: { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' }[dir] });
                        lastRepeatTime = Date.now();
                    }
                } else gpActiveDir = null;

                if (enter && !lastGamepadState.enter) executeAction();
                if (back && !lastGamepadState.back) handleSystemBack();

                lastGamepadState = { up, down, left, right, enter, back };
                break;
            }
            requestAnimationFrame(pollGamepads);
        }

        // ==========================================================================
        // Render & Physics Loop
        // ==========================================================================
        let lastTargetElement = null;
        let focusScale = 1.0;

        function tickMicroanimations() {
            const activeTarget = getActiveTarget();
            const currentElement = activeTarget ? activeTarget.icon : null;
            const currentContainer = activeTarget ? activeTarget.container : null;

            // Clear visual residues on unfocused items
            const tiltedElements = document.querySelectorAll('.tilted-focus');
            tiltedElements.forEach(el => {
                if (el !== currentElement && el !== currentContainer) {
                    if (!el.springs) { 
                        el.style.transform = ''; 
                        el.classList.remove('tilted-focus'); 
                    }
                }
            });

            // Update Spring Calculations
            springElements.forEach(el => {
                if (!el.isConnected) return;
                const s = el.springs; 
                let changed = false;
                
                if (s.scale.update()) changed = true; 
                if (s.posX.update()) changed = true; 
                if (s.posY.update()) changed = true; 
                if (s.focusState.update()) changed = true;
                
                const isFocused = s.focusState.val > 0.01;
                const isCurrent = (el === currentElement);

                if (changed || isFocused || isCurrent) {
                    const cardMoveScale = 0.48;
                    const springX = s.posX.val * cardMoveScale;
                    const springY = s.posY.val * cardMoveScale;
                    const jX = isCurrent ? STATE.joyX : 0;
                    const jY = isCurrent ? STATE.joyY : 0;
                    
                    const maxIconRotate = 8, maxIconTranslate = 6;
                    const iconRotateY = jX * maxIconRotate;
                    const iconRotateX = -jY * maxIconRotate;
                    const iconTranslateX = jX * maxIconTranslate;
                    const iconTranslateY = jY * maxIconTranslate;
                    const totalTranslateX = springX + iconTranslateX;
                    const totalTranslateY = springY + iconTranslateY;

                    // Compute dynamic perspective transforms
                    el.style.transform = `scale(${s.scale.val.toFixed(3)}) translate3d(${totalTranslateX.toFixed(2)}px, ${totalTranslateY.toFixed(2)}px, 0) rotateX(${iconRotateX.toFixed(2)}deg) rotateY(${iconRotateY.toFixed(2)}deg)`;
                    el.classList.add('tilted-focus');

                    // Compute highlights & physical gloss effects
                    const f = Math.max(0, s.focusState.val);
                    if (el.glassBorder) el.glassBorder.style.opacity = (0.2 + 0.8 * f).toFixed(3);
                    if (el.shine) {
                        el.shine.style.opacity = f.toFixed(3);
                        if (isFocused) {
                            const shineX = 30 + (s.posX.val * 2.2) + Math.sin(Date.now() * 0.001) * 3;
                            const shineY = 30 + (s.posY.val * 2.2) + Math.cos(Date.now() * 0.001) * 3;
                            el.shine.style.background = `radial-gradient(circle at ${shineX.toFixed(1)}% ${shineY.toFixed(1)}%, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 60%, rgba(255,255,255,0) 100%)`;
                        }
                    }
                }
            });

            // Handle elements not explicitly powered by the physics framework (such as detail buttons)
            if (activeTarget && activeTarget.icon && activeTarget.container && !activeTarget.icon.springs) {
                const container = activeTarget.container;
                const icon = activeTarget.icon;
                if (icon !== lastTargetElement) { focusScale = 1.0; lastTargetElement = icon; }
                focusScale += (1.08 - focusScale) * 0.12;

                container.classList.add('tilted-focus');
                icon.classList.add('tilted-focus');
                
                const maxIconRotate = 8, maxIconTranslate = 6;
                const iconRotateY = STATE.joyX * maxIconRotate;
                const iconRotateX = -STATE.joyY * maxIconRotate;
                const iconTranslateX = STATE.joyX * maxIconTranslate;
                const iconTranslateY = STATE.joyY * maxIconTranslate;

                if (container === icon) {
                    icon.style.transform = `scale(${focusScale}) translate3d(${iconTranslateX}px, ${iconTranslateY}px, 0) rotateX(${iconRotateX}deg) rotateY(${iconRotateY}deg)`;
                }
            }

            requestAnimationFrame(tickMicroanimations);
        }

        window.onload = initApp;
    </script>
</body>
</html>
