<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>viewOS</title>
    <style>
        /* ==========================================================================
           FUTURE AI NOTE:
           - Consistency: `--border-radius` is strictly applied to ALL elements and UI should all be the same and consistent.
           - Font: Exclusively uses InterTight-VariableFont_wght.ttf. NO BOLD FONTS. font-weight is clamped to 300 globally. Letter spacing is clamped tightly.
           - Selection State: Focus is indicated by expanding the active item and styling text controls.
           - Native Engines: Both Media & Audio playback is handled locally.
           - Scrolling: Uses custom hardware-accelerated CSS translation scrolling to match
             focus animations flawlessly. Standard browser smooth scrolling is completely bypassed.
           - Expandability: Make sure to build everything to be changed and expanded on in the future so its easy to add new features
           ========================================================================== */

        html {
            font-size: 17px; 
        }

        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --secondary-text: #aaaaaa;
            --focus-color: #ffffff;
            
            --app-width: clamp(200px, 20vw, 400px);
            --app-height: calc(var(--app-width) * 0.6); 
            --square-size: clamp(120px, 12vw, 240px); 
            --portrait-width: clamp(130px, 14vw, 250px);
            --portrait-height: calc(var(--portrait-width) * 1.5);
            --grid-gap: clamp(20px, 3vw, 60px);
            --columns: 4; 
            
            --border-radius: 8px; 
            --focus-offset: 12px; 
        }

        @font-face {
            font-family: 'Inter Tight';
            src: url('SystemData/InterTight-VariableFont_wght.ttf') format('truetype');
        }

        * {
            font-family: 'Inter Tight', -apple-system, sans-serif;
            font-weight: 300 !important;
            letter-spacing: -0.03em !important; 
            line-height: 1.2;
            box-sizing: border-box;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            cursor: none !important;
            scrollbar-width: none !important; 
            -ms-overflow-style: none !important; 
        }

        *::-webkit-scrollbar { display: none !important; }

        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        #focus-ring {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: -1000;
            display: none !important;
        }

        .no-transition { transition: none !important; }

        #home-screen, .app-panel, #audio-player-screen, #cinema-player {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            display: none;
            transform: scale(1);
        }

        .screen-visible {
            display: block !important;
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        #audio-player-screen.screen-visible { display: flex !important; }
        #audio-player-screen.transition-forward-entry-start,
        #audio-player-screen.transition-backward-entry-start { display: flex !important; }

        /* Decoupled transition handler prevents layout snaps on initialization */
        .screen-transitioning { 
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), transform 0.5s cubic-bezier(0.25, 1, 0.5, 1) !important; 
            pointer-events: none !important; 
        }
        .transition-forward-exit { opacity: 0 !important; }
        .transition-forward-entry-start { opacity: 0 !important; display: block !important; }
        .transition-backward-exit { opacity: 0 !important; }
        .transition-backward-entry-start { opacity: 0 !important; display: block !important; }

        .scroll-wrapper {
            width: 100%; min-height: 100vh;
            transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform;
            padding: 180px 2vw 250px 2vw;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
        }

        .panel-header {
            font-size: 2.8rem; margin-bottom: 40px; margin-top: 0;
            color: var(--text-color); text-transform: capitalize;
            text-align: center; width: 100%;
        }

        .app-top-bar {
            position: absolute; top: 0; left: 0;
            display: flex; align-items: center; justify-content: center; gap: 40px;
            background-color: rgba(18, 18, 18, 0.55);
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 50px 2vw 25px 2vw; width: 100vw; z-index: 1000;
        }

        .top-bar-tab { font-size: 1.5rem; color: var(--secondary-text); padding: 10px 24px; border-radius: var(--border-radius); }
        .top-bar-tab.active { color: #ffffff; }

        #app-grid {
            display: grid; grid-template-columns: repeat(var(--columns), var(--app-width));
            gap: var(--grid-gap); justify-content: center; margin: 0 auto;
            perspective: 1000px;
        }

        .media-grid {
            display: grid; grid-template-columns: repeat(var(--columns), var(--app-width));
            gap: 30px var(--grid-gap); justify-content: center; align-content: start; 
            margin: 0 auto; width: 100%;
            perspective: 1000px;
        }

        .media-grid.square-grid { grid-template-columns: repeat(var(--columns), var(--square-size)); }
        .media-grid.square-grid.five-columns { grid-template-columns: repeat(5, var(--square-size)); }
        .media-grid.portrait-grid { grid-template-columns: repeat(var(--columns), var(--portrait-width)); }
        .media-grid.portrait-grid.five-columns { grid-template-columns: repeat(5, var(--portrait-width)); }

        .app-container, .media-item, .settings-item { 
            scroll-margin-top: 140px; scroll-margin-bottom: 140px; 
            transform-style: preserve-3d;
            will-change: transform;
            transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .app-container.tilted-focus, .media-item.tilted-focus { transition: none !important; }
        
        .app-container { display: flex; flex-direction: column; align-items: center; }
        
        .media-item {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; height: calc(var(--app-height) + clamp(80px, 10vw, 130px)); flex-shrink: 0;
        }

        .media-grid.square-grid .media-item { height: calc(var(--square-size) + clamp(80px, 10vw, 130px)); }
        .media-grid.portrait-grid .media-item { height: calc(var(--portrait-height) + clamp(80px, 10vw, 130px)); }

        .app-icon, .media-card {
            background-color: #111111; border-radius: var(--border-radius);
            background-size: cover; background-position: center;
            position: relative; flex-shrink: 0;
            transition: none !important; 
            box-shadow: none !important; 
            overflow: visible !important;
            z-index: 1;
            transform-style: preserve-3d;
        }

        .app-icon { width: var(--app-width); height: var(--app-height); }
        .media-card { width: var(--app-width); height: var(--app-height); }
        .media-grid.square-grid .media-card { width: var(--square-size); height: var(--square-size); }
        .media-grid.portrait-grid .media-card { width: var(--portrait-width); height: var(--portrait-height); }

        .card-shine {
            position: absolute; inset: 0; border-radius: inherit; pointer-events: none; z-index: 11;
            mix-blend-mode: screen; opacity: 0; will-change: opacity; overflow: hidden;
            transform: translate3d(0, 0, 0.5px);
        }
        .card-glass-border {
            position: absolute; inset: 0; border-radius: inherit; pointer-events: none; z-index: 12;
            border: 1.5px solid rgba(255,255,255,.3); opacity: 0; will-change: opacity;
            transform: translate3d(0, 0, 1px);
        }

        .app-name, .media-title {
            font-size: 1.5rem; color: #ffffff; margin-top: 38px; 
            text-align: center; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; width: 100%;
        }

        .progress-indicator {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 6px; background-color: rgba(255, 255, 255, 0.2); z-index: 10;
            border-radius: 0 0 var(--border-radius) var(--border-radius);
            overflow: hidden;
        }
        .progress-indicator-fill { height: 100%; background-color: #ffffff; }

        .yt-duration-badge {
            position: absolute; bottom: 12px; right: 12px;
            background-color: rgba(0, 0, 0, 0.65); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: #ffffff; font-size: 1.1rem; padding: 3px 8px; border-radius: 4px;
            pointer-events: none; z-index: 15; font-family: 'Inter Tight', sans-serif;
            font-weight: 300 !important;
        }

        .settings-list-container {
            width: 60%; max-width: 800px; margin: 0 auto;
            display: flex; flex-direction: column; gap: 20px;
        }

        .settings-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px 35px; font-size: 1.6rem; border-radius: var(--border-radius);
            color: var(--text-color); background-color: #000000; flex-shrink: 0;
        }

        .settings-value { 
            color: var(--secondary-text); font-size: 1.3rem; display: flex; align-items: center; gap: 10px; 
            transition: color 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .popup-button {
            width: fit-content; min-width: 200px; padding: 16px 35px; font-size: 1.6rem;
            color: #ffffff; background-color: transparent; border: none;
            border-radius: var(--border-radius); text-align: center; outline: none;
        }

        .volume-bar-container { height: 12px; background-color: rgba(255, 255, 255, 0.2); border-radius: 6px; overflow: hidden; position: relative; }
        .volume-bar-fill { height: 100%; background-color: #ffffff; width: 0%; border-radius: 6px; }

        #control-center {
            position: fixed; top: -450px; right: 30px; width: 380px;
            background-color: rgba(20, 20, 20, 0.7); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 18px;
            padding: 30px; z-index: 1000000; display: flex; flex-direction: column; gap: 24px;
            transition: top 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            opacity: 0; pointer-events: none; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        #control-center.visible { top: 30px; opacity: 1; pointer-events: auto; }

        .cc-tile { transition: background-color 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94), color 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .cc-tile-focused { background-color: #ffffff !important; color: #000000 !important; transform: scale(1.05) !important; }
        .cc-tile-focused * { color: #000000 !important; }
        .cc-tile-focused .volume-bar-fill { background-color: #000000 !important; }
        .cc-tile-focused .volume-bar-container { background-color: rgba(0, 0, 0, 0.15) !important; }

        #audio-player-screen { flex-direction: column; align-items: center; justify-content: center; padding-top: 0; }
        #audio-playing-art { width: 260px; height: 260px; }
        #cinema-video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; object-fit: contain; }
        #cinema-youtube { position: absolute !important; top: 0; left: 0; width: 100% !important; height: 100% !important; z-index: 1; pointer-events: none !important; opacity: 0; transition: opacity 0.5s ease; }
        #cinema-youtube.visible { opacity: 1 !important; }

        .cinema-osd {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 92%; 
            background-color: rgba(20, 20, 20, 0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--border-radius);
            padding: 25px 40px; display: flex; align-items: center; gap: 25px;
            transition: opacity 0.4s ease, bottom 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); opacity: 0; z-index: 10;
        }
        .cinema-osd.visible { opacity: 1; }
        .cinema-osd * { color: #ffffff !important; }
        .cinema-icon-container { display: flex; align-items: center; justify-content: center; }
        #cinema-time, #audio-cinema-time { width: 180px; text-align: right; flex-shrink: 0; }

        #system-popup {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); 
            z-index: 100000000; display: none; align-items: center; justify-content: center; 
            opacity: 0; transition: opacity 0.3s ease;
        }

        .top-bar-tab, .settings-item, .popup-button {
            transition: background-color 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94), color 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: none !important;
        }

        .top-bar-tab.is-focused, .settings-item.is-focused, .popup-button.is-focused { background-color: #ffffff !important; color: #000000 !important; }
        .settings-item.is-focused .settings-value { color: #333333 !important; }
        
        .tilted-focus { transition: none !important; }
        .tilted-focus:not(.top-bar-tab):not(.settings-item):not(.popup-button) { transition: none !important; }
        /* Strict transition override to completely eliminate color snap/flicker on flat text buttons when untiliting */
        .top-bar-tab.tilted-focus, .settings-item.tilted-focus, .popup-button.tilted-focus {
            transition: background-color 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94), color 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) !important;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="boot-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #000000; z-index: 10000000; display: flex; align-items: center; justify-content: center; opacity: 1; transition: opacity 0.8s ease;">
        <div style="font-size: 3rem; font-weight: 300; letter-spacing: -0.05em; color: #ffffff;">viewOS</div>
    </div>

    <div id="focus-ring" style="display: none;"></div>
    <div id="sleep-environment" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #000000; z-index: 95000; display: none; opacity: 0; transition: opacity 0.5s ease;"></div>
    <div id="resume-toast" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background-color: rgba(20, 20, 20, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px 30px; border-radius: var(--border-radius); font-size: 1.5rem; color: white; z-index: 9000; display: none; opacity: 0; transition: opacity 0.3s ease;">System Notice</div>

    <div id="control-center">
        <div id="cc-vol-tile" class="cc-tile" style="display: flex; flex-direction: column; gap: 14px; padding: 20px; border-radius: var(--border-radius); background-color: rgba(255, 255, 255, 0.05); cursor: pointer;">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <span class="cc-label" style="font-size: 1.6rem; color: #ffffff;">Volume</span>
                <span id="volume-text" class="cc-value" style="font-size: 1.6rem; color: var(--secondary-text);">50%</span>
            </div>
            <div class="volume-bar-container" style="width: 100%; height: 12px; background: #333; border-radius: 6px; overflow: hidden;">
                <div class="volume-bar-fill" id="volume-fill" style="height: 100%; background: #ffffff; width: 50%;"></div>
            </div>
        </div>
        <div style="display: flex; gap: 20px; width: 100%;">
            <div id="cc-sleep-tile" class="cc-tile" style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; border-radius: var(--border-radius); background-color: rgba(255, 255, 255, 0.05); font-size: 1.6rem; color: #ffffff; cursor: pointer; text-align: center;">Sleep</div>
            <div id="cc-home-tile" class="cc-tile" style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; border-radius: var(--border-radius); background-color: rgba(255, 255, 255, 0.05); font-size: 1.6rem; color: #ffffff; cursor: pointer; text-align: center;">Home</div>
        </div>
    </div>

    <div id="home-screen" class="screen-visible">
        <div id="home-scroll-wrapper" class="scroll-wrapper"><div id="app-grid"></div></div>
    </div>

    <div id="media-environment" class="app-panel">
        <div id="media-top-bar" class="app-top-bar"></div>
        <div id="media-scroll-wrapper" class="scroll-wrapper">
            <div id="media-grid" class="media-grid"></div>
        </div>
    </div>

    <!-- Sandboxed Executable Frame for Dynamic Applications -->
    <div id="custom-app-environment" class="app-panel" style="padding: 0; margin: 0; width: 100vw; height: 100vh; z-index: 5000; background: #000;">
        <iframe id="custom-app-iframe" allow="gamepad *; autoplay *; fullscreen *" style="width: 100%; height: 100%; border: none; overflow: hidden; background: #000;"></iframe>
    </div>

    <div id="audio-player-screen">
        <div id="audio-playing-art" class="media-card" style="margin-bottom: 40px; background-size: cover; background-position: center;"></div>
        <div id="audio-playing-title" style="font-size: 2.2rem; margin-bottom: 8px; text-align: center; color: var(--text-color);">Track Title</div>
        <div id="audio-playing-artist" style="font-size: 1.4rem; margin-bottom: 40px; text-align: center; color: var(--secondary-text);">Artist</div>
        
        <div id="audio-player-osd" class="cinema-osd" style="opacity: 1; display: flex;">
            <div id="audio-cinema-play-state" class="cinema-icon-container"></div>
            <div class="volume-bar-container" style="flex: 1;"><div class="volume-bar-fill" id="audio-progress" style="width: 0%;"></div></div>
            <div id="audio-cinema-time">0:00 / 0:00</div>
        </div>
    </div>

    <div id="settings-environment" class="app-panel">
        <div id="settings-scroll-wrapper" class="scroll-wrapper">
            <h1 class="panel-header">Settings</h1>
            <div class="settings-list-container" id="settings-list"></div>
        </div>
    </div>

    <div id="cinema-player">
        <video id="cinema-video" playsinline></video>
        <div id="cinema-osd" class="cinema-osd">
            <div id="cinema-play-state" class="cinema-icon-container"></div>
            <div class="volume-bar-container" style="flex: 1;"><div class="volume-bar-fill" id="cinema-progress" style="width: 0%;"></div></div>
            <div id="cinema-time">0:00 / 0:00</div>
        </div>
    </div>

    <!-- Enhanced System Popup with standardized preview icon -->
    <div id="system-popup">
        <div id="system-popup-content" style="background-color: transparent; border: none; padding: 40px; width: 90%; max-width: 600px; display: flex; flex-direction: column; align-items: center; text-align: center; transition: opacity 0.35s ease;">
            <img id="popup-image" style="display: none; border-radius: var(--border-radius); margin-bottom: 25px; box-shadow: none !important;">
            <h2 id="popup-title" style="font-size: 2.8rem; margin-top: 0; margin-bottom: 15px; color: #ffffff;">Title</h2>
            <p id="popup-desc" style="font-size: 1.5rem; color: var(--secondary-text); margin-bottom: 40px; line-height: 1.5;"></p>
            <div id="popup-buttons-container" style="display: flex; flex-direction: column; width: 100%; gap: 15px; align-items: center;"></div>
        </div>
    </div>

    <script src="content.js" onerror="console.warn('Local content.js missing. Operating without local database.');"></script>

    <script>
        const db = window.contentRegistry || [];

        // View Cloud Configuration & Local Version Parameters
        const VIEW_CLOUD_URL = 'https://script.google.com/macros/s/AKfycbzR_BI7fcEi1B_ZGG0nlP7Xw6vVSJ9WCDnlrsBWN8jDKmUmUtfNTJz0uEzMZsoDFeOgEA/exec';
        const CURRENT_OS_VERSION = '0.8.4';
        const CLIENT_VERSION = 1;

        (function() {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        })();

        /* Helpers & Path Projections */
        function compareVersions(v1, v2) {
            const p1 = String(v1).split('.').map(Number);
            const p2 = String(v2).split('.').map(Number);
            const len = Math.max(p1.length, p2.length);
            for (let i = 0; i < len; i++) {
                const n1 = p1[i] || 0;
                const n2 = p2[i] || 0;
                if (n1 > n2) return 1;
                if (n1 < n2) return -1;
            }
            return 0;
        }

        function getArtPath(item) {
            if (!item || !item.art) return null;
            if (item.art.startsWith('http')) return item.art;
            return `Content/${item.art}`;
        }
        function getContentFilePath(item) {
            if (!item) return '';
            if (item.app === 'movies') return `Content/Movies/${item.file || ''}`;
            if (item.app === 'tvshows') return `Content/TV Shows/${item.file || ''}`;
            if (item.app === 'sports') return `Content/Sports/${item.file || ''}`;
            if (item.app === 'music') return `Content/Music/${item.file || ''}`;
            return item.file || '';
        }
        function formatTime(seconds) {
            if (isNaN(seconds) || seconds === undefined || seconds === null) return "0:00";
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            if (hrs > 0) return `${hrs}:${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        function getResumeTimestamp(item) {
            try {
                const saved = localStorage.getItem(`viewOS_resume_${getContentFilePath(item)}`);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return parsed ? (parsed.timestamp || 0) : 0;
                }
            } catch(e) {}
            return 0;
        }
        function hasResumeData(item) { return getResumeTimestamp(item) > 0; }
        function getLatestTimestamp(episodes) { 
            if (!episodes || episodes.length === 0) return 0;
            const timestamps = episodes.map(ep => getResumeTimestamp(ep));
            return Math.max(0, ...timestamps); 
        }

        const videoQueue = [];
        let activeVideoLoads = 0;
        const MAX_CONCURRENT_VIDEO_LOADS = 2;

        function processVideoQueue() {
            if (videoQueue.length === 0 || activeVideoLoads >= MAX_CONCURRENT_VIDEO_LOADS) return;
            activeVideoLoads++;
            const { videoPath, containerElement } = videoQueue.shift();
            const video = document.createElement('video');
            video.src = videoPath; video.preload = "metadata"; video.muted = true; video.playsInline = true;
            video.style.cssText = "width:100%; height:100%; object-fit:cover; border-radius:inherit;";

            const cleanup = () => { activeVideoLoads--; processVideoQueue(); };
            video.addEventListener('loadedmetadata', () => { video.currentTime = 0.33; }, { once: true });
            video.addEventListener('seeked', cleanup, { once: true });
            video.addEventListener('error', cleanup, { once: true });
            containerElement.appendChild(video);
        }

        function generateLocal10thFrame(videoPath, containerElement) {
            videoQueue.push({ videoPath, containerElement });
            processVideoQueue();
        }

        // Consolidated Engine for progress updates
        function updateOSDProgress(prefix, current, duration) {
            const progressFill = document.getElementById(`${prefix}-progress`);

            return (match && match[2] && match[2].length === 11) ? match[2] : null;

        async function fetchYouTubeContent(isBackgroundPing = false) {
            if (!isViewCloudEnabled()) return;
            try {
                const response = await fetch(`${VIEW_CLOUD_URL}?action=getYouTubeLinks`); 
                if (!response.ok) return;
                const data = await response.json();
                if (data && data.links) {
                    const fetchedVideoIds = data.links.map(getYouTubeId).filter(Boolean);
                    let changed = false;

                    for (let i = db.length - 1; i >= 0; i--) {
                        const item = db[i];
                        if (item && item.isYouTube) {
                            if (!fetchedVideoIds.includes(item.videoId)) {
                                const isPlaying = (STATE.activePlayingItemPath === getContentFilePath(item) || window.pendingYTLaunchVideoId === item.videoId);
                                const hasResume = hasResumeData(item);
                                if (!isPlaying && !hasResume) {
                                    const el = DB_ITEM_ELEMENTS.get(item);
                                    if (el && el.parentNode) el.parentNode.removeChild(el);
                                    DB_ITEM_ELEMENTS.delete(item);
                                    db.splice(i, 1);
                                    changed = true;
                                }
                            }
                        }
                    }

                    fetchedVideoIds.forEach((videoId, idx) => {
                        const exists = db.find(item => item && item.isYouTube && item.videoId === videoId);
                        if (!exists) {
                            const originalUrl = data.links[idx];
                            db.push({ id: `yt-${videoId}`, app: 'youtube', file: `${videoId}.yt`, url: originalUrl, videoId: videoId, title: `Loading Video (${videoId})...`, art: `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`, isYouTube: true });
                            changed = true;
                        }
                    });

                    if (changed) {
                        preRenderAllMedia();
                        fetchYouTubeMetadata();
                        if (STATE.currentScreen === 'media' && STATE.activeApp === 'youtube') {
                            renderMediaGrid('youtube');
                        }
                    }
                }
            } catch (e) {}
        }

                item.metadataFetched = true;
                const itemEl = DB_ITEM_ELEMENTS.get(item); if (!itemEl) return;
                fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${item.videoId}`).then(r => r.json()).then(data => {
                    if (data && data.title) { item.title = data.title; const t = itemEl.querySelector('.media-title'); if (t) t.innerText = data.title; }
                    if (data && data.thumbnail_url) {

        let durationPlayer = null, ytDurationQueue = [], isFetchingYtDuration = false, durationTimeout = null, currentDurationLoadingId = null, durationPlayerInitialized = false, durationPlayerReady = false;

        function updateFocusRingPosition() {
            const ring = document.getElementById('focus-ring'); if (['player','audio_player','custom_app'].includes(STATE.currentScreen) || STATE.inSleep) return;
            const target = getActiveTarget(); if (!target || !target.icon) return; let wrapper = null;

            if (STATE.inPopup) {
                const rect = target.icon.getBoundingClientRect(), offset = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--focus-offset')), itemRadius = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--border-radius'));
                ring.style.width = `${rect.width + (offset * 2)}px`; ring.style.height = `${rect.height + (offset * 2)}px`;
                ring.style.transform = `translate(${rect.left - offset}px, ${rect.top - offset}px)`; ring.style.borderRadius = `${itemRadius + offset}px`; return;
            }

            if (STATE.currentScreen === 'home') wrapper = document.getElementById('home-scroll-wrapper');
            else if (STATE.currentScreen === 'media') wrapper = document.getElementById('media-scroll-wrapper');
            else if (STATE.currentScreen === 'settings') wrapper = document.getElementById('settings-scroll-wrapper');
            if (!wrapper) return;

            // Calculating vertical offsets using static layout boundaries to eliminate horizontally-triggered jitters
            const container = target.container;
            const containerTop = container.offsetTop;
            const containerHeight = container.offsetHeight;

            let translateY = Math.min(0, Math.max(-Math.max(0, wrapper.scrollHeight - window.innerHeight), (window.innerHeight / 2) - (containerTop + (containerHeight / 2))));
            
            const rect = target.icon.getBoundingClientRect(); if (rect.width === 0 || rect.height === 0) return;
            const offset = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--focus-offset')), itemRadius = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--border-radius'));
            const wrapperRect = wrapper.getBoundingClientRect(), top = rect.top - wrapperRect.top, left = rect.left - wrapperRect.left;

            if (STATE.currentScreen === 'media' && STATE.mediaFocusArea === 'top-bar') {
                wrapper.style.transform = `translateY(0px)`;
                ring.style.width = `${rect.width + (offset * 2)}px`; ring.style.height = `${rect.height + (offset * 2)}px`;
                ring.style.transform = `translate(${rect.left - offset}px, ${rect.top - offset}px)`; ring.style.borderRadius = `${itemRadius + offset}px`; return;
            }

            ring.style.width = `${rect.width + (offset * 2)}px`; ring.style.height = `${rect.height + (offset * 2)}px`;
            ring.style.transform = `translate(${left - offset}px, ${(top + translateY) - offset}px)`; ring.style.borderRadius = `${itemRadius + offset}px`;
            
            wrapper.style.transform = `translateY(${translateY}px)`;
        }

        let lastActiveTarget = null;
        function updateFocus(isInitialLoad = false, dx = 0, dy = 0) {
            document.querySelectorAll('.is-focused').forEach(el => el.classList.remove('is-focused'));
            const ring = document.getElementById('focus-ring');
            if (['player','audio_player','custom_app'].includes(STATE.currentScreen) || STATE.inSleep) { 
                ring.style.opacity = '0'; 
                if (lastActiveTarget && lastActiveTarget.icon && lastActiveTarget.icon.springs) {
                    const s = lastActiveTarget.icon.springs; s.scale.target = 1.0; s.focusState.target = 0; s.posX.target = 0; s.posY.target = 0; lastActiveTarget.icon.style.zIndex = '1';
                }
                lastActiveTarget = null; return; 
            }
            
            const target = getActiveTarget();
            if (lastActiveTarget && lastActiveTarget.icon && lastActiveTarget.icon.springs && lastActiveTarget !== target) {
                const s = lastActiveTarget.icon.springs; s.scale.target = 1.0; s.focusState.target = 0; s.posX.target = 0; s.posY.target = 0;
                if (dx) s.posX.vel = dx * 22; if (dy) s.posY.vel = dy * 22; lastActiveTarget.icon.style.zIndex = '1';
            }
            
            if (target && target.icon && target.icon.springs) {
                const s = target.icon.springs;
                let scaleTarget = 1.15;
                if (target.icon.classList.contains('settings-item')) scaleTarget = 1.05;
                else if (target.icon.classList.contains('top-bar-tab')) scaleTarget = 1.06;
                else if (target.icon.classList.contains('popup-button')) scaleTarget = 1.08;
                
                s.scale.target = scaleTarget;
                s.focusState.target = 1.0;
                if (dx) s.posX.vel = dx * 28; if (dy) s.posY.vel = dy * 28; target.icon.style.zIndex = '50';
            }
            
            lastActiveTarget = target;
            if (target && target.container && target.icon) {
                target.container.classList.add('is-focused'); if (target.icon !== target.container) target.icon.classList.add('is-focused');
                requestAnimationFrame(() => {

        }

        function performScrub(direction, type) {
            const isAudio = (type === 'audio'), prefix = isAudio ? 'audio' : 'cinema', cv = document.getElementById('cinema-video');
            const isYT = !isAudio && STATE.activePlayingItemPath && STATE.activePlayingItemPath.includes('.yt');
            let duration = 0, current = 0;

            if (isAudio) { 
                if (!activeAudio || !activeAudio.duration) return; 
                duration = activeAudio.duration; 
                current = (STATE.audioScrubbingTime === null) ? activeAudio.currentTime : STATE.audioScrubbingTime; 
            } else if (isYT) { 
                if (!ytPlayer || typeof ytPlayer.getDuration !== 'function') return; 
                duration = ytPlayer.getDuration(); 
                current = (STATE.scrubbingTime === null) ? ytPlayer.getCurrentTime() : STATE.scrubbingTime; 
            } else { 
                duration = cv.duration; 
                if (!duration) return; 
                current = (STATE.scrubbingTime === null) ? cv.currentTime : STATE.scrubbingTime; 
            }

            const now = Date.now();
            const lastTime = isAudio ? STATE.lastAudioSeekTime : STATE.lastSeekTime;
            let accel = isAudio ? STATE.audioSeekAcceleration : STATE.seekAcceleration;
            
            // Accelerates the longer they hold the scrub button
            accel = (now - lastTime < 350) ? Math.min(isAudio ? 45 : 75, accel + (isAudio ? 3 : 5)) : (isAudio ? 5 : 10);
            
            if (isAudio) { 
                STATE.lastAudioSeekTime = now; 
                STATE.audioSeekAcceleration = accel; 
            } else { 
                STATE.lastSeekTime = now; 
                STATE.seekAcceleration = accel; 
            }

            const targetTime = Math.max(0, Math.min(duration, direction === 'right' ? current + accel : current - accel));
            
            if (isAudio) {
                STATE.audioScrubbingTime = targetTime;
            } else {
                STATE.scrubbingTime = targetTime;
            }

            // Instantly update UI progress bar and clock
            updateOSDProgress(prefix, targetTime, duration); 
            if (!isAudio) triggerCinemaOSD();

            // Smoothly commit the seek after a brief pause of user input (debounce)
            // This prevents the video decoder from choking while the user is rapidly clicking/holding the button.
            clearTimeout(isAudio ? STATE.audioSeekCommitTimer : STATE.seekCommitTimer);
            
            const commitTimer = setTimeout(() => {
                if (isAudio) {
                    activeAudio.currentTime = STATE.audioScrubbingTime;
                    STATE.audioScrubbingTime = null;
                } else if (isYT) {
                    if (ytPlayer && typeof ytPlayer.seekTo === 'function') {
                        ytPlayer.seekTo(STATE.scrubbingTime, true);
                    }
                    STATE.scrubbingTime = null;
                } else {
                    cv.currentTime = STATE.scrubbingTime;
                    STATE.scrubbingTime = null;
                }
            }, 200); // 200ms debounce for buttery smooth scrubbing

            if (isAudio) {
                STATE.audioSeekCommitTimer = commitTimer;
            } else {
                STATE.seekCommitTimer = commitTimer;
            }
        }

        function navigateScreen(fromEl, toEl, isForward = true) {
            if (!toEl) return;
            STATE.isNavigating = true;

            springElements = springElements.filter(el => {
                return document.body.contains(el) || 
                       Array.from(DB_ITEM_ELEMENTS.values()).some(itemEl => itemEl.contains(el)) || 
                       Array.from(TV_SHOW_FOLDER_ELEMENTS.values()).some(obj => obj.element.contains(el)) ||
                       Array.from(STORE_ITEM_ELEMENTS.values()).some(itemEl => itemEl.contains(el));
            });

            if (window.activeTransitionTimeout) { clearTimeout(window.activeTransitionTimeout); window.activeTransitionTimeout = null; }
            const targetDisplay = (toEl.id === 'audio-player-screen') ? 'flex' : 'block';

            if (!fromEl) { 
                toEl.style.transform = '';
                toEl.style.opacity = '';
                toEl.classList.add('screen-visible'); 
                STATE.isNavigating = false; 
                updateFocus(true); 
                return; 
            }

            fromEl.style.pointerEvents = 'none'; 
            toEl.style.pointerEvents = 'none';

            // Stage 1: Fade out the outgoing screen completely first over 200ms
            fromEl.classList.add('screen-transitioning');
            fromEl.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
            fromEl.style.opacity = '0';
            fromEl.style.transform = isForward ? 'scale(1.4)' : 'scale(0.75)';

            window.activeTransitionTimeout = setTimeout(() => {
                fromEl.style.display = 'none';
                fromEl.classList.remove('screen-transitioning', 'screen-visible');
                fromEl.style.transform = '';
                fromEl.style.opacity = '';
                fromEl.style.transition = '';
                fromEl.style.pointerEvents = '';

                // Stage 2: Scale up and fade in the target viewport screen over 400ms
                toEl.style.display = targetDisplay;
                toEl.style.opacity = '0';
                toEl.style.transform = isForward ? 'scale(0.75)' : 'scale(1.4)';
                toEl.offsetHeight; // force reflow

                toEl.classList.add('screen-transitioning');
                toEl.style.transition = 'opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
                
                toEl.style.opacity = '1';
                toEl.style.transform = 'scale(1)';

                window.activeTransitionTimeout = setTimeout(() => {
                    toEl.classList.remove('screen-transitioning');
                    toEl.classList.add('screen-visible');
                    toEl.style.transform = '';
                    toEl.style.opacity = '';
                    toEl.style.transition = '';
                    toEl.style.pointerEvents = '';
                    
                    window.activeTransitionTimeout = null;
                    STATE.isNavigating = false;
                    updateFocus(false);
                }, 400);

            }, 200);
        }

        function navigateInnerContent(wrapper, callback, isForward = true) {
            if (!wrapper) { callback(); return; }
            STATE.isNavigating = true; wrapper.style.transition = 'opacity 0.4s ease'; wrapper.style.opacity = '0';
            setTimeout(() => {
                callback(); wrapper.style.transition = 'none'; wrapper.offsetHeight; wrapper.style.transition = 'opacity 0.4s ease'; wrapper.style.opacity = '1';
                setTimeout(() => { STATE.isNavigating = false; updateFocus(false); }, 400);
            }, 400);
        }

        // Expanded clean-exit handler to force kill ALL media states and perfectly reset to home
        function triggerHomeFromControlCenter() {
            closeControlCenter();
            
            // 1. Force kill all media universally regardless of current screen state
            if (activeAudio) {
                try { activeAudio.pause(); activeAudio.currentTime = 0; activeAudio.src = ''; } catch(e) {}
            }
            stopYTProgressTracking();
            if (ytPlayer) {
                try { ytPlayer.pauseVideo(); ytPlayer.destroy(); } catch(e) {}
                ytPlayer = null;
            }
            const ytDiv = document.getElementById('cinema-youtube');
            if (ytDiv) ytDiv.remove();
            
            const video = document.getElementById('cinema-video');
            if (video) {
                try { video.pause(); video.removeAttribute('src'); video.load(); } catch(e) {}
            }

            // 2. Identify the currently active overlay to transition away from
            let fromScreen = null;
            const panels = ['media-environment', 'settings-environment', 'custom-app-environment', 'cinema-player', 'audio-player-screen'];
            panels.forEach(id => {
                const el = document.getElementById(id);
                if (el && el.classList.contains('screen-visible')) {
                    fromScreen = el;
                }
            });

            // 3. Purge custom iframe just in case
            const iframe = document.getElementById('custom-app-iframe');
            if (iframe) setTimeout(() => { iframe.srcdoc = ''; }, 500);

            // 4. Wipe internal states and force scroll positions
            document.querySelectorAll('.scroll-wrapper').forEach(w => w.style.transform = 'translateY(0px)');
            STATE.currentScreen = 'home';
            STATE.activeApp = null;
            updateColumns();

            const toScreen = document.getElementById('home-screen');
            if (fromScreen && fromScreen !== toScreen) {
                navigateScreen(fromScreen, toScreen, false);
            } else {
                toScreen.style.transform = '';
                toScreen.style.opacity = '1';
                toScreen.classList.add('screen-visible');
                updateFocus(true);
            }
        }

        function openAppPanel(appId) {

                STATE.currentScreen = 'media'; STATE.mediaFocusedIndex = 0; STATE.topBarFocusedIndex = 0; STATE.currentTab = 'all';

                }).then(d => {
                    const apps = (d && Array.isArray(d.apps)) ? d.apps : [];
                    storeAppsList = apps.map((a, idx) => ({ id: `store-${a.name || idx}`, app: 'store', name: a.name || 'Unnamed App', art: a.icon || '', version: a.version || '1.0', supportedClients: a.supportedClients || [] }));
                    STORE_ITEM_ELEMENTS.clear();
                    storeAppsList.forEach(app => {

                    if (topBar) topBar.style.display = 'flex';

                }).catch(() => {

                });
            } else {

                STATE.mediaFocusArea = 'grid'; updateColumns(); renderTopBar(); renderMediaGrid(appId);

        }

            const iframe = document.getElementById('custom-app-iframe');

            iframe.srcdoc = code;
            STATE.currentScreen = 'custom_app';
            
            const fromEl = document.getElementById(STATE.inPopup ? 'media-environment' : 'home-screen');
            if (STATE.inPopup) closeSystemPopup();
            
            navigateScreen(fromEl, document.getElementById('custom-app-environment'), true);

        function closeCustomApp() {
            const iframe = document.getElementById('custom-app-iframe');
            const toScreen = document.getElementById('home-screen');
            STATE.currentScreen = 'home'; STATE.activeApp = null; updateColumns();
            navigateScreen(document.getElementById('custom-app-environment'), toScreen, false);

        function launchCinemaPlayer(item) {
            const player = document.getElementById('cinema-player'), video = document.getElementById('cinema-video');
            const fromScreen = document.getElementById(STATE.currentScreen === 'home' ? 'home-screen' : 'media-environment');
            STATE.currentScreen = 'player'; STATE.activePlayingItemPath = getContentFilePath(item);
            if (item.isYouTube) {
                video.style.display = 'none'; try { video.pause(); } catch(e) {} initYouTubePlayer(item.videoId);
            } else {
                video.style.display = 'block'; 
                video.src = STATE.activePlayingItemPath; 
                
                const volSetting = settingsRegistry.find(s => s.id === 'volume');
                video.volume = volSetting.options[volSetting.currentIndex] / 100;
                
                let saved = null; 
                try { saved = localStorage.getItem(`viewOS_resume_${STATE.activePlayingItemPath}`); } catch(err) {}
                
                const handleVideoInit = () => {
                    if (saved) {
                        try {
                            const progress = JSON.parse(saved);
                            video.currentTime = progress.current;
                            triggerSystemToast(`Resumed from ${formatTime(progress.current)}`);
                        } catch(e){}
                        saved = null; // Clear to prevent double seek
                    }
                    video.play()
                        .then(() => {
                            updatePlayStateIcon('cinema');
                            triggerCinemaOSD();
                        })
                        .catch((err) => {
                            console.warn("Autoplay was prevented or failed:", err);
                            // Keep updating icon and keep OSD visible so user can interact
                            updatePlayStateIcon('cinema');
                            triggerCinemaOSD();
                        });
                };

                // Wait until there is enough data to play smoothly
                video.addEventListener('canplay', handleVideoInit, { once: true });
                video.load(); // Forces resources stream initialization
            } navigateScreen(fromScreen, player, true);
        }

        function closeCinemaPlayer() {
            const player = document.getElementById('cinema-player'), video = document.getElementById('cinema-video');
            stopYTProgressTracking(); let elapsed = 0, duration = 0;
            if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
                elapsed = ytPlayer.getCurrentTime(); duration = ytPlayer.getDuration();
                const ytDiv = document.getElementById('cinema-youtube'); if (ytDiv) ytDiv.classList.remove('visible');
                try { ytPlayer.pauseVideo(); ytPlayer.destroy(); ytPlayer = null; } catch(e) {} if (ytDiv) ytDiv.remove();
            } else { elapsed = video.currentTime || 0; duration = video.duration || 0; try { video.pause(); } catch (e) {} }
            
            try {
                if (elapsed < 20 || (duration && (duration - elapsed) < 180)) localStorage.removeItem(`viewOS_resume_${STATE.activePlayingItemPath}`);
                else if (duration) localStorage.setItem(`viewOS_resume_${STATE.activePlayingItemPath}`, JSON.stringify({ current: elapsed, duration: duration, timestamp: Date.now() }));
            } catch(e) {}

            let toScreen;
            if (STATE.mediaLaunchedByAI) { STATE.mediaLaunchedByAI = false; STATE.currentScreen = 'home'; STATE.activeApp = null; updateColumns(); toScreen = document.getElementById('home-screen'); } 
            else { STATE.currentScreen = 'media'; renderMediaGrid(STATE.activeApp); toScreen = document.getElementById('media-environment'); }
            navigateScreen(player, toScreen, false);
            setTimeout(() => { video.style.display = 'block'; try { video.src = ''; video.load(); } catch (e) {} }, 500);
        }

        function playAudioTrack(track) {
            activeAudio.src = getContentFilePath(track); 
            const volSetting = settingsRegistry.find(s => s.id === 'volume');
            activeAudio.volume = volSetting.options[volSetting.currentIndex] / 100; 
            activeAudio.play().catch(()=>{});
            
            const fromScreen = document.getElementById(STATE.currentScreen === 'home' ? 'home-screen' : 'media-environment');
            STATE.currentScreen = 'audio_player';
            const artElement = document.getElementById('audio-playing-art'), artPath = getArtPath(track);
            artElement.style.backgroundImage = artPath ? `url('${artPath}')` : "url('SystemData/Music.png')"; 
            document.getElementById('audio-playing-title').innerText = track.file ? track.file.replace(/\.[^/.]+$/, "") : "Untitled"; 
            document.getElementById('audio-playing-artist').innerText = track.artist || 'Unknown Artist';
            const playerScreen = document.getElementById('audio-player-screen'); playerScreen.classList.add('visible'); updatePlayStateIcon('audio');
            navigateScreen(fromScreen, playerScreen, true);
        }

        function closeAudioPlayer() {
            activeAudio.pause(); activeAudio.currentTime = 0; activeAudio.src = '';
            const playerScreen = document.getElementById('audio-player-screen'); playerScreen.classList.remove('visible');
            let toScreen;
            if (STATE.mediaLaunchedByAI) { STATE.mediaLaunchedByAI = false; STATE.currentScreen = 'home'; STATE.activeApp = null; updateColumns(); toScreen = document.getElementById('home-screen'); } 
            else { STATE.currentScreen = 'media'; const me = document.getElementById('media-environment'); toScreen = me; }
            navigateScreen(playerScreen, toScreen, false);
        }

        function triggerCinemaOSD() { const osd = document.getElementById('cinema-osd'); osd.classList.add('visible'); clearTimeout(osdTimer); updatePlayStateIcon('cinema'); osdTimer = setTimeout(() => osd.classList.remove('visible'), 5000); }
        function triggerSystemToast(msg) { const toast = document.getElementById('resume-toast'); toast.innerText = msg; toast.style.display = 'block'; setTimeout(() => toast.style.opacity = '1', 50); setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.style.display = 'none', 300); }, 3000); }

        function startSleep() { STATE.inSleep = true; sleepActiveTime = Date.now(); const env = document.getElementById('sleep-environment'); env.style.display = 'block'; document.getElementById('focus-ring').style.opacity = '0'; setTimeout(() => env.style.opacity = '1', 50); }
        function wakeUp() { if (!STATE.inSleep || Date.now() - sleepActiveTime < 1000) return; STATE.inSleep = false; const env = document.getElementById('sleep-environment'); env.style.opacity = '0'; setTimeout(() => { env.style.display = 'none'; updateFocus(false); }, 500); }

        const INPUT = { enterPressed: false, enterHoldTimer: null, enterHoldTriggered: false };
        let isBackDown = false, volumeOpenedByHold = false, backKeyTimeout = null; 

        function handleKeydownRaw(e) {
            if (STATE.isInstallingUpdate || STATE.isInstallingApp) { e.preventDefault(); return; }

            // GLOBAL BACK/ESCAPE HOLD OVERRIDE - Intercepts ALL screens including custom_apps
            if (e.key === 'Escape' || e.key === 'Backspace') {
                if (!isBackDown) {
                    isBackDown = true; volumeOpenedByHold = false;
                    backKeyTimeout = setTimeout(() => { volumeOpenedByHold = true; openControlCenter(); }, 400);
                }
                if (STATE.currentScreen === 'custom_app') return;
            }

            if (STATE.currentScreen === 'custom_app') return;

            if ((e.ctrlKey || e.metaKey) && (e.key === 'r' || e.key === 'R') || e.key === 'F5') return;
            if (STATE.inSleep) { if (Date.now() - sleepActiveTime >= 1000) wakeUp(); e.preventDefault(); return; }

            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                if (!INPUT.enterPressed) { INPUT.enterPressed = true; INPUT.enterHoldTriggered = false; if (STATE.currentScreen === 'media' && !STATE.inPopup && STATE.mediaFocusArea !== 'top-bar' && STATE.activeApp !== 'store') INPUT.enterHoldTimer = setTimeout(() => { INPUT.enterHoldTriggered = true; triggerFavouritePopup(); }, 1700); } return;
            }

            processNavigation(e.key);
        }

        function handleKeyupRaw(e) {
            if (STATE.isInstallingUpdate || STATE.isInstallingApp) return;

            // GLOBAL BACK/ESCAPE LIFT OVERRIDE
            if (e.key === 'Escape' || e.key === 'Backspace') {
                isBackDown = false; clearTimeout(backKeyTimeout); 
                if (!volumeOpenedByHold && STATE.currentScreen !== 'custom_app') goBack();
                if (STATE.currentScreen === 'custom_app') return;
            }

            if (STATE.currentScreen === 'custom_app') return;

            if (e.key === 'Enter' || e.key === ' ') { if (INPUT.enterPressed) { clearTimeout(INPUT.enterHoldTimer); INPUT.enterHoldTimer = null; if (!INPUT.enterHoldTriggered) processNavigation('Enter'); INPUT.enterPressed = false; INPUT.enterHoldTriggered = false; } return; }
        }

        function goBack() {
            if (STATE.isNavigating || STATE.isInstallingUpdate || STATE.isInstallingApp) return;
            if (STATE.inPopup) closeSystemPopup(); 
            else if (STATE.inControlCenter) closeControlCenter();
            else if (STATE.currentScreen === 'player') { const osd = document.getElementById('cinema-osd'); if (osd && osd.classList.contains('visible')) { osd.classList.remove('visible'); clearTimeout(osdTimer); } else { closeCinemaPlayer(); } } 
            else if (STATE.currentScreen === 'audio_player') closeAudioPlayer(); 
            else if (STATE.currentScreen === 'media' && STATE.activeApp === 'tvshows' && STATE.selectedShow !== null) { 
                const wrapper = document.getElementById('media-scroll-wrapper');
                navigateInnerContent(wrapper, () => { STATE.selectedShow = null; STATE.mediaFocusedIndex = STATE.savedShowIndex; renderTopBar(); renderMediaGrid('tvshows'); }, false);
            } else if (STATE.currentScreen !== 'home') closeAppPanel();
        }

        function handleStoreItemAction(app) {
            let installedApps = [];
            try { installedApps = JSON.parse(localStorage.getItem('viewOS_installed_apps') || '[]'); } catch(e) {}
            const localApp = installedApps.find(a => a.name === app.name);
            const buttons = [];
            
            const isSupported = !app.supportedClients || app.supportedClients.length === 0 || app.supportedClients.some(v => compareVersions(CURRENT_OS_VERSION, v.toString().trim()) >= 0);
            
            if (!isSupported) {
                buttons.push({ label: 'Cancel', action: () => {} });
                showSystemPopup(app.name, "This app requires newer viewOS or device.", buttons, app.art, 'app');
                return;
            }

            if (!localApp) {
                buttons.push({ label: 'Install', preservePopup: true, action: () => executeAppInstall(app) });
            } else if (compareVersions(app.version, localApp.version) > 0) {
                buttons.push({ label: 'Update', preservePopup: true, action: () => executeAppInstall(app) });
                buttons.push({ label: 'Uninstall', action: () => executeAppUninstall(app) });
            } else {
                buttons.push({ label: 'Open', action: () => launchCustomApp(app.name) });
                buttons.push({ label: 'Uninstall', action: () => executeAppUninstall(app) });
            }
            buttons.push({ label: 'Cancel', action: () => {} });
            
            const popupTitle = `${app.name}<span style="display: block; font-size: 1.3rem; color: var(--secondary-text); margin-top: 6px;">v${app.version}</span>`;
            showSystemPopup(popupTitle, "", buttons, app.art, 'app');
        }

        function processNavigation(key) {
            if (STATE.isNavigating || STATE.isInstallingUpdate || STATE.isInstallingApp) return;
            let dx = 0, dy = 0;
            if (key === 'ArrowRight') dx = 1; if (key === 'ArrowLeft') dx = -1; if (key === 'ArrowDown') dy = 1; if (key === 'ArrowUp') dy = -1;
            const oldTarget = getActiveTarget();
            
            if (STATE.inControlCenter) {
                const vs = settingsRegistry.find(s => s.id === 'volume'); 
                if (STATE.ccFocusedIndex === 0) {
                    if (key === 'ArrowRight' && vs.currentIndex < vs.options.length - 1) { vs.currentIndex++; updateVolumeUI(); }
                    else if (key === 'ArrowLeft' && vs.currentIndex > 0) { vs.currentIndex--; updateVolumeUI(); }
                    else if (key === 'ArrowDown') { STATE.ccFocusedIndex = 1; updateControlCenterFocus(); }
                } else if (STATE.ccFocusedIndex === 1) {
                    if (key === 'ArrowUp') { STATE.ccFocusedIndex = 0; updateControlCenterFocus(); }
                    else if (key === 'ArrowRight') { STATE.ccFocusedIndex = 2; updateControlCenterFocus(); }
                    else if (key === 'Enter') { triggerSleepFromControlCenter(); }
                } else if (STATE.ccFocusedIndex === 2) {
                    if (key === 'ArrowUp') { STATE.ccFocusedIndex = 0; updateControlCenterFocus(); }
                    else if (key === 'ArrowLeft') { STATE.ccFocusedIndex = 1; updateControlCenterFocus(); }
                    else if (key === 'Enter') { triggerHomeFromControlCenter(); }
                }
                return;
            }
            
            if (STATE.inPopup) {
                if (key === 'ArrowDown' && STATE.popupFocusedIndex < activePopupButtons.length - 1) STATE.popupFocusedIndex++;
                else if (key === 'ArrowUp' && STATE.popupFocusedIndex > 0) STATE.popupFocusedIndex--;
                else if (key === 'Enter') { 
                    const btn = activePopupButtons[STATE.popupFocusedIndex]; 
                    if (btn) {
                        if (!btn.preservePopup) closeSystemPopup(); 
                        if (btn.action) btn.action(); 
                    }
                }
                const changed = (oldTarget !== getActiveTarget()); updateFocus(false, changed ? dx : 0, changed ? dy : 0); return;
            }
            if (STATE.currentScreen === 'player') {
                const cv = document.getElementById('cinema-video');
                const isYT = STATE.activePlayingItemPath && STATE.activePlayingItemPath.includes('.yt');
                if (key === 'Enter') {
                    if (isYT && ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
                        try {
                            const state = ytPlayer.getPlayerState();
                            if (state === 1 || state === 3) {
                                ytPlayer.pauseVideo();
                            } else {
                                ytPlayer.playVideo();
                            }
                        } catch(err) {
                            try { ytPlayer.playVideo(); } catch(e) {}
                        }
                    } else { 
                        if (cv) {
                            if (cv.paused) {
                                cv.play().catch(err => console.warn("Local play failed:", err));
                            } else {
                                cv.pause();
                            }
                        }
                    }
                    triggerCinemaOSD();
                }
                else if (key === 'ArrowRight') performScrub('right', 'cinema'); 
                else if (key === 'ArrowLeft') performScrub('left', 'cinema'); 
                return;
            }
            if (STATE.currentScreen === 'audio_player') {
                if (key === 'Enter') { if (activeAudio.paused) activeAudio.play(); else activeAudio.pause(); updatePlayStateIcon('audio'); }
                else if (key === 'ArrowRight') performScrub('right', 'audio'); else if (key === 'ArrowLeft') performScrub('left', 'audio'); return;
            }

            if (STATE.currentScreen === 'home') {
                const c = STATE.columns, t = DOM_CACHE.apps.length;
                if (key === 'ArrowRight' && (STATE.focusedIndex + 1) % c !== 0 && STATE.focusedIndex + 1 < t) STATE.focusedIndex++;
                else if (key === 'ArrowLeft' && STATE.focusedIndex % c !== 0) STATE.focusedIndex--;
                else if (key === 'ArrowDown' && STATE.focusedIndex + c < t) STATE.focusedIndex += c;
                else if (key === 'ArrowUp' && STATE.focusedIndex - c >= 0) STATE.focusedIndex -= c;
                else if (key === 'Enter') {
                    const selApp = DOM_CACHE.apps[STATE.focusedIndex].data;
                    if (selApp.isCustom) launchCustomApp(selApp.name); else openAppPanel(selApp.id);
                }
            } else if (STATE.currentScreen === 'media') {
                const tabs = getAvailableTabs();
                if (STATE.mediaFocusArea === 'top-bar') {
                    if (key === 'ArrowRight' && STATE.topBarFocusedIndex < tabs.length - 1) { STATE.topBarFocusedIndex++; STATE.currentTab = tabs[STATE.topBarFocusedIndex].id; renderTopBar(); renderMediaGrid(STATE.activeApp); }
                    else if (key === 'ArrowLeft' && STATE.topBarFocusedIndex > 0) { STATE.topBarFocusedIndex--; STATE.currentTab = tabs[STATE.topBarFocusedIndex].id; renderTopBar(); renderMediaGrid(STATE.activeApp); }
                    else if (['ArrowDown','Enter'].includes(key) && activeMediaList.length > 0) { STATE.mediaFocusArea = 'grid'; STATE.mediaFocusedIndex = 0; }
                } else {
                    const c = STATE.columns, t = activeMediaList.length;
                    if (key === 'ArrowRight' && (STATE.mediaFocusedIndex + 1) % c !== 0 && STATE.mediaFocusedIndex + 1 < t) STATE.mediaFocusedIndex++;
                    else if (key === 'ArrowLeft' && STATE.mediaFocusedIndex % c !== 0) STATE.mediaFocusedIndex--;
                    else if (key === 'ArrowDown' && STATE.mediaFocusedIndex + c < t) STATE.mediaFocusedIndex += c;
                    else if (key === 'ArrowUp') { if (STATE.mediaFocusedIndex - c >= 0) STATE.mediaFocusedIndex -= c; else STATE.mediaFocusArea = 'top-bar'; }
                    else if (key === 'Enter' && t > 0) {
                        const sel = activeMediaList[STATE.mediaFocusedIndex];
                        if (STATE.activeApp === 'store') {
                            handleStoreItemAction(sel);
                        } else if (sel && sel.id === 'show-folder') {
                            const wrapper = document.getElementById('media-scroll-wrapper');
                            navigateInnerContent(wrapper, () => { STATE.selectedShow = sel.name; STATE.savedShowIndex = STATE.mediaFocusedIndex; STATE.mediaFocusedIndex = 0; renderTopBar(); renderMediaGrid('tvshows'); }, true);
                        } else if (sel && STATE.activeApp === 'music') playAudioTrack(sel); else if (sel) launchCinemaPlayer(sel);
                    }
                }
            } else if (STATE.currentScreen === 'settings') {
                if (key === 'ArrowDown' && STATE.settingsFocusedIndex < settingsRegistry.length - 1) STATE.settingsFocusedIndex++;
                else if (key === 'ArrowUp' && STATE.settingsFocusedIndex > 0) STATE.settingsFocusedIndex--;
                else if (['ArrowLeft','ArrowRight','Enter'].includes(key)) {
                    const set = settingsRegistry[STATE.settingsFocusedIndex];
                    if (set.type === 'cycle') { 
                        set.currentIndex = (set.currentIndex + (key === 'ArrowLeft' ? -1 : 1) + set.options.length) % set.options.length; 
                        if (set.id === 'volume') updateVolumeUI(); 
                        else {
                            try { localStorage.setItem(`viewOS_${set.id}`, set.currentIndex); } catch(e) {}
                        }
                        renderSettingsList(); 
                    }
                    else if (set.id === 'software_update' && key === 'Enter') checkForUpdates();
                    else if (set.id === 'sleep' && key === 'Enter') startSleep(); 
                    else if (set.id === 'reboot' && key === 'Enter') location.reload();
                }
            }
            const changed = (oldTarget !== getActiveTarget()); updateFocus(false, changed ? dx : 0, changed ? dy : 0);
        }

        let lastGamepadState = { up: false, down: false, left: false, right: false, enter: false, back: false, triangle: false }, gamepadBackPressTime = 0, gamepadActiveDir = null, gamepadHoldStartTime = 0, gamepadLastRepeatTime = 0, gpEnterPressed = false, gpEnterHoldTriggered = false, gpEnterHoldTimer = null, gpSquarePressed = false;
        function pollGamepads() {
            if (STATE.isInstallingUpdate || STATE.isInstallingApp) return requestAnimationFrame(pollGamepads);
            
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            let activeGamepad = null;
            for (let i = 0; i < gamepads.length; i++) {
                if (gamepads[i]) {
                    const hasInput = gamepads[i].buttons.some(b => b.pressed) || gamepads[i].axes.some(a => Math.abs(a) > 0.15);
                    if (hasInput) {
                        activeGamepad = gamepads[i];
                        break;
                    }
                }
            }
            if (!activeGamepad) {
                for (let i = 0; i < gamepads.length; i++) {
                    if (gamepads[i]) {
                        activeGamepad = gamepads[i];
                        break;
                    }
                }
            }
            
            if (!activeGamepad) return requestAnimationFrame(pollGamepads);
            const gp = activeGamepad;
            
            const back = gp.buttons[1]?.pressed, square = gp.buttons[2]?.pressed; 
            if (back && square) { if (STATE.forceRebootStart === 0) { STATE.forceRebootStart = Date.now(); } else if (Date.now() - STATE.forceRebootStart >= 3000) { location.reload(); return; } } else { STATE.forceRebootStart = 0; }

            // Universal Back/B hold to open CC - Overrides custom apps unconditionally
            if (back && !lastGamepadState.back) { 
                gamepadBackPressTime = Date.now(); volumeOpenedByHold = false; 
            } else if (back && lastGamepadState.back) { 
                if (!volumeOpenedByHold && (Date.now() - gamepadBackPressTime > 400)) { 
                    volumeOpenedByHold = true; openControlCenter(); 
                } 
            } else if (!back && lastGamepadState.back) { 
                if (!volumeOpenedByHold && STATE.currentScreen !== 'custom_app') { goBack(); } 
            }

            if (STATE.currentScreen === 'custom_app') {
                lastGamepadState = { ...lastGamepadState, back: back };
                return requestAnimationFrame(pollGamepads);
            }

            const up = gp.buttons[12]?.pressed || gp.axes[1] < -0.5;
            const down = gp.buttons[13]?.pressed || gp.axes[1] > 0.5;
            const left = gp.buttons[14]?.pressed || gp.axes[0] < -0.5;
            const right = gp.buttons[15]?.pressed || gp.axes[0] > 0.5;
            const enter = gp.buttons[0]?.pressed;

            if (STATE.inSleep) {
                let input = gp.buttons.some(b => b.pressed) || gp.axes.some(a => Math.abs(a) > 0.5);
                if (input && !(back && square) && Date.now() - sleepActiveTime >= 1000) wakeUp(); 
                lastGamepadState = { up, down, left, right, enter, back, triangle: false }; 
                return requestAnimationFrame(pollGamepads);
            }

            let dir = up ? 'up' : down ? 'down' : left ? 'left' : right ? 'right' : null;
            if (dir) { if (gamepadActiveDir !== dir) { gamepadActiveDir = dir; gamepadHoldStartTime = Date.now(); gamepadLastRepeatTime = Date.now(); processNavigation({ up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' }[dir]); } else if (Date.now() - gamepadHoldStartTime > 350 && Date.now() - gamepadLastRepeatTime > 80) { processNavigation({ up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' }[dir]); gamepadLastRepeatTime = Date.now(); } } else gamepadActiveDir = null; 

            // Handle Square (Button 2) to toggle Favourites
            if (square && !back) {
                if (!gpSquarePressed) {
                    gpSquarePressed = true;
                    if (STATE.currentScreen === 'media' && !STATE.inPopup && STATE.mediaFocusArea !== 'top-bar' && STATE.activeApp !== 'store') {
                        triggerFavouritePopup();
                    }
                }
            } else if (!square) {
                gpSquarePressed = false;
            }

            // Handle Enter (Button 0) immediately on press down (retains active user gesture context for browsers)
            if (enter) { 
                if (!gpEnterPressed) { 
                    gpEnterPressed = true; 
                    processNavigation('Enter'); 
                } 
            } else { 
                gpEnterPressed = false; 
            }

            lastGamepadState = { up, down, left, right, enter, back, triangle: false };
            requestAnimationFrame(pollGamepads);
        }

        let lastTargetElement = null;
        function tickMicroanimations() {
            let targetX = 0; let targetY = 0; let gpActive = false;
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            for (let i = 0; i < gamepads.length; i++) {
                const gp = gamepads[i]; if (!gp) continue;
                let x = gp.axes[0] || 0; let y = gp.axes[1] || 0;
                if (gp.axes[2] && Math.abs(gp.axes[2]) > Math.abs(x)) x = gp.axes[2];
                if (gp.axes[3] && Math.abs(gp.axes[3]) > Math.abs(y)) y = gp.axes[3];
                if (Math.abs(x) > 0.05 || Math.abs(y) > 0.05) { targetX = x; targetY = y; gpActive = true; break; }
            }
            if (!gpActive) { targetX = 0; targetY = 0; }

            STATE.joyX += (targetX - STATE.joyX) * 0.15; STATE.joyY += (targetY - STATE.joyY) * 0.15;
            const activeTarget = getActiveTarget(); const currentElement = activeTarget ? activeTarget.icon : null; const currentContainer = activeTarget ? activeTarget.container : null;

            const tiltedElements = document.querySelectorAll('.tilted-focus');
            tiltedElements.forEach(el => {
                if (el !== currentElement && el !== currentContainer) {
                    if (!el.springs) { el.style.transform = ''; el.classList.remove('tilted-focus'); } else {
                        if (el.classList.contains('app-icon') || el.classList.contains('media-card')) { const parent = el.parentElement; if (parent && parent !== currentContainer) { parent.style.transform = ''; parent.classList.remove('tilted-focus'); } }
                    }
                }
            });

            springElements.forEach(el => {
                if (!el.isConnected) return;
                const s = el.springs; let changed = false;
                if (s.scale.update()) changed = true; if (s.posX.update()) changed = true; if (s.posY.update()) changed = true; if (s.focusState.update()) changed = true;
                const isFocused = s.focusState.val > 0.01; const isCurrent = (el === currentElement);

                if (changed || isFocused || isCurrent) {
                    const cardMoveScale = 0.48; const springX = s.posX.val * cardMoveScale; const springY = s.posY.val * cardMoveScale;
                    const jX = isCurrent ? STATE.joyX : 0; const jY = isCurrent ? STATE.joyY : 0;
                    const maxIconRotate = 8; const maxIconTranslate = 6;
                    const containerTranslateX = jX * 14; const containerTranslateY = jY * 14;
                    const iconRotateY = jX * maxIconRotate; const iconRotateX = -jY * maxIconRotate; const iconTranslateX = jX * maxIconTranslate; const iconTranslateY = jY * maxIconTranslate;
                    const totalTranslateX = springX + iconTranslateX; const totalTranslateY = springY + iconTranslateY;

                    el.style.transform = `scale(${s.scale.val.toFixed(3)}) translate3d(${totalTranslateX.toFixed(2)}px, ${totalTranslateY.toFixed(2)}px, 0) rotateX(${iconRotateX.toFixed(2)}deg) rotateY(${iconRotateY.toFixed(2)}deg)`; el.classList.add('tilted-focus');
                    const container = el.parentElement;
                    if (container && (container.classList.contains('app-container') || container.classList.contains('media-item'))) { container.style.transform = `translate3d(${containerTranslateX.toFixed(2)}px, ${containerTranslateY.toFixed(2)}px, 0)`; container.classList.add('tilted-focus'); }

                    const f = Math.max(0, s.focusState.val);
                    if (el.glassBorder) el.glassBorder.style.opacity = f.toFixed(3);
                    if (el.shine) {
                        el.shine.style.opacity = f.toFixed(3);
                        if (f > 0.01) {
                            const idleX = isCurrent ? Math.sin(Date.now() * 0.001) * 3 : 0;
                            const idleY = isCurrent ? Math.cos(Date.now() * 0.001) * 3 : 0;
                            const shineX = 30 + (s.posX.val * 2.2) + idleX; 
                            const shineY = 30 + (s.posY.val * 2.2) + idleY;
                            el.shine.style.background = `radial-gradient(circle at ${shineX.toFixed(1)}% ${shineY.toFixed(1)}%, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0) 100%)`;
                        }
                    }
                }
            });

            if (activeTarget && activeTarget.icon && activeTarget.container && !activeTarget.icon.springs) {
                const container = activeTarget.container; const icon = activeTarget.icon;
                if (icon !== lastTargetElement) { focusScale = 1.0; lastTargetElement = icon; }
                let targetScale = 1.12; if (icon.classList.contains('settings-item')) { targetScale = 1.06; }
                STATE.focusScale += (targetScale - STATE.focusScale) * 0.12; const currentScale = STATE.focusScale;

                container.classList.add('tilted-focus'); icon.classList.add('tilted-focus');
                const maxContainerTranslate = 14; const containerTranslateX = STATE.joyX * maxContainerTranslate; const containerTranslateY = STATE.joyY * maxContainerTranslate;
                const maxIconRotate = 8; const maxIconTranslate = 6; const iconRotateY = STATE.joyX * maxIconRotate; const iconRotateX = -STATE.joyY * maxIconRotate; const iconTranslateX = STATE.joyX * maxIconTranslate; const iconTranslateY = STATE.joyY * maxIconTranslate;

                if (container.parentElement && !container.parentElement.style.perspective) { container.parentElement.style.perspective = '1000px'; }
                if (icon.parentElement && !icon.parentElement.style.perspective) { icon.parentElement.style.perspective = '1000px'; }

                if (container === icon) { icon.style.transform = `scale(${currentScale}) translate3d(${containerTranslateX}px, ${containerTranslateY}px, 0) rotateX(${iconRotateX}deg) rotateY(${iconRotateY}deg)`; } else {
                    container.style.transform = `translate3d(${containerTranslateX}px, ${containerTranslateY}px, 0)`; icon.style.transform = `scale(${currentScale}) translate3d(${iconTranslateX}px, ${iconTranslateY}px, 0) rotateX(${iconRotateX}deg) rotateY(${iconRotateY}deg)`;
                }
            } requestAnimationFrame(tickMicroanimations);
        }

        let volumeOverlayTimer = null;
        function triggerVolumeOverlay() { if (STATE.inSleep) return; const o = document.getElementById('control-center'); o.classList.add('visible'); clearTimeout(volumeOverlayTimer); volumeOverlayTimer = setTimeout(() => { if (!STATE.inControlCenter) o.classList.remove('visible'); }, 2000); }
        function openControlCenter() { STATE.inControlCenter = true; STATE.ccFocusedIndex = 0; updateControlCenterFocus(); document.getElementById('control-center').classList.add('visible'); }
        function closeControlCenter() { STATE.inControlCenter = false; document.getElementById('control-center').classList.remove('visible'); updateFocus(); }
        
        function updateControlCenterFocus() {
            const volTile = document.getElementById('cc-vol-tile'), sleepTile = document.getElementById('cc-sleep-tile'), homeTile = document.getElementById('cc-home-tile');
            volTile.classList.remove('cc-tile-focused'); sleepTile.classList.remove('cc-tile-focused'); homeTile.classList.remove('cc-tile-focused');
            if (STATE.ccFocusedIndex === 0) volTile.classList.add('cc-tile-focused'); else if (STATE.ccFocusedIndex === 1) sleepTile.classList.add('cc-tile-focused'); else if (STATE.ccFocusedIndex === 2) homeTile.classList.add('cc-tile-focused');
        }
        
        function triggerSleepFromControlCenter() {
            const cv = document.getElementById('cinema-video'); if (cv && !cv.paused) cv.pause();
            if (ytPlayer && typeof ytPlayer.pauseVideo === 'function') ytPlayer.pauseVideo();
            if (activeAudio && !activeAudio.paused) activeAudio.pause(); closeControlCenter(); startSleep();
        }
        
        function updateVolumeUI() {
            const v = settingsRegistry.find(s => s.id === 'volume'), c = v.options[v.currentIndex]; 
            document.getElementById('volume-fill').style.width = `${c}%`; document.getElementById('volume-text').innerText = `${c}%`;
            const f = c / 100; activeAudio.volume = f; 
            const cv = document.getElementById('cinema-video'); if (cv) cv.volume = f; 
            if (ytPlayer && typeof ytPlayer.setVolume === 'function') ytPlayer.setVolume(c);
            try { localStorage.setItem('viewOS_volume_index', v.currentIndex); } catch(e) {} renderSettingsList(); 
        }

        window.onload = initOS;
    </script>
